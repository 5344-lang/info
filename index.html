        const App = () => {
            // --- States ---
            const [user, setUser] = useState(null); // { councilKey, country }

            const [timerStarted, setTimerStarted] = useState(false);
            const [scores, setScores] = useState({});

            const [tfCountry, setTfCountry] = useState("");
            const [tfType, setTfType] = useState("red");

            // --- 데이터 ---
            const councils = [
                { id: 1, key: 'c1', name: "제 1 협의체", password: "0912", countries: ["캐나다", "독일", "네덜란드", "스웨덴", "뉴질랜드"], theme: "border-blue-500", accent: "text-blue-600", title: "보호의 한계", quote: "우리 아이들을 보살필 힘도 부족해지고 있습니다.", initialStatus: { red: 4, green: 9, blue: 0 }, description: "여러분은 세계에서 아동을 가장 잘 보호하는 나라들이에요. 하지만 제 2 협의체에서 구조된 아동들이 여러분의 나라로 오고 있어요. 복지 예산이 점점 줄어들고 있답니다.", roles: [{ country: "🍁 캐나다", role: "수석 협상가", job: "제 3 협의체 대표에게 직접 찾아가 협상하세요" }, { country: "🇩🇪 독일", role: "재정 담당관", job: "우리 팀의 토큰을 관리하고 협상 결과를 기록하세요" }, { country: "🌷 네덜란드", role: "대변인", job: "협상 시간에 우리 팀 입장을 크게 발표하세요" }, { country: "🇸🇪 스웨덴", role: "전략가", job: "어떤 협의체와 먼저 협상할지 계획하고 팀을 이끄세요" }, { country: "🥝 뉴질랜드", role: "기록 담당", job: "협상에서 오가는 내용을 꼼꼼히 메모하세요" }], missions: [{ id: "M1", title: "책임 전가", steps: ["제 3 협의체 대표를 직접 찾아가세요", "\"위기 아동 보호 시설 건립 비용을 함께 내주세요\"라고 강하게 요구하세요", "제 3 협의체와 함께 초록색 토큰을 9개 모아서 제 2 협의체에게 전달하세요"] }, { id: "M2", title: "시스템 전수", steps: ["제 2 협의체 대표를 직접 찾아가세요", "\"위기 아동 숫자를 줄여달라\"고 협상하세요", "반드시 빨간 토큰을 1개 이상 받아오세요! (필수)"] }], winConditions: [{ text: "위기아동지수(🔴)가 제 2 협의체보다 적음", point: 1 }, { text: "보유한 아동복지예산(🟢)이 위기아동지수(🔴)보다 많음", point: 1 }, { text: "제 2 협의체가 '아동 보호 시설'을 건설함", point: 3 }] },
                { id: 2, key: 'c2', name: "제 2 협의체", password: "1101", countries: ["팔레스타인", "미얀마", "예멘", "우크라이나", "시리아", "아프가니스탄"], theme: "border-red-500", accent: "text-red-600", title: "비상 탈출", quote: "생존을 위해서 나라를 떠나야만 합니다.", initialStatus: { red: 10, green: 1, blue: 0 }, description: "전쟁과 경제 위기로 인해 아동을 보호할 예산도, 시스템도 없어요. 국민들은 살아남기 위해 난민이 되어 나라를 떠나고 있어요.", roles: [{ country: "🇵🇸 팔레스타인", role: "협상가 A", job: "제 1 협의체를 찾아가 지원을 요청하세요" }, { country: "🇲🇲 미얀마", role: "협상가 B", job: "제 3 협의체를 찾아가 지원을 요청하세요" }, { country: "🇾🇪 예멘", role: "재정 담당관", job: "받은 토큰을 관리하고 합계를 계산하세요" }, { country: "🇺🇦 우크라이나", role: "대변인", job: "우리 팀의 어려운 상황을 다른 팀에게 알리세요" }, { country: "🇸🇾 시리아", role: "전략가", job: "누구에게 무엇을 요청할지 계획하세요" }, { country: "🇦🇫 아프가니스탄", role: "기록 담당", job: "협상 내용을 메모하고 정리하세요" }], missions: [{ id: "M1", title: "긴급 조치", steps: ["제 1 협의체 대표를 찾아가서 \"위기 아동을 받아달라\"고 강하게 요구하세요", "빨간 토큰을 최대한 많이 다른 협의체에게 넘기세요"] }, { id: "M2", title: "재정 지원", steps: ["초록색 토큰을 10개 이상 모으면 시설 건설 성공!"] }], winConditions: [{ text: "위기아동지수(🔴)가 기존(10개)보다 줄어듦", point: 1 }, { text: "아동복지예산(🟢)이 상승했음", point: 1 }, { text: "보유한 아동복지예산(🟢)이 위기아동지수(🔴)보다 많음", point: 3 }] },
                { id: 3, key: 'c3', name: "제 3 협의체", password: "9070", countries: ["대한민국", "러시아", "미국", "프랑스"], theme: "border-emerald-500", accent: "text-emerald-600", title: "세계의 강대국", quote: "우리는 이미 우리의 역할을 하고 있습니다.", initialStatus: { red: 2, green: 4, blue: 6 }, description: "여러분은 세계에서 가장 부유하고 강력한 나라들이에요. 우리의 이익은 지키면서, 스마트하게 거래하세요!", roles: [{ country: "🇰🇷 대한민국", role: "수석 협상가", job: "제안서를 들고 먼저 다른 협의체를 찾아가세요" }, { country: "🇷🇺 러시아", role: "재정 담당관", job: "파란 토큰은 절대 주면 안 돼요" }, { country: "🇺🇸 미국", role: "대변인", job: "다른 협의체의 제안을 듣고 판단하세요" }, { country: "🇫🇷 프랑스", role: "협상 전략가", job: "유리한 협상 전략을 짜세요" }], missions: [{ id: "M1", title: "전략적 중재", steps: ["제 1 협의체에 초록 토큰 1개를 주고 빨간 토큰을 우리한테 보내지 않겠다는 약속을 받으세요"] }, { id: "M2", title: "경제 예산 사수", steps: ["파란색 토큰 6개를 끝까지 지키세요!"] }], winConditions: [{ text: "위기아동지수(🔴)를 0~2개 사이로 유지하기", point: 1 }, { text: "경제예산(🔵)이 줄어들었다면 갯수만큼 -n점", point: -1 }, { text: "예산 합계가 전체 협의체 중 가장 많음", point: 3 }] }
            ];

            const initialScores = {
                c1: { red: 4, green: 9, blue: 0 },
                c2: { red: 10, green: 1, blue: 0 },
                c3: { red: 2, green: 4, blue: 6 }
            };

            // --- Effects ---
            useEffect(() => {
                db.ref('game/scores').on('value', snap => snap.val() ? setScores(snap.val()) : db.ref('game/scores').set(initialScores));
                db.ref('game/logs').on('value', snap => snap.val() && setLogs(Object.values(snap.val()).reverse().slice(0, 5)));
                return () => { db.ref('game/scores').off(); db.ref('game/logs').off(); };
            }, []);

            // 실시간 요청 감지 (받는 사람)
            useEffect(() => {
                if (!user) return;
                const reqRef = db.ref(`game/requests/${user.councilKey}`);
                reqRef.on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const key = Object.keys(data);
                        setIncomingRequest({ id: key, ...data[key] });
                    } else setIncomingRequest(null);
                });
                return () => reqRef.off();
            }, [user]);

            useEffect(() => {
                if (!timerRunning || timerSeconds <= 0) return;
                const id = setInterval(() => setTimerSeconds(s => s - 1), 1000);
                return () => clearInterval(id);
            }, [timerRunning]);

            useEffect(() => {
                if (timerStarted && timerSeconds === 0) {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const play = (t, f) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.type = 'square'; o.frequency.setValueAtTime(f, t);
                        g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                        o.connect(g); g.connect(audioCtx.destination);
                        o.start(t); o.stop(t + 0.2);
                    };
                    [0, 0.3, 0.6].forEach(t => play(audioCtx.currentTime + t, 880));
                    setTimerRunning(false);
                }
            }, [timerSeconds, timerStarted]);

            // --- Handlers ---
            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === "9997") { setActiveTab('public'); setPasswordInput(""); return; }
                if (passwordInput === "9998") { setActiveTab('admin'); setPasswordInput(""); return; }

                if (pendingCouncil && (passwordInput === pendingCouncil.password || passwordInput === "9999")) {
                    setUser({ councilKey: pendingCouncil.key, councilId: pendingCouncil.id, country: selectedCountry });
                    setActiveTab(pendingCouncil.id);
                    setPendingCouncil(null); setPasswordInput("");
                } else {
                    alert("보안 코드가 일치하지 않습니다.");
                    setPasswordInput("");
                }
            };

            const sendRequest = () => {
                if (!tfCouncil || !tfCountry) return alert("전송 대상을 선택하세요.");
                if (user.councilKey === tfCouncil) return alert("우리 협의체로는 보낼 수 없습니다.");
                if (scores[user.councilKey][tfType] < tfAmt) return alert("토큰이 부족합니다.");

                const toName = `${tfCountry} (${councils.find(c=>c.key===tfCouncil).name})`;
                const newRef = db.ref(`game/requests/${tfCouncil}`).push();
                newRef.set({ fromKey: user.councilKey, fromCountry: user.country, type: tfType, amt: tfAmt, toCountry: tfCountry });
                
                setSentRequest({ id: newRef.key, toKey: tfCouncil, toName });
                newRef.on('value', snap => { if (!snap.exists()) { setSentRequest(null); newRef.off(); } });
            };

            const handleAction = (isAccept) => {
                if (!incomingRequest) return;
                const { id, fromKey, fromCountry, type, amt, toCountry } = incomingRequest;
                if (isAccept) {
                    const updates = {};
                    updates[`game/scores/${fromKey}/${type}`] = scores[fromKey][type] - amt;
                    updates[`game/scores/${user.councilKey}/${type}`] = scores[user.councilKey][type] + amt;
                    db.ref().update(updates);
                    db.ref('game/logs').push({ from: fromCountry, to: toCountry, type, amt, time: new Date().toLocaleTimeString() });
                }
                db.ref(`game/requests/${user.councilKey}/${id}`).remove();
            };

            const adminManual = (f, t, type, amt) => {
                if (f === t) return alert("보내는 쪽과 받는 쪽이 같습니다.");
                const updates = {};
                updates[`game/scores/${f}/${type}`] = Math.max(0, scores[f][type] - amt);
                updates[`game/scores/${t}/${type}`] = (scores[t][type] || 0) + parseInt(amt);
                db.ref().update(updates);
                alert("수동 전송 완료");
            };

            // --- UI 렌더링 ---
            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            // 1. 초기 홈 화면
            if (!user && !activeTab && !pendingCouncil) return (
                <div className="flex flex-col items-center justify-center min-h-screen text-center p-6">
                    <div className="bg-white p-10 md:p-14 rounded-3xl shadow-xl border border-gray-200 max-w-2xl w-full">

                        <p className="text-gray-500 mb-10 text-lg leading-relaxed">이 시스템은 각 협의체 외교관만 접근할 수 있습니다.<br/>소속된 협의체를 선택하십시오.</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {councils.map(c => (
                                <button key={c.id} onClick={() => {setPendingCouncil(c); setSelectedCountry(c.countries);}} className="p-6 bg-gray-50 rounded-2xl border-b-4 border-gray-200 hover:border-blue-500 font-bold transition-all text-lg">
                                    {c.name}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            // 2. 로그인 화면 (9999 샘플 지원)
            if (pendingCouncil) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-200 max-w-md w-full text-center">
                        <div className="bg-yellow-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-yellow-500"><Lock size={40} /></div>
                        <h2 className="text-2xl font-bold mb-8">{pendingCouncil.name} 보안 접속</h2>
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div className="text-left">
                                <label className="text-xs font-bold text-gray-400 ml-1">국가/대표명 선택</label>

                                    {pendingCouncil.countries.map(c => <option key={c} value={c}>{c}</option>)}

                            </div>

            if (activeTab === 'admin') {

                            <div className="grid grid-cols-2 gap-4">
                                <select value={af} onChange={e=>setAf(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold border-2 border-gray-100">{councils.map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                                <select value={at} onChange={e=>setAt(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold border-2 border-gray-100">{councils.map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={aty} onChange={e=>setAty(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold border-2 border-gray-100"><option value="red">🔴 위기</option><option value="green">🟢 복지</option><option value="blue">🔵 경제</option></select>
                                <input type="number" value={aa} onChange={e=>setAa(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold text-center border-2 border-gray-100" />
                            </div>
                            <button onClick={() => { if(window.confirm("토큰을 강제 전송하시겠습니까?")) adminManual(af, at, aty, aa); }} className="w-full py-5 bg-yellow-500 text-white rounded-2xl font-black text-lg">전송 확정</button>
                        </div>
                    </div>
                );
            }

            // 4. 현황판 화면 (9997)
            if (activeTab === 'public') return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <button onClick={()=>setActiveTab(null)} className="mb-6 text-gray-400 font-bold">← 메인 화면</button>
                    <div className="bg-white rounded-3xl shadow-xl p-10 text-center mb-8 border border-gray-100">
                        <h2 className="text-2xl font-bold text-gray-600 mb-6">⏱ 협상 타이머</h2>
                        {!timerStarted ? (
                            <button onClick={()=>{setTimerSeconds(300); setTimerRunning(true); setTimerStarted(true);}} className="px-12 py-6 bg-blue-500 text-white font-black text-2xl rounded-2xl shadow-xl shadow-blue-100">협상 개시 (5분)</button>
                        ) : (
                            <div>
                                <div className={`text-9xl font-black mb-6 tabular-nums ${timerSeconds <= 60 ? 'text-red-500 animate-pulse' : 'text-blue-600'}`}>
                                    {timerSeconds === 0 ? '⏰' : formatTime(timerSeconds)}
                                </div>
                                <div className="flex gap-3 justify-center">
                                    <button onClick={()=>setTimerRunning(!timerRunning)} className="px-8 py-3 bg-gray-100 rounded-xl font-bold">{timerRunning ? '⏸ 일시정지' : '▶ 재개'}</button>
                                    <button onClick={()=>{setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false);}} className="px-8 py-3 bg-gray-100 rounded-xl font-bold text-red-400">🔄 초기화</button>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {councils.map(c => (
                            <div key={c.id} className={`bg-white rounded-3xl p-6 border-t-8 ${c.theme} shadow-lg`}>
                                <h3 className={`font-black text-xl mb-4 ${c.accent}`}>{c.name}</h3>
                                <div className="space-y-3">
                                    <div className="flex justify-between p-3 bg-red-50 rounded-xl font-black text-red-600"><span>🔴 위기</span><span>{scores[c.key]?.red}</span></div>
                                    <div className="flex justify-between p-3 bg-emerald-50 rounded-xl font-black text-emerald-600"><span>🟢 복지</span><span>{scores[c.key]?.green}</span></div>
                                    <div className="flex justify-between p-3 bg-blue-50 rounded-xl font-black text-blue-600"><span>🔵 경제</span><span>{scores[c.key]?.blue}</span></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 5. 각 협의체 개별 활동 페이지
            const cur = councils.find(c => c.id === activeTab);
            if (!cur) return null;
            const targetCouncilData = councils.find(c => c.key === tfCouncil);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 pb-32">
                    <header className="flex justify-between items-center mb-6">
                        <button onClick={()=>{setUser(null); setActiveTab(null);}} className="text-gray-400 font-bold">← 로그아웃</button>
                        <div className="bg-blue-600 text-white px-5 py-2 rounded-full font-black text-sm shadow-lg">
                            {user.country} 대표
                        </div>
                    </header>

                    <div className={`bg-white border-t-8 ${cur.theme} rounded-3xl shadow-xl overflow-hidden`}>
                        <div className="p-8 bg-gray-50 border-b border-gray-100">
                            <h2 className="text-3xl font-black mb-2">{cur.title}</h2>
                            <p className="text-gray-400 font-bold flex items-center gap-2"><Shield size={16} /> {cur.name} 공식 지시서</p>
                        </div>
                        
                        <div className="grid grid-cols-3 p-8 gap-3 text-center border-b font-black border-gray-100">
                            <div className="bg-red-50 p-4 rounded-2xl text-red-500 shadow-inner"><div className="text-3xl">{scores[cur.key]?.red}</div><div className="text-[10px] uppercase opacity-60">위기 아동</div></div>
                            <div className="bg-emerald-50 p-4 rounded-2xl text-emerald-500 shadow-inner"><div className="text-3xl">{scores[cur.key]?.green}</div><div className="text-[10px] uppercase opacity-60">복지 예산</div></div>
                            <div className="bg-blue-50 p-4 rounded-2xl text-blue-500 shadow-inner"><div className="text-3xl">{scores[cur.key]?.blue}</div><div className="text-[10px] uppercase opacity-60">경제 예산</div></div>
                        </div>

                        <div className="p-8">
                            <section className="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl">
                                <h3 className="font-black mb-6 flex items-center gap-2">🚀 토큰 전송 (외교 활동)</h3>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 ml-1">받는 협의체</label>
                                            <select value={tfCouncil} onChange={e=>{setTfCouncil(e.target.value); setTfCountry("");}} className="w-full p-4 bg-slate-800 rounded-xl font-bold mt-1 border-none focus:ring-2 focus:ring-blue-500">
                                                <option value="">협의체 선택</option>
                                                {councils.filter(c=>c.key!==cur.key).map(c=><option key={c.key} value={c.key}>{c.name}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 ml-1">받는 국가</label>
                                            <select value={tfCountry} onChange={e=>setTfCountry(e.target.value)} className="w-full p-4 bg-slate-800 rounded-xl font-bold mt-1 border-none focus:ring-2 focus:ring-blue-500" disabled={!tfCouncil}>
                                                <option value="">국가 선택</option>
                                                {targetCouncilData?.countries.map(ct=><option key={ct} value={ct}>{ct}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 ml-1">토큰 색깔</label>
                                            <select value={tfType} onChange={e=>setTfType(e.target.value)} className="w-full p-4 bg-slate-800 rounded-xl font-bold mt-1 border-none">
                                                <option value="red">🔴 위기 아동</option><option value="green">🟢 복지 예산</option><option value="blue">🔵 경제 예산</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-500 ml-1">전송 수량</label>
                                            <div className="flex bg-slate-800 rounded-xl overflow-hidden mt-1 border-none font-black h-[56px]">
                                                <button onClick={()=>setTfAmt(Math.max(1, tfAmt-1))} className="px-5 bg-slate-700 hover:bg-slate-600 transition-colors">-</button>
                                                <div className="flex-1 flex items-center justify-center text-lg">{tfAmt}</div>
                                                <button onClick={()=>setTfAmt(tfAmt+1)} className="px-5 bg-slate-700 hover:bg-slate-600 transition-colors">+</button>
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={sendRequest} className="w-full py-5 bg-blue-500 rounded-xl font-black text-lg shadow-lg shadow-blue-900 active:scale-95 transition-all mt-2">전송 승인 요청하기</button>
                                </div>
                            </section>
                        </div>

                        {/* 기존 활동 텍스트 보존 */}
                        <div className="p-8 space-y-14">
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-yellow-500 font-black text-2xl"><EyeOff /> <h3>우리 팀 상황</h3></div>
                                <div className="bg-yellow-50 p-6 rounded-2xl border-l-4 border-yellow-400 italic text-lg leading-relaxed text-gray-700 mb-6">"{cur.quote}"</div>
                                <p className="text-gray-600 leading-relaxed text-base">{cur.description}</p>
                            </section>
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-purple-500 font-black text-2xl"><Users /> <h3>팀원 역할 분담</h3></div>
                                <div className="grid gap-3">
                                    {cur.roles.map((r, i) => (
                                        <div key={i} className="bg-purple-50 p-4 rounded-xl border border-purple-100 flex flex-col">
                                            <div className="flex items-center gap-2 mb-1 font-bold">
                                                <span className="text-gray-900">{r.country}</span>
                                                <span className="bg-purple-200 text-purple-800 text-[10px] px-2 py-0.5 rounded-full uppercase">{r.role}</span>
                                            </div>
                                            <p className="text-sm text-gray-500 leading-snug">{r.job}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-blue-500 font-black text-2xl"><Shield /> <h3>우리 팀 미션</h3></div>
                                <div className="grid gap-4">
                                    {cur.missions.map(m => (
                                        <div key={m.id} className="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                                            <div className="flex items-center gap-3 mb-4"><span className="bg-blue-600 text-white text-xs font-black px-2 py-1 rounded-lg">{m.id}</span><span className="font-bold text-lg">{m.title}</span></div>
                                            <ul className="space-y-3">
                                                {m.steps.map((s, idx) => (
                                                    <li key={idx} className="flex gap-3 text-sm text-gray-600 leading-relaxed">
                                                        <span className="bg-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black border border-blue-200 shrink-0">{idx+1}</span>
                                                        {s}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>
                    <div className="mt-8">
                        <h4 className="text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest">실시간 외교 활동 로그</h4>
                        <div className="space-y-2">{logs.map((log, i) => (<div key={i} className="bg-white p-3 rounded-xl text-[11px] shadow-sm border border-gray-100 flex justify-between"><span>{log.from} → {log.to} ({log.type==='red'?'🔴':log.type==='green'?'🟢':'🔵'} {log.amt}개)</span><span className="text-gray-300">{log.time}</span></div>))}</div>
                    </div>

                    {/* 수신/송신 모달 레이어 */}
                    {incomingRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6 text-center">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full animate-bounce">
                                <h2 className="text-xl font-black mb-4">🔔 외교 요청 도착!</h2>
                                <p className="mb-6 leading-relaxed">
                                    <span className="text-blue-600 font-bold text-lg">{incomingRequest.fromCountry}</span>에서 <br/>
                                    당신(<span className="font-bold">{incomingRequest.toCountry}</span>)에게 <br/>
                                    <b>{incomingRequest.type==='red'?'🔴 위기아동':incomingRequest.type==='green'?'🟢 복지예산':'🔵 경제예산'} {incomingRequest.amt}개</b>를 보내려 합니다. <br/>받으시겠습니까?
                                </p>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={()=>handleAction(false)} className="p-4 bg-gray-100 rounded-2xl font-bold text-gray-400">거절</button>
                                    <button onClick={()=>handleAction(true)} className="p-4 bg-blue-500 text-white rounded-2xl font-bold shadow-lg">수락</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {sentRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6 text-center">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full">
                                <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                                <h2 className="text-xl font-black mb-2">응답 대기 중...</h2>
                                <div className="bg-blue-50 p-4 rounded-2xl text-sm text-blue-800 leading-relaxed mb-6 font-medium">
                                    <p><b>{sentRequest.toName}</b>의 응답이 없나요?</p>
                                    <p className="mt-2 opacity-80 underline underline-offset-4">상대방과 함께 선생님께 가서 직접 교환을 완료하세요.</p>
                                </div>
                                <button onClick={()=>{db.ref(`game/requests/${sentRequest.toKey}/${sentRequest.id}`).remove(); setSentRequest(null);}} className="text-gray-300 font-bold text-sm">요청 취소하기</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
