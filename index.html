<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아동 인권 수호 작전 v3.0.6</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); }
        .popup-in { animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyA5OUkS9Q-qnYhdKQIcq7mRfMceZnFNedo",
            authDomain: "un-project-26f66.firebaseapp.com",
            databaseURL: "https://un-project-26f66-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "un-project-26f66",
            storageBucket: "un-project-26f66.firebasestorage.app",
            messagingSenderId: "1047109156483",
            appId: "1:1047109156483:web:50e32a74c276a4a6dde5b6",
            measurementId: "G-Y1TFDRNGK8"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const councils = [
            { id: 1, key: 'c1', name: "제 1 협의체", password: "0912", countries: ["캐나다", "독일", "네덜란드", "스웨덴", "뉴질랜드"], theme: "border-blue-500", accent: "text-blue-600", title: "보호의 한계", quote: "우리 아이들을 보살필 힘도 부족해지고 있습니다.", description: "여러분은 세계에서 아동을 가장 잘 보호하는 나라들이에요. 하지만 제 2 협의체에서 구조된 아동들이 여러분의 나라로 오고 있어요.", roles: [{ country: "캐나다", role: "수석 협상가", job: "제 3 협의체와 협상" }, { country: "독일", role: "재정 담당", job: "토큰 관리" }, { country: "네덜란드", role: "대변인", job: "입장 발표" }, { country: "스웨덴", role: "전략가", job: "팀 리딩" }, { country: "뉴질랜드", role: "기록 담당", job: "메모" }], missions: [{ id: "M1", title: "책임 전가", steps: ["제 3 협의체와 초록 토큰 9개 모으기"] }, { id: "M2", title: "시스템 전수", steps: ["빨간 토큰 1개 이상 받기"] }], winConditions: [{ text: "위기아동지수(🔴)가 제 2 협의체보다 적음", point: 1 }, { text: "보유 예산(🟢)이 위기(🔴)보다 많음", point: 1 }, { text: "제 2 협의체 시설 건설 성공", point: 3 }] },
            { id: 2, key: 'c2', name: "제 2 협의체", password: "1101", countries: ["팔레스타인", "미얀마", "예멘", "우크라이나", "시리아", "아프가니스탄"], theme: "border-red-500", accent: "text-red-600", title: "비상 탈출", quote: "생존을 위해서 나라를 떠나야만 합니다.", description: "전쟁과 경제 위기로 아동 보호 시스템이 없습니다. 국민들이 나라를 떠나고 있습니다.", roles: [{ country: "팔레스타인", role: "협상가 A", job: "지원 요청" }, { country: "미얀마", role: "협상가 B", job: "지원 요청" }, { country: "예멘", role: "재정 담당", job: "토큰 관리" }, { country: "우크라이나", role: "대변인", job: "상황 전파" }, { country: "시리아", role: "전략가", job: "계획 수립" }, { country: "아프가니스탄", role: "기록 담당", job: "정리" }], missions: [{ id: "M1", title: "긴급 조치", steps: ["빨간 토큰 다른 팀에 넘기기"] }, { id: "M2", title: "재정 지원", steps: ["초록 토큰 10개 확보"] }], winConditions: [{ text: "빨간 토큰 감소", point: 1 }, { text: "예산(🟢) 상승", point: 1 }, { text: "예산(🟢)이 위기(🔴)보다 많음", point: 3 }] },
            { id: 3, key: 'c3', name: "제 3 협의체", password: "9070", countries: ["대한민국", "러시아", "미국", "프랑스"], theme: "border-emerald-500", accent: "text-emerald-600", title: "세계의 강대국", quote: "우리는 이미 우리의 역할을 하고 있습니다.", description: "가장 부유하고 강력한 나라들입니다. 스마트한 외교로 이익을 지키세요.", roles: [{ country: "대한민국", role: "수석 협상가", job: "제안서 전달" }, { country: "러시아", role: "재정 담당", job: "파란 토큰 수호" }, { country: "미국", role: "대변인", job: "제안 판단" }, { country: "프랑스", role: "전략가", job: "전략 수립" }], missions: [{ id: "M1", title: "전략적 중재", steps: ["빨간 토큰 거부 약속 받기"] }, { id: "M2", title: "경제 예산 사수", steps: ["파란 토큰 6개 유지"] }], winConditions: [{ text: "빨간 토큰 0~2개 유지", point: 1 }, { text: "파란 토큰 손실당 -1점", point: -1 }, { text: "전체 예산 합계 최대", point: 3 }] }
        ];

        const App = () => {
            // --- States ---
            const [user, setUser] = useState(null); 
            const [activeTab, setActiveTab] = useState(null);
            const [pendingCouncil, setPendingCouncil] = useState(null);
            const [selectedCountry, setSelectedCountry] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [timerSeconds, setTimerSeconds] = useState(300);
            const [timerRunning, setTimerRunning] = useState(false);
            const [timerStarted, setTimerStarted] = useState(false);
            const [scores, setScores] = useState({});
            const [logs, setLogs] = useState([]);
            const [showScoreModal, setShowScoreModal] = useState(false);
            const [incomingRequest, setIncomingRequest] = useState(null);
            const [sentRequest, setSentRequest] = useState(null);
            const [popupTimer, setPopupTimer] = useState(20);

            // 전송 폼 상태
            const [tfCouncil, setTfCouncil] = useState("");
            const [tfCountry, setTfCountry] = useState("");
            const [tfType, setTfType] = useState("red");
            const [tfAmt, setTfAmt] = useState(1);

            // --- 🔥 핵심 함수들 (스코프 에러 방지를 위해 최상단 배치) ---

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === "9997") { setActiveTab('public'); setPasswordInput(""); setPendingCouncil(null); return; }
                if (passwordInput === "9998") { setActiveTab('admin'); setPasswordInput(""); setPendingCouncil(null); return; }

                if (pendingCouncil && (passwordInput === pendingCouncil.password || passwordInput === "9999")) {
                    setUser({ councilKey: pendingCouncil.key, councilId: pendingCouncil.id, country: selectedCountry });
                    setActiveTab(pendingCouncil.id);
                    setPendingCouncil(null); setPasswordInput("");
                } else {
                    alert("보안 코드가 틀렸습니다.");
                    setPasswordInput("");
                }
            };

            const requestTransfer = () => {
                if (!tfCouncil || !tfCountry) return alert("전송 대상 국가를 선택하세요.");
                if (user.councilKey === tfCouncil) return alert("자신에게 보낼 수 없습니다.");
                if (scores[user.councilKey][tfType] < tfAmt) return alert("토큰이 부족합니다.");

                const toName = `${tfCountry} (${councils.find(c=>c.key===tfCouncil).name})`;
                const newRef = db.ref(`game/requests/${tfCouncil}`).push();
                newRef.set({ fromKey: user.councilKey, fromCountry: user.country, type: tfType, amt: tfAmt, toCountry: tfCountry });
                
                setSentRequest({ id: newRef.key, toKey: tfCouncil, toName });
                newRef.on('value', snap => { if (!snap.exists()) { setSentRequest(null); newRef.off(); } });
            };

            const handleAction = (isAccept) => {
                if (!incomingRequest) return;
                const { id, fromKey, fromCountry, type, amt, toCountry } = incomingRequest;
                if (isAccept) {
                    const updates = {};
                    updates[`game/scores/${fromKey}/${type}`] = (scores[fromKey][type] || 0) - amt;
                    updates[`game/scores/${user.councilKey}/${type}`] = (scores[user.councilKey][type] || 0) + parseInt(amt);
                    db.ref().update(updates);
                    db.ref('game/logs').push({ from: fromCountry, to: toCountry, type, amt, time: new Date().toLocaleTimeString() });
                }
                db.ref(`game/requests/${user.councilKey}/${id}`).remove();
            };

            const adminManual = (f, t, type, amt) => {
                const amount = parseInt(amt);
                const updates = {};
                updates[`game/scores/${f}/${type}`] = Math.max(0, (scores[f][type] || 0) - amount);
                updates[`game/scores/${t}/${type}`] = (scores[t][type] || 0) + amount;
                db.ref().update(updates);
                alert("수동 전송 완료");
            };

            // --- Effects ---
            useEffect(() => {
                db.ref('game/scores').on('value', snap => {
                    if (snap.val()) setScores(snap.val());
                    else db.ref('game/scores').set({ c1: {red:4,green:9,blue:0}, c2: {red:10,green:1,blue:0}, c3: {red:2,green:4,blue:6} });
                });
                db.ref('game/logs').on('value', snap => snap.val() && setLogs(Object.values(snap.val()).reverse().slice(0, 5)));
                return () => { db.ref('game/scores').off(); db.ref('game/logs').off(); };
            }, []);

            // 20초 카운트다운 타이머
            useEffect(() => {
                let interval;
                if (incomingRequest || sentRequest) {
                    setPopupTimer(20);
                    interval = setInterval(() => {
                        setPopupTimer(prev => {
                            if (prev <= 1) {
                                if (incomingRequest) db.ref(`game/requests/${user.councilKey}/${incomingRequest.id}`).remove();
                                if (sentRequest) { db.ref(`game/requests/${sentRequest.toKey}/${sentRequest.id}`).remove(); setSentRequest(null); }
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [incomingRequest, sentRequest]);

            useEffect(() => {
                if (!user) return;
                const reqRef = db.ref(`game/requests/${user.councilKey}`);
                reqRef.on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const firstKey = Object.keys(data);
                        setIncomingRequest({ id: firstKey, ...data[firstKey] });
                    } else setIncomingRequest(null);
                });
                return () => reqRef.off();
            }, [user]);

            useEffect(() => {
                if (!timerRunning || timerSeconds <= 0) return;
                const id = setInterval(() => setTimerSeconds(s => s - 1), 1000);
                return () => clearInterval(id);
            }, [timerRunning]);

            useEffect(() => {
                if (timerStarted && timerSeconds === 0) {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const play = (t, f) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.type = 'square'; o.frequency.setValueAtTime(f, t);
                        g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                        o.connect(g); g.connect(audioCtx.destination);
                        o.start(t); o.stop(t + 0.2);
                    };
                    [0, 0.3, 0.6].forEach(t => play(audioCtx.currentTime + t, 880));
                    setTimerRunning(false);
                }
            }, [timerSeconds, timerStarted]);

            // --- 렌더링 도우미 ---
            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
            const calculateFinal = () => {
                const results = { c1:0, c2:0, c3:0 };
                if (!scores.c1 || !scores.c2 || !scores.c3) return results;
                const c1T = scores.c1.green + scores.c1.blue, c2T = scores.c2.green + scores.c2.blue, c3T = scores.c3.green + scores.c3.blue;
                if (scores.c1.red < scores.c2.red) results.c1 += 1;
                if (c1T > scores.c1.red) results.c1 += 1;
                if (c2T >= 10) results.c1 += 3;
                if (scores.c2.red < 10) results.c2 += 1;
                if (scores.c2.green > 1) results.c2 += 1;
                if (scores.c2.green > scores.c2.red) results.c2 += 3;
                if (scores.c3.red <= 2) results.c3 += 1;
                results.c3 -= Math.max(0, 6 - scores.c3.blue);
                if (c3T > c1T && c3T > c2T) results.c3 += 3;
                return results;
            };

            // --- 분기별 렌더링 ---

            // 메인 홈
            if (!user && !activeTab && !pendingCouncil) return (
                <div className="flex flex-col items-center justify-center min-h-screen text-center p-6 bg-slate-50">
                    <div className="bg-white p-12 rounded-3xl shadow-xl border border-gray-200 max-w-2xl w-full">
                        <div className="text-blue-500 mb-6 flex justify-center animate-pulse"><Globe /></div>
                        <h1 className="text-3xl font-black mb-8 tracking-tight">글로벌 아동 인권 수호 작전</h1>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {councils.map(c => (
                                <button key={c.id} onClick={() => {setPendingCouncil(c); setSelectedCountry(c.countries);}} className="p-6 bg-gray-50 rounded-2xl border-b-4 border-gray-200 hover:border-blue-500 font-bold transition-all text-lg flex flex-col items-center gap-2">
                                    <Shield size={24} className="text-gray-400" />
                                    {c.name}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            // 로그인/비밀번호 화면
            if (pendingCouncil) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-100">
                    <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center">
                        <Lock size={48} className="mx-auto text-yellow-500 mb-6" />
                        <h2 className="text-2xl font-bold mb-6">{pendingCouncil.name} 접속</h2>
                        <form onSubmit={handlePasswordSubmit} className="space-y-4 text-left">
                            <label className="text-xs font-bold text-gray-400 ml-1">국가 선택</label>
                            <select value={selectedCountry} onChange={e=>setSelectedCountry(e.target.value)} className="w-full p-4 bg-gray-50 rounded-xl font-bold border-2 border-gray-100 mb-2">
                                {pendingCouncil.countries.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <label className="text-xs font-bold text-gray-400 ml-1">보안 코드 입력 (또는 9999)</label>
                            <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder="••••" className="w-full p-4 bg-gray-50 rounded-xl text-center text-xl border-2 border-gray-100" autoFocus />
                            <div className="grid grid-cols-2 gap-2 pt-4">
                                <button type="button" onClick={()=>setPendingCouncil(null)} className="p-4 font-bold text-gray-400 hover:bg-gray-50 rounded-xl">취소</button>
                                <button type="submit" className="p-4 bg-blue-500 text-white rounded-xl font-bold shadow-lg">접속</button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            // 9998: 관리자 페이지
            if (activeTab === 'admin') {
                const [af, setAf] = useState("c1"); const [at, setAt] = useState("c2"); const [aty, setAty] = useState("red"); const [aa, setAa] = useState(1);
                return (
                    <div className="max-w-2xl mx-auto p-6 bg-slate-50 min-h-screen">
                        <button onClick={()=>setActiveTab(null)} className="mb-6 text-gray-400 font-bold">← 메인 화면</button>
                        <div className="bg-white p-8 rounded-3xl shadow-xl space-y-6">
                            <h2 className="text-2xl font-black flex items-center gap-2 text-yellow-600"><Calculator /> 수동 제어 모드</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={af} onChange={e=>setAf(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold border-2 border-slate-100">{councils.map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                                <select value={at} onChange={e=>setAt(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold border-2 border-slate-100">{councils.map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={aty} onChange={e=>setAty(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold border-2 border-slate-100"><option value="red">🔴 위기</option><option value="green">🟢 복지</option><option value="blue">🔵 경제</option></select>
                                <input type="number" value={aa} onChange={e=>setAa(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold text-center border-2 border-slate-100" />
                            </div>
                            <button onClick={() => adminManual(af, at, aty, aa)} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg">강제 전송</button>
                        </div>
                    </div>
                );
            }

            // 9997: 공개 현황판
            if (activeTab === 'public') return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <button onClick={()=>setActiveTab(null)} className="mb-6 text-gray-400 font-bold">← 메인 화면</button>
                    <div className="bg-white rounded-3xl shadow-xl p-12 text-center mb-8 border-b-8 border-blue-500">
                        <h2 className="text-2xl font-bold text-gray-400 mb-6 uppercase tracking-widest font-black">Negotiation Timer</h2>
                        {!timerStarted ? (
                            <button onClick={()=>{setTimerSeconds(300); setTimerRunning(true); setTimerStarted(true);}} className="px-16 py-8 bg-blue-500 text-white font-black text-3xl rounded-3xl shadow-2xl hover:scale-105 transition-all">협상 시작 (5분)</button>
                        ) : (
                            <div>
                                <div className={`text-[120px] font-black leading-none mb-6 tabular-nums ${timerSeconds <= 60 ? 'text-red-500 animate-pulse' : 'text-blue-600'}`}>
                                    {timerSeconds === 0 ? '⏰' : formatTime(timerSeconds)}
                                </div>
                                <div className="flex gap-4 justify-center">
                                    <button onClick={()=>setTimerRunning(!timerRunning)} className={`px-10 py-4 rounded-2xl font-black text-white ${timerRunning ? 'bg-yellow-500' : 'bg-green-500'}`}>{timerRunning ? '⏸ PAUSE' : '▶ RESUME'}</button>
                                    <button onClick={()=>{setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false);}} className="px-10 py-4 bg-slate-200 rounded-2xl font-black text-slate-500">🔄 RESET</button>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {councils.map(c => (
                            <div key={c.id} className={`bg-white rounded-3xl p-6 border-t-8 ${c.theme} shadow-lg`}>
                                <h3 className={`font-black text-xl mb-4 ${c.accent}`}>{c.name}</h3>
                                <div className="space-y-3 font-black text-lg">
                                    <div className="flex justify-between p-4 bg-red-50 rounded-2xl text-red-600"><span>🔴 위기</span><span>{scores[c.key]?.red}</span></div>
                                    <div className="flex justify-between p-4 bg-emerald-50 rounded-2xl text-emerald-600"><span>🟢 복지</span><span>{scores[c.key]?.green}</span></div>
                                    <div className="flex justify-between p-4 bg-blue-50 rounded-2xl text-blue-600"><span>🔵 경제</span><span>{scores[c.key]?.blue}</span></div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="mt-12 text-center">
                        <button onClick={() => setShowScoreModal(true)} className="px-12 py-5 bg-slate-900 text-white rounded-2xl font-black text-xl shadow-2xl">최종 결과 집계</button>
                    </div>
                    {showScoreModal && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6">
                            <div className="bg-white rounded-3xl shadow-2xl p-10 max-w-lg w-full popup-in">
                                <h2 className="text-2xl font-black mb-8 text-center">최종 포인트 결과</h2>
                                <div className="space-y-4 mb-8">
                                    {['c1','c2','c3'].map((k,i)=>(
                                        <div key={k} className="flex justify-between items-center p-6 bg-slate-50 rounded-2xl border-2 border-slate-100 font-black">
                                            <span className="text-xl text-slate-700">제 {i+1} 협의체</span>
                                            <span className="text-4xl text-blue-600">{calculateFinal()[k]} PT</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>setShowScoreModal(false)} className="w-full py-5 bg-slate-100 rounded-2xl font-black text-slate-500">닫기</button>
                            </div>
                        </div>
                    )}
                </div>
            );

            // --- 협의체 개별 페이지 (유저 로그인 시) ---
            const cur = councils.find(c => c.id === activeTab);
            if (!cur) return null;
            const targetCouncilData = councils.find(c => c.key === tfCouncil);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 pb-32">
                    <header className="flex justify-between items-center mb-6">
                        <button onClick={()=>{setUser(null); setActiveTab(null);}} className="text-gray-400 font-bold bg-white px-4 py-2 rounded-xl shadow-sm">← 로그아웃</button>
                        <div className="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-sm shadow-xl flex items-center gap-2">
                            <span className="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                            {user.country} 대표
                        </div>
                    </header>

                    <div className={`bg-white border-t-8 ${cur.theme} rounded-3xl shadow-xl overflow-hidden mb-8`}>
                        <div className="p-8 bg-gray-50 border-b border-gray-100">
                            <h2 className="text-3xl font-black text-gray-900 mb-2">{cur.title}</h2>
                            <p className="text-gray-400 font-bold flex items-center gap-2">{cur.name} 공식 지시서</p>
                        </div>
                        
                        <div className="grid grid-cols-3 p-8 gap-3 text-center border-b font-black border-gray-100">
                            <div className="bg-red-50 p-4 rounded-2xl text-red-500"><div className="text-3xl font-black">{scores[cur.key]?.red}</div><div className="text-[10px] opacity-60">Crisis</div></div>
                            <div className="bg-emerald-50 p-4 rounded-2xl text-emerald-500"><div className="text-3xl font-black">{scores[cur.key]?.green}</div><div className="text-[10px] opacity-60">Fund</div></div>
                            <div className="bg-blue-50 p-4 rounded-2xl text-blue-500"><div className="text-3xl font-black">{scores[cur.key]?.blue}</div><div className="text-[10px] opacity-60">Power</div></div>
                        </div>

                        <div className="p-8">
                            <section className="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl">
                                <h3 className="font-black mb-6 flex items-center gap-2 tracking-tight">🚀 실시간 외교 토큰 전송 (20초 응답)</h3>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <select value={tfCouncil} onChange={e=>{setTfCouncil(e.target.value); setTfCountry("");}} className="w-full p-4 bg-slate-800 rounded-xl font-bold border-none">
                                            <option value="">수신 협의체 선택</option>
                                            {councils.filter(c=>c.key!==cur.key).map(c=><option key={c.key} value={c.key}>{c.name}</option>)}
                                        </select>
                                        <select value={tfCountry} onChange={e=>setTfCountry(e.target.value)} className="w-full p-4 bg-slate-800 rounded-xl font-bold border-none" disabled={!tfCouncil}>
                                            <option value="">수신 국가 선택</option>
                                            {targetCouncilData?.countries.map(ct=><option key={ct} value={ct}>{ct}</option>)}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 font-black">
                                        <select value={tfType} onChange={e=>setTfType(e.target.value)} className="p-4 bg-slate-800 rounded-xl border-none">
                                            <option value="red">🔴 위기</option><option value="green">🟢 복지</option><option value="blue">🔵 경제</option>
                                        </select>
                                        <div className="flex bg-slate-800 rounded-xl overflow-hidden h-[56px] border-none">
                                            <button onClick={()=>setTfAmt(Math.max(1, tfAmt-1))} className="px-5 bg-slate-700 font-black text-xl hover:bg-slate-600">-</button>
                                            <div className="flex-1 flex items-center justify-center text-lg">{tfAmt}</div>
                                            <button onClick={()=>setTfAmt(tfAmt+1)} className="px-5 bg-slate-700 font-black text-xl hover:bg-slate-600">+</button>
                                        </div>
                                    </div>
                                    <button onClick={requestTransfer} className="w-full py-5 bg-blue-500 rounded-xl font-black text-lg shadow-lg active:scale-95 transition-all mt-2 uppercase">Send Approval Request</button>
                                </div>
                            </section>
                        </div>

                        <div className="p-8 space-y-14">
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-yellow-500 font-black text-2xl"><EyeOff /> <h3>우리 팀 상황</h3></div>
                                <div className="bg-yellow-50 p-6 rounded-2xl border-l-4 border-yellow-400 italic text-lg leading-relaxed text-gray-700 mb-6 font-medium">"{cur.quote}"</div>
                                <p className="text-gray-600 leading-relaxed text-base">{cur.description}</p>
                            </section>
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-purple-500 font-black text-2xl"><Users /> <h3>팀원 역할</h3></div>
                                <div className="grid gap-3">
                                    {cur.roles.map((r, i) => (
                                        <div key={i} className="bg-purple-50 p-4 rounded-2xl border border-purple-100 flex flex-col">
                                            <div className="flex items-center gap-2 mb-1 font-black">
                                                <span className="text-gray-900">{r.country}</span>
                                                <span className="bg-purple-200 text-purple-800 text-[10px] px-2 py-0.5 rounded-full uppercase">{r.role}</span>
                                            </div>
                                            <p className="text-sm text-gray-500 leading-snug">{r.job}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-blue-500 font-black text-2xl"><Shield /> <h3>팀 미션</h3></div>
                                <div className="grid gap-4">
                                    {cur.missions.map(m => (
                                        <div key={m.id} className="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                                            <div className="flex items-center gap-3 mb-4 font-black"><span className="bg-blue-600 text-white text-xs px-2 py-1 rounded">{m.id}</span> {m.title}</div>
                                            <ul className="space-y-3">{m.steps.map((s, idx) => (<li key={idx} className="flex gap-3 text-sm text-gray-600"> <span className="bg-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black border shrink-0">{idx+1}</span>{s}</li>))}</ul>
                                        </div>
                                    ))}
                                </div>
                            </section>
                            {/* 점수 조건 복구 */}
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-emerald-500 font-black text-2xl"><TrendingUp /> <h3>이기는 방법 (Win Conditions)</h3></div>
                                <div className="grid gap-3 font-bold">
                                    {cur.winConditions.map((cond, idx) => (
                                        <div key={idx} className="flex items-center justify-between bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                            <span className="text-gray-700 text-sm">{cond.text}</span>
                                            <span className={`px-4 py-1 rounded-full text-xs font-black border ${cond.point < 0 ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-700'}`}>{cond.point < 0 ? cond.point : `+${cond.point}`}</span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>

                    {/* 수신 팝업 (20초 타이머) */}
                    {incomingRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6 text-center">
                            <div className="bg-white rounded-[40px] shadow-2xl p-10 max-w-sm w-full popup-in">
                                <div className="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl font-black shadow-inner border border-blue-100">{popupTimer}</div>
                                <h2 className="text-2xl font-black mb-2">외교 요청 도착!</h2>
                                <p className="mb-8 text-slate-500 leading-relaxed font-bold">
                                    <span className="text-blue-600">{incomingRequest.fromCountry}</span>에서 
                                    (<span className="text-slate-800">{incomingRequest.toCountry}</span>)에게 <br/>
                                    <b>{incomingRequest.type==='red'?'🔴 위기':incomingRequest.type==='green'?'🟢 복지':'🔵 경제'} {incomingRequest.amt}개</b>를 보냅니다.
                                </p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>handleAction(false)} className="py-5 bg-slate-100 rounded-3xl font-black text-slate-400">거절</button>
                                    <button onClick={()=>handleAction(true)} className="py-5 bg-blue-600 text-white rounded-3xl font-black shadow-lg">수락</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 송신 대기 팝업 (20초 타이머) */}
                    {sentRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6 text-center">
                            <div className="bg-white rounded-[40px] shadow-2xl p-10 max-w-sm w-full popup-in font-black">
                                <div className="w-20 h-20 border-8 border-blue-500 border-t-slate-100 rounded-full animate-spin mx-auto mb-6 flex items-center justify-center">
                                    <span className="animate-none text-xl text-blue-500">{popupTimer}</span>
                                </div>
                                <h2 className="text-2xl font-black mb-4">응답 대기 중...</h2>
                                <div className="bg-slate-50 p-6 rounded-3xl text-sm text-slate-500 leading-relaxed mb-8 border border-slate-100">
                                    <p className="text-slate-800 mb-2 font-black italic underline underline-offset-4">💡 확인 사항</p>
                                    <p><b>{sentRequest.toName}</b>의 응답이 없나요?</p>
                                    <p className="mt-2 text-blue-600 font-bold tracking-tighter">상대방 국가 대표와 함께 선생님께 가서 직접 교환을 완료하세요.</p>
                                </div>
                                <button onClick={()=>{db.ref(`game/requests/${sentRequest.toKey}/${sentRequest.id}`).remove(); setSentRequest(null);}} className="text-slate-300 font-bold hover:text-red-400">전송 요청 취소</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
