                    db.ref('game').set({ scores: initialScores, logs: null });
                    setTimerSeconds(300);
                    setTimerRunning(false);
                    setTimerStarted(false);
                    alert("리셋되었습니다.");
                }
            };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === "9998") { setActiveTab('score'); setPendingCouncil(null); setError(false); return; }
                if (passwordInput === "9997") { setActiveTab('public'); setPendingCouncil(null); setError(false); return; }
                if (passwordInput === "9999") { setActiveTab(6); setPendingCouncil(null); setError(false); return; }
                if (pendingCouncil && passwordInput === pendingCouncil.password) {
                    setActiveTab(pendingCouncil.id); setPendingCouncil(null); setError(false);
                } else { setError(true); setPasswordInput(""); }
            };

            // 결과 계산 로직
            const c1Eff = scores.c1.green + scores.c1.blue;
            const c2Eff = scores.c2.green + scores.c2.blue;
            const isBuilt = c2Eff >= 10;
            const calculateResults = () => {
                const results = { c1: 0, c2: 0, c3: 0 };
                if (scores.c1.red < scores.c2.red) results.c1 += 1;
                if (c1Eff > scores.c1.red) results.c1 += 1;
                if (isBuilt) results.c1 += 3;
                if (scores.c2.red < 10) results.c2 += 1;
                if (c2Eff > 1) results.c2 += 1;
                if (c2Eff > scores.c2.red) results.c2 += 3;
                if (scores.c3.red >= 0 && scores.c3.red <= 2) results.c3 += 1;
                results.c3 -= Math.max(0, 6 - scores.c3.blue);
                const t1 = scores.c1.green + scores.c1.blue, t2 = scores.c2.green + scores.c2.blue, t3 = scores.c3.green + scores.c3.blue;
                if (t3 > t1 && t3 > t2) results.c3 += 3;
                return results;
            };

            const finalResults = calculateResults();

            // --- UI 컴포넌트 ---
            const CoinControl = ({ councilKey, color, bgColor, label }) => (
                <div className="flex flex-col items-center bg-white p-4 rounded-3xl shadow-sm border border-gray-100 min-w-[120px]">
                    <span className="text-sm font-bold text-gray-400 mb-3">{label}</span>
                    <div className="flex items-center gap-3">
                        <button onClick={() => updateManual(councilKey, color, scores[councilKey][color] - 1)} className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center font-black text-xl hover:bg-gray-200">-</button>
                        <div className={`w-14 h-14 ${bgColor} rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-inner`}>{scores[councilKey][color]}</div>
                        <button onClick={() => updateManual(councilKey, color, scores[councilKey][color] + 1)} className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center font-black text-xl hover:bg-gray-200">+</button>
                    </div>
                </div>
            );

            const TransferPanel = ({councilKey}) => {
                const [to, setTo] = useState("");
                const [type, setType] = useState("red");
                const [amt, setAmt] = useState(1);
                return (
                    <div className="mt-8 p-8 bg-slate-900 text-white rounded-[2rem] shadow-2xl">
                        <h3 className="text-xl font-black mb-6 flex items-center gap-3">🚀 토큰 전송 (외교 활동)</h3>
                        <div className="space-y-6">
                            <select value={to} onChange={(e)=>setTo(e.target.value)} className="w-full p-5 bg-slate-800 border-none rounded-2xl font-bold text-lg outline-none">
                                <option value="">받는 협의체 선택</option>
                                {councils.filter(c => c.key !== councilKey && c.id !== 6).map(c => <option key={c.key} value={c.key}>{c.name}</option>)}
                            </select>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={type} onChange={(e)=>setType(e.target.value)} className="p-5 bg-slate-800 border-none rounded-2xl font-bold text-lg outline-none">
                                    <option value="red">🔴 위기 아동</option>
                                    <option value="green">🟢 복지 예산</option>
                                    <option value="blue">🔵 경제 예산</option>
                                </select>
                                <input type="number" value={amt} onChange={(e)=>setAmt(e.target.value)} min="1" className="p-5 bg-slate-800 border-none rounded-2xl text-center font-black text-xl outline-none" />
                            </div>
                            <button onClick={() => to ? transferToken(councilKey, to, type, amt) : alert("협의체를 선택하세요!")} className="w-full py-6 bg-blue-500 hover:bg-blue-600 rounded-2xl font-black text-xl transition-all active:scale-95">전송 승인</button>
                        </div>
                    </div>
                );
            };

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] text-center p-6">
                    <div className="bg-white p-12 md:p-16 rounded-[3rem] shadow-xl border border-gray-100 max-w-3xl w-full">
                        <div className="flex justify-center mb-8 text-blue-500 animate-pulse"><Globe size={60} /></div>
                        <h1 className="text-4xl md:text-5xl font-black text-gray-900 mb-6 tracking-tight">글로벌 아동 인권 수호 작전</h1>
                        <p className="text-xl text-gray-400 mb-12 leading-relaxed font-medium">협의체를 선택하고 보안 코드를 입력하십시오.</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {councils.filter(c => c.id !== 6).map((council) => (
                                <button key={council.id} onClick={() => { setPendingCouncil(council); setPasswordInput(""); setError(false); }} className="bg-gray-100 hover:bg-blue-50 text-gray-800 font-black py-10 px-6 rounded-3xl transition-all border-b-8 border-gray-300 hover:border-blue-400 active:border-b-0 active:translate-y-2 flex flex-col items-center gap-4 group">
                                    <Shield size={40} />
                                    <span className="text-2xl">{council.name}</span>
                                </button>
                            ))}
                        </div>
                        <button onClick={() => setPendingCouncil({id:'admin', password:'9997', name:'상황실'})} className="mt-12 text-gray-300 text-sm underline font-bold tracking-widest">ADMIN TERMINAL (9997)</button>
                    </div>
                </div>
            );

            const renderPasswordScreen = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] p-6 text-center">
                    <div className="bg-white p-12 rounded-[2.5rem] shadow-2xl border border-gray-100 max-w-md w-full">
                        <div className="mb-8 flex justify-center text-yellow-500"><Lock size={60}/></div>
                        <h2 className="text-3xl font-black mb-2">{pendingCouncil.name}</h2>
                        <p className="text-lg text-gray-400 mb-10 font-medium tracking-tight">보안 코드를 입력하세요.</p>
                        <form onSubmit={handlePasswordSubmit} className="space-y-8">
                            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="••••" autoFocus className="w-full bg-gray-50 border-4 border-gray-100 rounded-3xl py-6 text-center text-4xl font-black tracking-[0.5em] focus:outline-none focus:border-blue-400 transition-colors" />
                            <div className="grid grid-cols-2 gap-4">
                                <button type="button" onClick={() => setPendingCouncil(null)} className="py-5 rounded-2xl font-black text-xl text-gray-400 bg-gray-50 hover:bg-gray-100 transition-colors">취소</button>
                                <button type="submit" className="py-5 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">접속</button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            const renderPublicBoard = () => {
                const timeUp = timerStarted && timerSeconds === 0;
                return (
                    <div className="max-w-7xl mx-auto p-6 md:p-12 pb-24 text-center">
                        <button onClick={() => setActiveTab(null)} className="mb-8 text-gray-400 font-black text-xl hover:text-gray-900 transition-colors flex items-center mx-auto">← 메인 화면</button>
                        <div className="bg-white rounded-[3rem] shadow-xl border border-gray-100 p-12 mb-12">
                            <h2 className="text-2xl font-black text-gray-400 mb-8 uppercase tracking-widest">Negotiation Timer</h2>
                            {!timerStarted ? (
                                <button onClick={() => { setTimerSeconds(300); setTimerRunning(true); setTimerStarted(true); }} className="bg-blue-500 hover:bg-blue-600 text-white font-black text-3xl px-16 py-8 rounded-3xl shadow-xl transition-all active:scale-95">🚀 협상 시작 (5분)</button>
                            ) : (
                                <div>
                                    <div className={`text-[10rem] font-black mb-8 tabular-nums leading-none ${timerSeconds <= 60 ? 'text-red-600 animate-pulse' : 'text-slate-800'}`}>{timeUp ? '⏰' : formatTime(timerSeconds)}</div>
                                    <div className="flex gap-6 justify-center">
                                        {!timeUp && <button onClick={() => setTimerRunning(r => !r)} className={`px-10 py-5 rounded-2xl font-black text-xl shadow-lg transition-all ${timerRunning ? 'bg-yellow-400 text-yellow-900' : 'bg-green-500 text-white hover:bg-green-600'}`}>{timerRunning ? '⏸ 일시정지' : '▶ 재개'}</button>}
                                        <button onClick={() => { setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false); }} className="bg-gray-100 px-10 py-5 rounded-2xl font-black text-xl hover:bg-gray-200 transition-all">🔄 초기화</button>
                                    </div>
                                </div>
                            )}
                        </div>

                        <h2 className="text-3xl font-black text-gray-800 mb-8 flex items-center justify-center gap-4">📊 협의체 실시간 상황 <span className="text-lg font-bold text-blue-500 bg-blue-50 px-4 py-1 rounded-full underline">관리자 모드</span></h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20">
                            {councils.filter(c => c.id !== 6).map(council => (
                                <div key={council.id} className={`bg-white rounded-[2.5rem] shadow-2xl border-t-[12px] ${council.theme} p-8`}>
                                    <h3 className={`text-3xl font-black ${council.accent} mb-2`}>{council.name}</h3>
                                    <p className="text-gray-400 text-base font-bold mb-8">{council.countries}</p>
                                    <div className="space-y-4">
                                        <CoinControl councilKey={council.key} color="red" bgColor="bg-red-500" label="🔴 위기 아동" />
                                        <CoinControl councilKey={council.key} color="green" bgColor="bg-emerald-500" label="🟢 복지 예산" />
                                        <CoinControl councilKey={council.key} color="blue" bgColor="bg-blue-500" label="🔵 경제 예산" />
                                    </div>
                                    <div className="mt-10 pt-6 border-t-2 border-gray-50 flex justify-between items-center px-4">
                                        <span className="text-gray-400 font-black text-lg">SCORE</span>
                                        <span className="text-4xl font-black text-blue-600">{finalResults[council.key]} <small className="text-xl">PT</small></span>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="pt-20 border-t-4 border-dashed border-gray-200">
                            <button onClick={resetSession} className="bg-red-50 text-red-500 border-4 border-red-100 hover:bg-red-500 hover:text-white font-black py-8 px-20 rounded-[2.5rem] text-3xl shadow-2xl transition-all active:scale-95 flex items-center gap-6 mx-auto">
                                <AlertCircle size={48} /> [수업종료] 데이터 전체 리셋
                            </button>
                            <p className="text-gray-400 text-xl mt-6 font-bold italic">※ 누르면 모든 협의체의 코인 개수와 전송 로그가 초기화됩니다.</p>
                        </div>
                    </div>
                );
            };

            const renderScoreCalculator = () => (
                <div className="max-w-6xl mx-auto p-12 text-center">
                    <button onClick={() => setActiveTab(null)} className="mb-10 text-gray-400 font-black text-xl flex items-center mx-auto">← 메인 화면</button>
                    <div className="bg-white border-t-[16px] border-yellow-500 rounded-[3rem] shadow-2xl overflow-hidden mb-12">
                        <div className="bg-yellow-50 p-12 border-b-4 border-gray-100">
                            <h2 className="text-4xl font-black text-gray-900 flex items-center justify-center gap-4"><Calculator size={48} className="text-yellow-500" /> 최종 점수 통계</h2>
                        </div>
                        <div className="p-10 overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="border-b-4 border-gray-100">
                                        <th className="py-8 px-6 text-gray-400 font-black text-xl uppercase">협의체</th>
                                        <th className="py-8 px-6 text-red-500 font-black text-2xl text-center">🔴</th>
                                        <th className="py-8 px-6 text-emerald-600 font-black text-2xl text-center">🟢</th>
                                        <th className="py-8 px-6 text-blue-500 font-black text-2xl text-center">🔵</th>
                                        <th className="py-8 px-6 text-yellow-600 font-black text-2xl text-right">최종 점수</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y-2 divide-gray-50">
                                    {['c1', 'c2', 'c3'].map((key, i) => (
                                        <tr key={key} className="hover:bg-slate-50 transition-colors">
                                            <td className="py-10 px-6 font-black text-3xl text-slate-800">제 {i+1} 협의체</td>
                                            <td className="py-10 px-6 font-black text-4xl text-center text-red-500">{scores[key].red}</td>
                                            <td className="py-10 px-6 font-black text-4xl text-center text-emerald-600">{scores[key].green}</td>
                                            <td className="py-10 px-6 font-black text-4xl text-center text-blue-500">{scores[key].blue}</td>
                                            <td className="py-10 px-6 font-black text-6xl text-right text-blue-600">{finalResults[key]} <span className="text-2xl text-gray-300">PT</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <p className="text-gray-400 text-xl font-bold italic">위 점수는 상황실(9997)에서의 수정사항이 실시간으로 합산된 결과입니다.</p>
                </div>
            );

            const renderCouncilPage = (council) => (
                <div className="max-w-5xl mx-auto p-6 md:p-12 pb-40">
                    <button onClick={() => setActiveTab(null)} className="mb-8 text-gray-400 font-black text-xl flex items-center">← 메인 화면</button>
                    <div className={`bg-white border-t-[12px] ${council.theme} rounded-[3rem] shadow-2xl overflow-hidden`}>
                        <div className="bg-gray-50 p-10 border-b-2">
                            <div className="flex items-center justify-between mb-6"><span className="bg-red-500 text-white text-base font-black px-4 py-1.5 rounded-xl flex items-center gap-2 tracking-tighter uppercase"><Lock size={18} /> Classified Info</span><span className="text-gray-400 text-lg font-black font-mono tracking-widest">{council.name}</span></div>
                            <h2 className="text-4xl md:text-5xl font-black text-gray-900 mb-4">{council.title}</h2>
                            <p className="text-xl text-gray-500 font-bold leading-relaxed">{council.countries}</p>
                        </div>
                        <div className="p-10 bg-white grid grid-cols-3 gap-4 text-center border-b-4 border-gray-50">
                            <div className="p-8 bg-red-50 rounded-[2rem] border-2 border-red-100 shadow-sm"><div className="text-5xl font-black text-red-500 mb-2">{scores[council.key].red}</div><p className="text-sm text-red-400 font-black uppercase tracking-widest">위기 아동</p></div>
                            <div className="p-8 bg-emerald-50 rounded-[2rem] border-2 border-emerald-100 shadow-sm"><div className="text-5xl font-black text-emerald-500 mb-2">{scores[council.key].green}</div><p className="text-sm text-emerald-400 font-black uppercase tracking-widest">복지 예산</p></div>
                            <div className="p-8 bg-blue-50 rounded-[2rem] border-2 border-blue-100 shadow-sm"><div className="text-5xl font-black text-blue-500 mb-2">{scores[council.key].blue}</div><p className="text-sm text-blue-400 font-black uppercase tracking-widest">경제 예산</p></div>
                        </div>
                        <div className="p-10">
                            <TransferPanel councilKey={council.key} />
                        </div>
                        <div className="p-10 space-y-16">
                            <section><div className="flex items-center gap-4 mb-8"><span className="text-yellow-500 bg-yellow-50 p-4 rounded-2xl shadow-sm"><EyeOff size={36} /></span><h3 className="text-3xl font-black text-gray-900 tracking-tight">우리 팀 상황</h3></div><div className="bg-yellow-50 p-10 rounded-[2.5rem] border-l-[12px] border-yellow-400 italic text-2xl text-gray-700 leading-snug font-medium mb-8">"{council.quote}"</div><p className="text-xl text-gray-600 leading-relaxed font-medium">{council.description}</p></section>
                            <section><div className="flex items-center gap-4 mb-8"><span className="text-purple-500 bg-purple-50 p-4 rounded-2xl shadow-sm"><Users size={36} /></span><h3 className="text-3xl font-black text-gray-900 tracking-tight">팀원 역할 분담</h3></div><div className="grid gap-4">{council.roles && council.roles.map((r, i) => (<div key={i} className="bg-purple-50 border-2 border-purple-100 rounded-3xl p-6 shadow-sm"><div className="flex items-center gap-3 mb-2"><span className="font-black text-2xl text-gray-800">{r.country}</span><span className="text-sm bg-purple-200 text-purple-800 px-3 py-1 rounded-full font-black uppercase tracking-tighter">{r.role}</span></div><p className="text-lg text-gray-600 font-medium">{r.job}</p></div>))}</div></section>
                            <section><div className="flex items-center gap-4 mb-8"><span className="text-blue-500 bg-blue-50 p-4 rounded-2xl shadow-sm"><Shield size={36} /></span><h3 className="text-3xl font-black text-gray-900 tracking-tight">우리 팀 미션</h3></div><div className="grid gap-6">{council.missions.map((m) => (
                                <div key={m.id} className="bg-blue-50 border-2 border-blue-100 rounded-[2.5rem] p-10 shadow-sm">
                                    <div className="flex items-center gap-4 mb-6"><span className="bg-blue-600 text-white px-4 py-1 rounded-2xl font-black text-lg">{m.id}</span><span className="text-2xl font-black text-blue-900">{m.title}</span></div>
                                    <ol className="space-y-4">{m.steps.map((step, idx) => (<li key={idx} className="flex items-start gap-4 text-xl text-gray-700 font-medium leading-relaxed"><span className="flex-shrink-0 w-8 h-8 bg-blue-200 text-blue-700 rounded-full flex items-center justify-center text-sm font-black mt-1">{idx + 1}</span>{step}</li>))}</ol>
                                </div>
                            ))}</div></section>
                            <section><div className="flex items-center gap-4 mb-8"><span className="text-emerald-500 bg-emerald-50 p-4 rounded-2xl shadow-sm"><TrendingUp size={36} /></span><h3 className="text-3xl font-black text-gray-900 tracking-tight">이기는 방법</h3></div><div className="grid gap-4">{council.winConditions.map((cond, idx) => (<div key={idx} className="flex items-center justify-between bg-gray-50 p-8 rounded-3xl border-2 border-gray-100 shadow-sm"><div className="flex items-center gap-4"><ChevronRight size={24} className="text-emerald-500 flex-shrink-0" /><span className="text-xl text-gray-800 font-black">{cond.text}</span></div><span className={`ml-6 flex-shrink-0 px-6 py-2 rounded-2xl text-xl font-black border-4 ${cond.point < 0 ? 'bg-red-100 text-red-600 border-red-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200'}`}>{cond.point < 0 ? cond.point : `+${cond.point}`}</span></div>))}</div></section>
                        </div>
                    </div>
                    {/* 활동 로그 UI */}
                    <div className="mt-12 max-w-4xl mx-auto"><h4 className="text-lg font-black text-gray-400 mb-6 tracking-[0.2em] uppercase text-center">Global Live Activity</h4><div className="space-y-3">{logs.map((log, i) => (<div key={i} className="bg-white p-6 rounded-[1.5rem] text-lg font-bold shadow-md border-2 border-gray-50 flex justify-between items-center"><span>{log.from} <span className="text-blue-500 mx-2">→</span> {log.to} <span className="ml-4 text-slate-400">({log.type==='red'?'🔴':log.type==='green'?'🟢':'🔵'} {log.amt}개)</span></span><span className="text-gray-300 text-sm font-black">{log.time}</span></div>))}</div></div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-gray-800 font-sans selection:bg-blue-100">
                    {!activeTab && !pendingCouncil && renderHome()}
                    {pendingCouncil && renderPasswordScreen()}
                    {activeTab === 'score' && renderScoreCalculator()}
                    {activeTab === 'public' && renderPublicBoard()}
                    {activeTab === 'admin' && renderPublicBoard()}
                    {activeTab === 6 && renderCouncilPage(councils.find(c => c.id === activeTab))}
                    {typeof activeTab === 'number' && activeTab !== 6 && renderCouncilPage(councils.find(c => c.id === activeTab))}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
