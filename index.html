                description: "여러분은 세계에서 아동을 가장 잘 보호하는 나라들이에요. 하지만 제 2 협의체에서 구조된 아동들이 여러분의 나라로 오고 있어요. 복지기금(🟢)은 늘리고, 위기아동(🔴)은 줄여야 합니다. 제 3 협의체와 협상해서 도움을 얻으세요.",

                    { country: "네덜란드", role: "대변인",       job: "다른 협의체에 우리 팀의 입장과 요청을 공식 발표합니다." },

            },
            {
                id: 2, key: 'c2', name: "제 2 협의체", password: "1101",
                countries: ["팔레스타인", "미얀마", "예멘", "우크라이나", "시리아", "아프가니스탄"],
                theme: "border-red-500", accent: "text-red-600",
                title: "비상 탈출",
                quote: "생존을 위해서 나라를 떠나야만 합니다.",
                description: "전쟁과 경제 위기로 아동 보호 시스템이 거의 없습니다. 🔴 위기아동 토큰이 많을수록 위험한 상황입니다. 다른 나라에 위기 토큰을 넘기고, 🟢 복지기금을 늘려야 아동을 보호할 수 있어요. 외교를 잘 활용하세요!",
                roles: [
                    { country: "팔레스타인",   role: "협상가 A", job: "제 1 협의체에 지원을 요청하고 협상합니다." },
                    { country: "미얀마",       role: "협상가 B", job: "제 3 협의체에 지원을 요청하고 협상합니다." },
                    { country: "예멘",         role: "재정 담당", job: "우리 팀 토큰 현황을 파악하고 어떻게 교환할지 팀에 알려줍니다." },
                    { country: "우크라이나",   role: "대변인",   job: "우리 팀이 처한 위기 상황을 다른 협의체에 전달합니다." },
                    { country: "시리아",       role: "전략가",   job: "어떤 팀과 어떤 조건으로 교환할지 계획을 세웁니다." },
                    { country: "아프가니스탄", role: "기록 담당", job: "교환된 토큰 내역을 정리하고 점수를 계산합니다." }
                ],
                missions: [
                    { id: "M1", title: "긴급 조치", steps: ["🔴 위기아동 토큰을 다른 팀에 넘겨서 우리 팀의 위기 상황을 줄이세요."] },
                    { id: "M2", title: "재정 지원", steps: ["🟢 복지기금 토큰을 10개 이상 확보하세요."] }
                ],
                winConditions: [
                    { text: "게임 시작보다 🔴 위기아동 토큰이 줄어듦", point: 1 },
                    { text: "게임 시작보다 🟢 복지기금이 늘어남", point: 1 },
                    { text: "🟢 복지기금이 🔴 위기아동보다 많음", point: 3 }
                ]
            },
            {
                id: 3, key: 'c3', name: "제 3 협의체", password: "9070",
                countries: ["대한민국", "러시아", "미국", "프랑스"],
                theme: "border-emerald-500", accent: "text-emerald-600",
                title: "세계의 강대국",
                quote: "우리는 이미 우리의 역할을 하고 있습니다.",
                description: "가장 부유하고 강력한 나라들입니다. 🔵 경제력 토큰을 지키면서 외교를 통해 이익을 극대화하세요. 🔴 위기아동 토큰을 너무 많이 받으면 점수가 깎입니다. 스마트하게 협상하는 것이 핵심입니다.",
                roles: [
                    { country: "대한민국", role: "수석 협상가", job: "다른 협의체에 우리 팀의 조건과 제안을 전달합니다." },
                    { country: "러시아",   role: "재정 담당",   job: "🔵 경제력 토큰이 6개 아래로 내려가지 않도록 지킵니다." },
                    { country: "미국",     role: "대변인",       job: "들어온 제안이 우리에게 유리한지 판단하고 팀에 알립니다." },
                    { country: "프랑스",   role: "전략가",       job: "어떤 요청을 수락하고 거절할지 전략을 세웁니다." }
                ],
                missions: [
                    { id: "M1", title: "전략적 중재",   steps: ["다른 팀으로부터 '🔴 위기아동 토큰을 보내지 않겠다'는 약속을 받아내세요."] },
                    { id: "M2", title: "경제 예산 사수", steps: ["🔵 경제력 토큰을 6개 이상 유지하세요. 잃은 개수만큼 점수가 깎입니다."] }
                ],
                winConditions: [
                    { text: "🔴 위기아동 토큰을 0~2개로 유지", point: 1 },
                    { text: "🔵 경제력 토큰 1개 잃을 때마다 -1점 (초기 6개 기준)", point: -1 },
                    { text: "우리 팀의 전체 토큰 합계가 세 팀 중 최대", point: 3 }
                ]
            }
        ];

        const tokenLabel = (type) =>
            type === 'red' ? '🔴 위기아동' : type === 'green' ? '🟢 복지기금' : '🔵 경제력';

        // ── App ───────────────────────────────────────────────────────
        const App = () => {
            // 모든 useState는 조건문 밖 최상단에 선언 (React Hooks 규칙)
            const [user, setUser]                       = useState(null);
            const [activeTab, setActiveTab]             = useState(null);
            const [pendingCouncil, setPendingCouncil]   = useState(null);
            const [selectedCountry, setSelectedCountry] = useState("");
            const [passwordInput, setPasswordInput]     = useState("");
            const [timerSeconds, setTimerSeconds]       = useState(300);
            const [timerRunning, setTimerRunning]       = useState(false);
            const [timerStarted, setTimerStarted]       = useState(false);
            const [scores, setScores]                   = useState({});
            const [logs, setLogs]                       = useState([]);
            const [showScoreModal, setShowScoreModal]   = useState(false);
            const [incomingRequest, setIncomingRequest] = useState(null);
            const [sentRequest, setSentRequest]         = useState(null);
            const [popupTimer, setPopupTimer]           = useState(20);
            const [tfCouncil, setTfCouncil] = useState("");
            const [tfCountry, setTfCountry] = useState("");
            const [tfType, setTfType]       = useState("red");
            const [tfAmt, setTfAmt]         = useState(1);
            // 관리자 수동 제어 (if 블록 안에 두면 Hooks 오류 → 최상단 선언)
            const [af, setAf]   = useState("c1");
            const [at, setAt]   = useState("c2");
            const [aty, setAty] = useState("red");
            const [aa, setAa]   = useState(1);

            // ── 함수 ──────────────────────────────────────────────────

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === "9997") { setActiveTab('public'); setPasswordInput(""); setPendingCouncil(null); return; }
                if (passwordInput === "9998") { setActiveTab('admin');  setPasswordInput(""); setPendingCouncil(null); return; }
                if (pendingCouncil && (passwordInput === pendingCouncil.password || passwordInput === "9999")) {
                    setUser({ councilKey: pendingCouncil.key, councilId: pendingCouncil.id, country: selectedCountry });
                    setActiveTab(pendingCouncil.id);
                    setPendingCouncil(null); setPasswordInput("");
                } else {
                    alert("보안 코드가 틀렸습니다. 선생님께 확인해 주세요.");
                    setPasswordInput("");
                }
            };

            const requestTransfer = () => {
                if (!tfCouncil || !tfCountry) return alert("받는 협의체와 국가를 모두 선택해 주세요.");
                if (user.councilKey === tfCouncil) return alert("자신의 협의체에는 보낼 수 없습니다.");
                const have = scores[user.councilKey]?.[tfType] ?? 0;
                if (have < tfAmt) return alert(`토큰이 부족합니다. 현재 보유: ${have}개`);
                const toName = `${tfCountry} (${councils.find(c => c.key === tfCouncil).name})`;
                const newRef = db.ref(`game/requests/${tfCouncil}`).push();
                newRef.set({ fromKey: user.councilKey, fromCountry: user.country, type: tfType, amt: tfAmt, toCountry: tfCountry });
                setSentRequest({ id: newRef.key, toKey: tfCouncil, toName });
                newRef.on('value', snap => { if (!snap.exists()) { setSentRequest(null); newRef.off(); } });
            };

            const handleAction = (isAccept) => {
                if (!incomingRequest) return;
                const { id, fromKey, fromCountry, type, amt, toCountry } = incomingRequest;
                if (isAccept) {
                    const updates = {};
                    updates[`game/scores/${fromKey}/${type}`]         = Math.max(0, (scores[fromKey]?.[type] || 0) - parseInt(amt));
                    updates[`game/scores/${user.councilKey}/${type}`] = (scores[user.councilKey]?.[type] || 0) + parseInt(amt);
                    db.ref().update(updates);
                    db.ref('game/logs').push({ from: fromCountry, to: toCountry, type, amt, time: new Date().toLocaleTimeString() });
                }
                db.ref(`game/requests/${user.councilKey}/${id}`).remove();
            };

            const adminManual = (f, t, type, amt) => {
                if (f === t) return alert("보내는 팀과 받는 팀이 같습니다.");
                const amount = parseInt(amt);
                const updates = {};
                updates[`game/scores/${f}/${type}`] = Math.max(0, (scores[f]?.[type] || 0) - amount);
                updates[`game/scores/${t}/${type}`] = (scores[t]?.[type] || 0) + amount;
                db.ref().update(updates);
                alert("수동 전송 완료");
            };

            // ── Effects ───────────────────────────────────────────────

            useEffect(() => {
                db.ref('game/scores').on('value', snap => {
                    if (snap.val()) setScores(snap.val());
                    else db.ref('game/scores').set({ c1:{red:4,green:9,blue:0}, c2:{red:10,green:1,blue:0}, c3:{red:2,green:4,blue:6} });
                });
                db.ref('game/logs').on('value', snap => snap.val() && setLogs(Object.values(snap.val()).reverse().slice(0,5)));
                return () => { db.ref('game/scores').off(); db.ref('game/logs').off(); };
            }, []);

            useEffect(() => {
                let interval;
                if (incomingRequest || sentRequest) {
                    setPopupTimer(20);
                    interval = setInterval(() => {
                        setPopupTimer(prev => {
                            if (prev <= 1) {
                                if (incomingRequest) db.ref(`game/requests/${user.councilKey}/${incomingRequest.id}`).remove();
                                if (sentRequest) { db.ref(`game/requests/${sentRequest.toKey}/${sentRequest.id}`).remove(); setSentRequest(null); }
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [incomingRequest, sentRequest]);

            useEffect(() => {
                if (!user) return;
                const reqRef = db.ref(`game/requests/${user.councilKey}`);
                reqRef.on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const firstKey = Object.keys(data)[0]; // 수정: [0] 없으면 배열 전체가 key로 잘못 전달됨
                        setIncomingRequest({ id: firstKey, ...data[firstKey] });
                    } else {
                        setIncomingRequest(null);
                    }
                });
                return () => reqRef.off();
            }, [user]);

            useEffect(() => {
                if (!timerRunning || timerSeconds <= 0) return;
                const id = setInterval(() => setTimerSeconds(s => s - 1), 1000);
                return () => clearInterval(id);
            }, [timerRunning]);

            useEffect(() => {
                if (timerStarted && timerSeconds === 0) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const play = (t, f) => {
                            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                            o.type = 'square'; o.frequency.setValueAtTime(f, t);
                            g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                            o.connect(g); g.connect(audioCtx.destination);
                            o.start(t); o.stop(t + 0.2);
                        };
                        [0, 0.3, 0.6].forEach(t => play(audioCtx.currentTime + t, 880));
                    } catch(e) {}
                    setTimerRunning(false);
                }
            }, [timerSeconds, timerStarted]);

            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            const calculateFinal = () => {
                const r = { c1:0, c2:0, c3:0 };
                if (!scores.c1 || !scores.c2 || !scores.c3) return r;
                const c1T = (scores.c1.green||0)+(scores.c1.blue||0);
                const c2T = (scores.c2.green||0)+(scores.c2.blue||0);
                const c3T = (scores.c3.green||0)+(scores.c3.blue||0);
                if ((scores.c1.red||0) < (scores.c2.red||0)) r.c1 += 1;
                if (c1T > (scores.c1.red||0)) r.c1 += 1;
                if (c2T >= 10) r.c1 += 3;
                if ((scores.c2.red||0) < 10) r.c2 += 1;
                if ((scores.c2.green||0) > 1) r.c2 += 1;
                if ((scores.c2.green||0) > (scores.c2.red||0)) r.c2 += 3;
                if ((scores.c3.red||0) <= 2) r.c3 += 1;
                r.c3 -= Math.max(0, 6-(scores.c3.blue||0));
                if (c3T > c1T && c3T > c2T) r.c3 += 3;
                return r;
            };

            // ── 화면 분기 ─────────────────────────────────────────────

            if (!user && !activeTab && !pendingCouncil) return (
                <div className="flex flex-col items-center justify-center min-h-screen text-center p-6 bg-slate-50">
                    <div className="bg-white p-12 rounded-3xl shadow-xl border border-gray-200 max-w-2xl w-full">
                        <div className="mb-6 flex justify-center animate-pulse"><Globe /></div>
                        <h1 className="text-3xl font-black mb-2 tracking-tight">글로벌 아동 인권 수호 작전</h1>
                        <p className="text-gray-400 mb-8 text-sm">참여할 협의체를 선택하고 보안 코드를 입력하세요.</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {councils.map(c => (
                                <button key={c.id}
                                    onClick={() => { setPendingCouncil(c); setSelectedCountry(c.countries[0]); }}
                                    className="p-6 bg-gray-50 rounded-2xl border-b-4 border-gray-200 hover:border-blue-500 font-bold transition-all text-lg flex flex-col items-center gap-2">
                                    <Shield size={24} className="text-gray-400" />
                                    {c.name}
                                    <span className="text-xs text-gray-400 font-normal">{c.title}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (pendingCouncil) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-100">
                    <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center">
                        <div className="text-5xl mb-6">🔒</div>
                        <h2 className="text-2xl font-bold mb-2">{pendingCouncil.name} 접속</h2>
                        <p className="text-gray-400 text-sm mb-6">본인 국가를 선택하고 팀 보안 코드를 입력하세요.</p>
                        <form onSubmit={handlePasswordSubmit} className="space-y-4 text-left">
                            <div>
                                <label className="text-xs font-bold text-gray-400 ml-1 block mb-1">내 국가 선택</label>
                                <select value={selectedCountry} onChange={e=>setSelectedCountry(e.target.value)} className="w-full p-4 bg-gray-50 rounded-xl font-bold border-2 border-gray-100">
                                    {pendingCouncil.countries.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-400 ml-1 block mb-1">팀 보안 코드 (선생님이 알려줍니다)</label>
                                <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder="••••" className="w-full p-4 bg-gray-50 rounded-xl text-center text-xl border-2 border-gray-100" autoFocus />
                            </div>
                            <div className="grid grid-cols-2 gap-2 pt-4">
                                <button type="button" onClick={()=>setPendingCouncil(null)} className="p-4 font-bold text-gray-400 hover:bg-gray-50 rounded-xl">취소</button>
                                <button type="submit" className="p-4 bg-blue-500 text-white rounded-xl font-bold shadow-lg">접속</button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            if (activeTab === 'admin') return (
                <div className="max-w-2xl mx-auto p-6 bg-slate-50 min-h-screen">
                    <button onClick={()=>setActiveTab(null)} className="mb-6 text-gray-400 font-bold">← 메인 화면</button>
                    <div className="bg-white p-8 rounded-3xl shadow-xl space-y-6">
                        <h2 className="text-2xl font-black flex items-center gap-2 text-yellow-600"><Calculator /> 수동 제어 모드 (선생님 전용)</h2>
                        <p className="text-sm text-gray-400">학생 기기에서 전송이 안 될 때 직접 토큰을 이동할 수 있습니다.</p>
                        <div className="space-y-3">
                            <label className="text-xs font-bold text-gray-400">보내는 팀 → 받는 팀</label>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={af} onChange={e=>setAf(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold border-2 border-slate-100">{councils.map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                                <select value={at} onChange={e=>setAt(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold border-2 border-slate-100">{councils.map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={aty} onChange={e=>setAty(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold border-2 border-slate-100">
                                    <option value="red">🔴 위기아동</option><option value="green">🟢 복지기금</option><option value="blue">🔵 경제력</option>
                                </select>
                                <input type="number" min="1" value={aa} onChange={e=>setAa(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold text-center border-2 border-slate-100" />
                            </div>
                            <button onClick={()=>adminManual(af,at,aty,aa)} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg">강제 전송 실행</button>
                        </div>
                        <div>
                            <h3 className="font-black text-sm text-gray-400 mb-3">현재 점수 현황</h3>
                            {councils.map(c=>(
                                <div key={c.key} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl text-sm font-bold mb-2">
                                    <span>{c.name}</span>
                                    <span className="text-red-500">🔴{scores[c.key]?.red??'-'}</span>
                                    <span className="text-emerald-500">🟢{scores[c.key]?.green??'-'}</span>
                                    <span className="text-blue-500">🔵{scores[c.key]?.blue??'-'}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (activeTab === 'public') return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <button onClick={()=>setActiveTab(null)} className="mb-6 text-gray-400 font-bold">← 메인 화면</button>
                    <div className="bg-white rounded-3xl shadow-xl p-12 text-center mb-8 border-b-8 border-blue-500">
                        <h2 className="text-2xl font-bold text-gray-400 mb-6 uppercase tracking-widest">Negotiation Timer</h2>
                        {!timerStarted ? (
                            <button onClick={()=>{setTimerSeconds(300);setTimerRunning(true);setTimerStarted(true);}} className="px-16 py-8 bg-blue-500 text-white font-black text-3xl rounded-3xl shadow-2xl hover:scale-105 transition-all">
                                협상 시작 (5분)
                            </button>
                        ) : (
                            <div>
                                <div className={`text-[120px] font-black leading-none mb-6 tabular-nums ${timerSeconds<=60?'text-red-500 animate-pulse':'text-blue-600'}`}>
                                    {timerSeconds===0 ? '⏰ 종료!' : formatTime(timerSeconds)}
                                </div>
                                <div className="flex gap-4 justify-center">
                                    <button onClick={()=>setTimerRunning(!timerRunning)} className={`px-10 py-4 rounded-2xl font-black text-white ${timerRunning?'bg-yellow-500':'bg-green-500'}`}>
                                        {timerRunning ? '⏸ PAUSE' : '▶ RESUME'}
                                    </button>
                                    <button onClick={()=>{setTimerSeconds(300);setTimerRunning(false);setTimerStarted(false);}} className="px-10 py-4 bg-slate-200 rounded-2xl font-black text-slate-500">🔄 RESET</button>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                        {councils.map(c=>(
                            <div key={c.id} className={`bg-white rounded-3xl p-6 border-t-8 ${c.theme} shadow-lg`}>
                                <h3 className={`font-black text-xl mb-4 ${c.accent}`}>{c.name}</h3>
                                <div className="space-y-3 font-black text-lg">
                                    <div className="flex justify-between p-4 bg-red-50 rounded-2xl text-red-600"><span>🔴 위기아동</span><span>{scores[c.key]?.red??'-'}</span></div>
                                    <div className="flex justify-between p-4 bg-emerald-50 rounded-2xl text-emerald-600"><span>🟢 복지기금</span><span>{scores[c.key]?.green??'-'}</span></div>
                                    <div className="flex justify-between p-4 bg-blue-50 rounded-2xl text-blue-600"><span>🔵 경제력</span><span>{scores[c.key]?.blue??'-'}</span></div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="text-center">
                        <button onClick={()=>setShowScoreModal(true)} className="px-12 py-5 bg-slate-900 text-white rounded-2xl font-black text-xl shadow-2xl">최종 결과 집계</button>
                    </div>
                    {showScoreModal && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-6">
                            <div className="bg-white rounded-3xl shadow-2xl p-10 max-w-lg w-full popup-in">
                                <h2 className="text-2xl font-black mb-8 text-center">최종 포인트 결과</h2>
                                <div className="space-y-4 mb-8">
                                    {['c1','c2','c3'].map((k,i)=>(
                                        <div key={k} className="flex justify-between items-center p-6 bg-slate-50 rounded-2xl border-2 border-slate-100 font-black">
                                            <span className="text-xl text-slate-700">제 {i+1} 협의체</span>
                                            <span className="text-4xl text-blue-600">{calculateFinal()[k]} PT</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>setShowScoreModal(false)} className="w-full py-5 bg-slate-100 rounded-2xl font-black text-slate-500">닫기</button>
                            </div>
                        </div>
                    )}
                </div>
            );

            const cur = councils.find(c => c.id === activeTab);
            if (!cur) return null;
            const targetCouncilData = councils.find(c => c.key === tfCouncil);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 pb-32">
                    <header className="flex justify-between items-center mb-6">
                        <button onClick={()=>{setUser(null);setActiveTab(null);}} className="text-gray-400 font-bold bg-white px-4 py-2 rounded-xl shadow-sm">← 로그아웃</button>
                        <div className="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-sm shadow-xl flex items-center gap-2">
                            <span className="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                            {user.country} 대표
                        </div>
                    </header>

                    <div className={`bg-white border-t-8 ${cur.theme} rounded-3xl shadow-xl overflow-hidden mb-8`}>
                        <div className="p-8 bg-gray-50 border-b border-gray-100">
                            <h2 className="text-3xl font-black text-gray-900 mb-2">{cur.title}</h2>
                            <p className="text-gray-400 font-bold">{cur.name} 공식 지시서</p>
                        </div>

                        <div className="grid grid-cols-3 p-8 gap-3 text-center border-b font-black border-gray-100">
                            <div className="bg-red-50 p-4 rounded-2xl text-red-500">
                                <div className="text-3xl">{scores[cur.key]?.red??'-'}</div>
                                <div className="text-[11px] opacity-70 mt-1">🔴 위기아동</div>
                            </div>
                            <div className="bg-emerald-50 p-4 rounded-2xl text-emerald-500">
                                <div className="text-3xl">{scores[cur.key]?.green??'-'}</div>
                                <div className="text-[11px] opacity-70 mt-1">🟢 복지기금</div>
                            </div>
                            <div className="bg-blue-50 p-4 rounded-2xl text-blue-500">
                                <div className="text-3xl">{scores[cur.key]?.blue??'-'}</div>
                                <div className="text-[11px] opacity-70 mt-1">🔵 경제력</div>
                            </div>
                        </div>

                        <div className="p-8">
                            <section className="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl">
                                <h3 className="font-black mb-1 text-lg">🚀 외교 토큰 전송</h3>
                                <p className="text-slate-400 text-xs mb-5">상대방이 20초 안에 응답해야 합니다. 전송 후 상대방 화면을 확인하세요.</p>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs text-slate-400 mb-1 block">받는 협의체</label>
                                            <select value={tfCouncil} onChange={e=>{setTfCouncil(e.target.value);setTfCountry("");}} className="w-full p-4 bg-slate-800 rounded-xl font-bold border-none">
                                                <option value="">협의체 선택</option>
                                                {councils.filter(c=>c.key!==cur.key).map(c=><option key={c.key} value={c.key}>{c.name}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-400 mb-1 block">받는 국가 (담당자)</label>
                                            <select value={tfCountry} onChange={e=>setTfCountry(e.target.value)} className="w-full p-4 bg-slate-800 rounded-xl font-bold border-none" disabled={!tfCouncil}>
                                                <option value="">{tfCouncil ? "국가 선택" : "협의체를 먼저 선택"}</option>
                                                {targetCouncilData?.countries.map(ct=><option key={ct} value={ct}>{ct}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 font-black">
                                        <div>
                                            <label className="text-xs text-slate-400 mb-1 block">토큰 종류</label>
                                            <select value={tfType} onChange={e=>setTfType(e.target.value)} className="w-full p-4 bg-slate-800 rounded-xl border-none">
                                                <option value="red">🔴 위기아동</option>
                                                <option value="green">🟢 복지기금</option>
                                                <option value="blue">🔵 경제력</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-400 mb-1 block">수량 (보유: {scores[cur.key]?.[tfType]??0}개)</label>
                                            <div className="flex bg-slate-800 rounded-xl overflow-hidden h-[56px]">
                                                <button onClick={()=>setTfAmt(Math.max(1,tfAmt-1))} className="px-5 bg-slate-700 font-black text-xl hover:bg-slate-600">-</button>
                                                <div className="flex-1 flex items-center justify-center text-lg">{tfAmt}</div>
                                                <button onClick={()=>setTfAmt(tfAmt+1)} className="px-5 bg-slate-700 font-black text-xl hover:bg-slate-600">+</button>
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={requestTransfer} className="w-full py-5 bg-blue-500 rounded-xl font-black text-lg shadow-lg active:scale-95 transition-all">
                                        전송 요청 보내기 →
                                    </button>
                                </div>
                            </section>
                        </div>

                        <div className="p-8 space-y-14">
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-yellow-500 font-black text-2xl"><EyeOff /> <h3>우리 팀 상황</h3></div>
                                <div className="bg-yellow-50 p-6 rounded-2xl border-l-4 border-yellow-400 italic text-lg leading-relaxed text-gray-700 mb-6 font-medium">"{cur.quote}"</div>
                                <p className="text-gray-600 leading-relaxed text-base">{cur.description}</p>
                            </section>

                            <section>
                                <div className="flex items-center gap-3 mb-4 text-purple-500 font-black text-2xl"><Users /> <h3>팀원 역할</h3></div>
                                <p className="text-gray-400 text-sm mb-4">각자 맡은 역할에 따라 활동하세요.</p>
                                <div className="grid gap-3">
                                    {cur.roles.map((r,i)=>(
                                        <div key={i} className="bg-purple-50 p-4 rounded-2xl border border-purple-100">
                                            <div className="flex items-center gap-2 mb-1 font-black">
                                                <span className="text-gray-900">{r.country}</span>
                                                <span className="bg-purple-200 text-purple-800 text-[10px] px-2 py-0.5 rounded-full uppercase">{r.role}</span>
                                            </div>
                                            <p className="text-sm text-gray-500 leading-snug">{r.job}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <section>
                                <div className="flex items-center gap-3 mb-4 text-blue-500 font-black text-2xl"><Shield size={24} /> <h3>팀 미션</h3></div>
                                <p className="text-gray-400 text-sm mb-4">협상을 통해 아래 미션을 달성하세요. 미션 달성이 곧 점수로 이어집니다.</p>
                                <div className="grid gap-4">
                                    {cur.missions.map(m=>(
                                        <div key={m.id} className="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                                            <div className="flex items-center gap-3 mb-4 font-black">
                                                <span className="bg-blue-600 text-white text-xs px-2 py-1 rounded">{m.id}</span>
                                                {m.title}
                                            </div>
                                            <ul className="space-y-3">
                                                {m.steps.map((s,idx)=>(
                                                    <li key={idx} className="flex gap-3 text-sm text-gray-600">
                                                        <span className="bg-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black border shrink-0">{idx+1}</span>
                                                        {s}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <section>
                                <div className="flex items-center gap-3 mb-4 text-emerald-500 font-black text-2xl"><TrendingUp /> <h3>이기는 방법 (승리 조건)</h3></div>
                                <p className="text-gray-400 text-sm mb-4">게임 종료 시 아래 조건을 만족할수록 포인트를 얻습니다.</p>
                                <div className="grid gap-3 font-bold">
                                    {cur.winConditions.map((cond,idx)=>(
                                        <div key={idx} className="flex items-center justify-between bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                            <span className="text-gray-700 text-sm">{cond.text}</span>
                                            <span className={`px-4 py-1 rounded-full text-xs font-black border ml-3 shrink-0 ${cond.point<0?'bg-red-100 text-red-600':'bg-emerald-100 text-emerald-700'}`}>
                                                {cond.point<0 ? cond.point : `+${cond.point}`}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>

                    {incomingRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-6 text-center">
                            <div className="bg-white rounded-[40px] shadow-2xl p-10 max-w-sm w-full popup-in">
                                <div className="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl font-black shadow-inner border border-blue-100">{popupTimer}</div>
                                <h2 className="text-2xl font-black mb-2">외교 요청 도착!</h2>
                                <p className="mb-2 text-slate-500 font-bold">
                                    <span className="text-blue-600">{incomingRequest.fromCountry}</span>에서 (<span className="text-slate-800">{incomingRequest.toCountry}</span>)에게
                                </p>
                                <p className="mb-8 text-xl font-black">{tokenLabel(incomingRequest.type)} {incomingRequest.amt}개를 보냅니다.</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>handleAction(false)} className="py-5 bg-slate-100 rounded-3xl font-black text-slate-400">거절</button>
                                    <button onClick={()=>handleAction(true)} className="py-5 bg-blue-600 text-white rounded-3xl font-black shadow-lg">수락</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {sentRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-6 text-center">
                            <div className="bg-white rounded-[40px] shadow-2xl p-10 max-w-sm w-full popup-in font-black">
                                <div className="w-20 h-20 border-8 border-blue-500 border-t-slate-100 rounded-full animate-spin mx-auto mb-6 flex items-center justify-center">
                                    <span className="animate-none text-xl text-blue-500">{popupTimer}</span>
                                </div>
                                <h2 className="text-2xl font-black mb-4">응답 대기 중...</h2>
                                <div className="bg-slate-50 p-6 rounded-3xl text-sm text-slate-500 leading-relaxed mb-8 border border-slate-100">
                                    <p className="text-slate-800 mb-2 font-black italic underline underline-offset-4">💡 확인 사항</p>
                                    <p><b>{sentRequest.toName}</b>의 응답이 없나요?</p>
                                    <p className="mt-2 text-blue-600 font-bold">상대방 국가 대표와 함께 선생님께 가서 직접 교환을 완료하세요.</p>
                                </div>
                                <button onClick={()=>{db.ref(`game/requests/${sentRequest.toKey}/${sentRequest.id}`).remove();setSentRequest(null);}} className="text-slate-300 font-bold hover:text-red-400">
                                    전송 요청 취소
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
