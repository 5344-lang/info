                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const playBeep = (t, f) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square'; osc.frequency.setValueAtTime(f, t);
                    gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(t); osc.stop(t + 0.2);
                };
                [0, 0.3, 0.6].forEach(t => playBeep(audioCtx.currentTime + t, 880));

                if (isAccept) {
                    const updates = {};
                    updates[`game/scores/${fromKey}/${type}`] = scores[fromKey][type] - amt;
                    updates[`game/scores/${user.councilKey}/${type}`] = scores[user.councilKey][type] + amt;
                    db.ref().update(updates);
                    db.ref('game/logs').push({ from: fromCountry, to: councils.find(c=>c.key===user.councilKey).name, type, amt, time: new Date().toLocaleTimeString() });
                }
                db.ref(`game/requests/${user.councilKey}/${id}`).remove();
            };

            const adminForceTransfer = (f, t, type, amt) => {
                if (f === t) return alert("보내는 쪽과 받는 쪽이 같습니다!");
                const updates = {};
                updates[`game/scores/${f}/${type}`] = Math.max(0, scores[f][type] - amt);
                updates[`game/scores/${t}/${type}`] = (scores[t][type] || 0) + parseInt(amt);
                db.ref().update(updates);
                db.ref('game/logs').push({ from: `[운영진]${councils.find(c=>c.key===f).name}`, to: councils.find(c=>c.key===t).name, type, amt, time: new Date().toLocaleTimeString() });
                alert("강제 전송 완료");
            };

            // --- 렌더링 도우미 ---
            const c1Total = (scores.c1?.green || 0) + (scores.c1?.blue || 0);
            const c2Total = (scores.c2?.green || 0) + (scores.c2?.blue || 0);
            const finalResults = {
                c1: (scores.c1?.red < scores.c2?.red ? 1 : 0) + (c1Total > scores.c1?.red ? 1 : 0) + (c2Total >= 10 ? 3 : 0),
                c2: (scores.c2?.red < 10 ? 1 : 0) + (c2Total > 1 ? 1 : 0) + (c2Total > scores.c2?.red ? 3 : 0),
                c3: (scores.c3?.red <= 2 ? 1 : 0) - (Math.max(0, 6 - (scores.c3?.blue || 0))) + ( (scores.c3?.green+scores.c3?.blue) > (scores.c1?.green+scores.c1?.blue) ? 3 : 0)
            };

            // --- UI 렌더링 ---
            if (!user && !activeTab && !pendingCouncil) return (
                <div className="flex flex-col items-center justify-center min-h-screen text-center p-6">
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-gray-200 max-w-2xl w-full">
                        <div className="flex justify-center mb-6 text-blue-500 animate-pulse"><Globe /></div>
                        <h1 className="text-4xl font-black text-gray-900 mb-4 tracking-tight">글로벌 아동 인권 수호 작전</h1>
                        <p className="text-gray-500 mb-10 text-lg">소속된 협의체를 선택하고 보안 코드를 입력하십시오.</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            {councils.map((council) => (
                                <button key={council.id} onClick={() => { setPendingCouncil(council); setSelectedCountry(council.countries); }} className="bg-gray-100 hover:bg-blue-50 text-gray-800 font-bold py-6 px-4 rounded-2xl transition-all border-b-4 border-gray-300 hover:border-blue-400 flex flex-col items-center gap-2">
                                    <Shield size={24} /> <span>{council.name}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (pendingCouncil) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-200 max-w-md w-full text-center">
                        <Lock size={48} className="mx-auto mb-6 text-yellow-500" />
                        <h2 className="text-2xl font-bold mb-8">{pendingCouncil.name} 보안 접속</h2>
                        <form onSubmit={handlePasswordSubmit} className="space-y-6">
                            <select value={selectedCountry} onChange={e=>setSelectedCountry(e.target.value)} className="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl font-bold">
                                {pendingCouncil.countries.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="••••" autoFocus className={`w-full bg-gray-50 border-2 ${error ? 'border-red-400' : 'border-gray-200'} rounded-xl py-4 text-center text-2xl tracking-[0.5em] focus:outline-none focus:border-blue-400`} />
                            <div className="grid grid-cols-2 gap-4">
                                <button type="button" onClick={() => setPendingCouncil(null)} className="py-4 font-bold text-gray-400">취소</button>
                                <button type="submit" className="py-4 bg-blue-500 text-white rounded-xl font-bold">접속 승인</button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            if (activeTab === 'admin_manual') {
                const [af, setAf] = useState("c1"); const [at, setAt] = useState("c2"); const [aty, setAty] = useState("red"); const [aa, setAa] = useState(1);
                return (
                    <div className="max-w-2xl mx-auto p-6">
                        <button onClick={()=>setActiveTab(null)} className="mb-6 text-gray-400 font-bold">← 메인</button>
                        <div className="bg-white p-8 rounded-3xl shadow-xl space-y-6">
                            <h2 className="text-2xl font-black flex items-center gap-2"><Calculator /> 관리자 수동 제어</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={af} onChange={e=>setAf(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold">{councils.map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                                <select value={at} onChange={e=>setAt(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold">{councils.map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={aty} onChange={e=>setAty(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold"><option value="red">🔴 위기</option><option value="green">🟢 복지</option><option value="blue">🔵 경제</option></select>
                                <input type="number" value={aa} onChange={e=>setAa(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold text-center" />
                            </div>
                            <button onClick={() => adminForceTransfer(af, at, aty, aa)} className="w-full py-5 bg-yellow-500 text-white rounded-2xl font-black text-lg">전송 실행</button>
                        </div>
                    </div>
                );
            }

            if (activeTab === 'public') return (
                <div className="max-w-6xl mx-auto p-8">
                    <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 font-bold">← 메인 화면</button>
                    <div className="bg-white rounded-3xl shadow-xl p-8 mb-8 text-center">
                        <h2 className="text-2xl font-bold text-gray-700 mb-6">⏱ 협상 타이머</h2>
                        {!timerStarted ? (
                            <button onClick={() => { setTimerSeconds(300); setTimerRunning(true); setTimerStarted(true); }} className="bg-blue-500 text-white font-black text-2xl px-12 py-6 rounded-2xl shadow-lg">🚀 협상 시작 (5분)</button>
                        ) : (
                            <div>
                                <div className={`text-8xl md:text-9xl font-black mb-4 ${timerSeconds <= 60 ? 'text-red-600' : 'text-blue-600'}`}>{(timerSeconds === 0) ? '⏰' : (Math.floor(timerSeconds/60)+":"+(timerSeconds%60).toString().padStart(2,'0'))}</div>
                                <div className="flex gap-4 justify-center">
                                    <button onClick={() => setTimerRunning(!timerRunning)} className="bg-gray-100 px-8 py-4 rounded-xl font-bold">{timerRunning ? '⏸ 일시정지' : '▶ 재개'}</button>
                                    <button onClick={() => { setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false); }} className="bg-gray-100 px-8 py-4 rounded-xl font-bold">🔄 리셋</button>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {councils.filter(c=>c.id!==6).map(c => (
                            <div key={c.id} className={`bg-white rounded-3xl shadow-lg border-t-8 ${c.theme} p-6 text-center`}>
                                <h3 className={`text-xl font-black ${c.accent} mb-4`}>{c.name}</h3>
                                <div className="space-y-2">
                                    <div className="flex justify-between p-3 bg-red-50 rounded-xl font-black text-red-600"><span>🔴 위기</span><span>{scores[c.key]?.red}</span></div>
                                    <div className="flex justify-between p-3 bg-emerald-50 rounded-xl font-black text-emerald-600"><span>🟢 복지</span><span>{scores[c.key]?.green}</span></div>
                                    <div className="flex justify-between p-3 bg-blue-50 rounded-xl font-black text-blue-600"><span>🔵 경제</span><span>{scores[c.key]?.blue}</span></div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="mt-8 text-center">
                        <button onClick={() => setShowScoreModal(true)} className="bg-blue-500 text-white px-8 py-4 rounded-2xl font-black">최종 점수 확인</button>
                    </div>
                    {showScoreModal && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6">
                            <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-lg w-full">
                                <h2 className="text-2xl font-black mb-6 text-center">🏆 최종 점수</h2>
                                <div className="space-y-4 mb-6">
                                    {['c1','c2','c3'].map((k,i)=>(
                                        <div key={k} className="flex justify-between items-center p-4 bg-gray-50 rounded-xl">
                                            <span className="font-bold">제 {i+1} 협의체</span>
                                            <span className="text-2xl font-black">{finalResults[k]} PT</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>setShowScoreModal(false)} className="w-full py-4 bg-gray-200 rounded-xl font-bold">닫기</button>
                            </div>
                        </div>
                    )}
                </div>
            );

            // 협의체 개별 페이지
            const currentCouncil = councils.find(c => c.id === activeTab);
            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 pb-32">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={() => {setUser(null); setActiveTab(null);}} className="text-gray-400 font-bold">← 로그아웃</button>
                        <span className="bg-blue-100 text-blue-700 px-4 py-1 rounded-full font-black text-sm">{user.country} 대표</span>
                    </div>
                    <div className={`bg-white border-t-8 ${currentCouncil.theme} rounded-3xl shadow-xl overflow-hidden`}>
                        <div className="bg-gray-50 p-8 border-b">
                            <h2 className="text-3xl font-black mb-2">{currentCouncil.title}</h2>
                            <p className="text-gray-500">{currentCouncil.name} 공식 지시서</p>
                        </div>
                        <div className="p-8 grid grid-cols-3 gap-2 text-center border-b font-black">
                            <div className="p-4 bg-red-50 rounded-2xl"><div className="text-3xl text-red-500">{scores[currentCouncil.key]?.red}</div><p className="text-xs text-gray-400">위기 아동</p></div>
                            <div className="p-4 bg-emerald-50 rounded-2xl"><div className="text-3xl text-emerald-500">{scores[currentCouncil.key]?.green}</div><p className="text-xs text-gray-400">복지 예산</p></div>
                            <div className="p-4 bg-blue-50 rounded-2xl"><div className="text-3xl text-blue-500">{scores[currentCouncil.key]?.blue}</div><p className="text-xs text-gray-400">경제 예산</p></div>
                        </div>
                        <div className="p-8">
                            <section className="bg-slate-900 text-white rounded-3xl p-6">
                                <h3 className="text-lg font-black mb-4">🚀 토큰 전송 (상대방 수락 필수)</h3>
                                <div className="space-y-4">
                                    <select value={transferTo} onChange={e=>setTransferTo(e.target.value)} className="w-full p-4 bg-slate-800 rounded-xl font-bold text-white">
                                        <option value="">받는 협의체 선택</option>
                                        {councils.filter(c => c.key !== currentCouncil.key && c.id !== 6).map(c => <option key={c.key} value={c.key}>{c.name}</option>)}
                                    </select>
                                    <div className="grid grid-cols-2 gap-2 text-white">
                                        <select value={transferType} onChange={e=>setTransferType(e.target.value)} className="p-4 bg-slate-800 rounded-xl font-bold">
                                            <option value="red">🔴 위기 아동</option><option value="green">🟢 복지 예산</option><option value="blue">🔵 경제 예산</option>
                                        </select>
                                        <input type="number" value={transferAmt} onChange={e=>setTransferAmt(e.target.value)} className="p-4 bg-slate-800 rounded-xl font-bold text-center" />
                                    </div>
                                    <button onClick={requestTransfer} className="w-full py-4 bg-blue-500 rounded-xl font-black">전송 승인 요청</button>
                                </div>
                            </section>
                        </div>
                        <div className="p-8 space-y-12">
                            <section><div className="flex items-center gap-3 mb-5 font-bold text-2xl text-yellow-500"><EyeOff /> <h3>우리 팀 상황</h3></div><div className="bg-yellow-50 p-6 rounded-2xl border-l-4 border-yellow-400 italic mb-6">"{currentCouncil.quote}"</div><p className="text-gray-600 leading-relaxed">{currentCouncil.description}</p></section>
                            <section><div className="flex items-center gap-3 mb-5 font-bold text-2xl text-purple-500"><Users /> <h3>팀원 역할</h3></div><div className="grid gap-3">{currentCouncil.roles.map((r, i) => (<div key={i} className="bg-purple-50 p-4 rounded-2xl border border-purple-200 font-bold"><span className="text-gray-900">{r.country}</span> | <span className="text-purple-800 text-sm">{r.role}</span><p className="text-sm text-gray-600 mt-1 font-normal">{r.job}</p></div>))}</div></section>
                            <section><div className="flex items-center gap-3 mb-5 font-bold text-2xl text-blue-500"><Shield /> <h3>우리 팀 미션</h3></div><div className="grid gap-5">{currentCouncil.missions.map((m) => (<div key={m.id} className="bg-blue-50 p-6 rounded-2xl border border-blue-200"><div className="font-bold text-lg mb-4">{m.id}. {m.title}</div><ol className="space-y-2">{m.steps.map((step, idx) => (<li key={idx} className="text-gray-700 text-sm"> {idx + 1}. {step}</li>))}</ol></div>))}</div></section>
                        </div>
                    </div>
                    {/* 수신/송신 팝업 */}
                    {incomingRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6">
                            <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center">
                                <h2 className="text-xl font-black mb-4">외교 요청 도착!</h2>
                                <p className="mb-6"><span className="font-bold text-blue-600">{incomingRequest.fromCountry}</span>에서 <br/><span className="font-bold">{incomingRequest.amt}개</span>를 보내려 합니다. 받으시겠습니까?</p>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={()=>handleRequestAction(false)} className="py-4 bg-gray-100 rounded-2xl font-bold">거절</button>
                                    <button onClick={()=>handleRequestAction(true)} className="py-4 bg-blue-500 text-white rounded-2xl font-bold">수락</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {sentRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6 text-center">
                            <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full">
                                <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                                <h2 className="text-xl font-black mb-4">응답 대기 중</h2>
                                <div className="bg-blue-50 p-5 rounded-2xl mb-6 text-sm text-blue-800 leading-relaxed italic">
                                    <p>({sentRequest.toName})가 응답이 없나요?</p>
                                    <p className="mt-2 font-bold underline">({sentRequest.toName}) 대표와 함께 선생님께 와서 토큰을 교환하세요.</p>
                                </div>
                                <button onClick={()=>{db.ref(`game/requests/${sentRequest.toKey}/${sentRequest.id}`).remove(); setSentRequest(null);}} className="text-gray-300 font-bold">요청 취소</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
