<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 아동 인권 수호 작전 - 비밀 대시보드</title>
    <!-- React 및 필수 라이브러리 CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 아이콘 컴포넌트 (Lucide 대체용 간단한 SVG)
        const IconGlobe = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const IconKey = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3m-3-3l-4-4"/></svg>;
        const IconEyeOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>;
        const IconTrendingDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>;
        const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState(null);
            const [pendingCouncil, setPendingCouncil] = useState(null);
            const [passwordInput, setPasswordInput] = useState("");
            const [error, setError] = useState(false);

            const councils = [
                {
                    id: 1,
                    name: "제1협의체",
                    password: "0912",
                    title: "보호의 한계 (Limits of Protection)",
                    countries: "캐나다, 독일, 네덜란드, 스웨덴, 뉴질랜드",
                    quote: "우리는 모든 아이를 구하고 싶지만, 우리 아이들의 식판도 비어가고 있습니다.",
                    initialStatus: { red: 4, green: 9, blue: 0 },
                    description: "여러분은 세계에서 가장 앞선 아동 복지 시스템을 갖췄습니다. 하지만 제2협의체에서 구조된 아동들의 치료와 교육을 도맡으면서 예산이 바닥나고 있습니다. 자국민의 반발을 막기 위해 아래 미션을 수행하세요.",
                    missions: [
                        { id: "M1", title: "책임 분담", content: "제3협의체에게 '부유한 국가로서 위기 아동 보호 시설 건립 비용'을 분담하라고 강력히 요구하세요." },
                        { id: "M2", title: "시스템 전수", content: "제2협의체에게 '아동 보호법 제정 및 행정 시스템 기술 지원'을 약속하세요. 대신, 당장 우리나라로 오는 위기 아동의 숫자를 줄여달라고(현지 보호 강화) 협상하세요." }
                    ],
                    winConditions: [
                        { text: "위기아동지수(🔴)를 제2협의체보다 적게 유지하기", point: 1 },
                        { text: "보유한 아동복지예산(🟢)이 위기아동지수(🔴)보다 많아야 함", point: 1 },
                        { text: "위기아동지수(🔴)를 0으로 만들기", point: 3 }
                    ],
                    theme: "border-blue-500",
                    accent: "text-blue-500"
                },
                {
                    id: 2,
                    name: "제2협의체",
                    password: "1101",
                    title: "비상 탈출 (Emergency Escape)",
                    countries: "팔레스타인, 미얀마, 예멘, 우크라이나, 시리아, 아프간",
                    quote: "생존을 위해서 나라를 떠나야만 합니다.",
                    initialStatus: { red: 10, green: 1, blue: 0 },
                    description: "여러분은 전쟁과 내전, 경제 붕괴로 인해 아동복지에 투자할 예산도, 시스템도 갖추지 못하고 있습니다. 국민은 생존을 위해 난민이 되어야 합니다. 아동들의 생존을 위해 아래 미션을 수행하세요.",
                    missions: [
                        { id: "M1", title: "긴급 조치", content: "제1·3협의체에게 '아동의 생존권을 보장하기 위해 위기 아동을 수용하라'고 강력히 요구하세요. (빨간 토큰을 최대한 타 협의체로 보내세요.)" },
                        { id: "M2", title: "재정 지원", content: "제1·3협의체에게 '위기 아동 보호 시설 건립 비용'을 달라고 부탁하세요. 금액은 많을수록 좋습니다." }
                    ],
                    winConditions: [
                        { text: "위기아동지수(🔴)가 기존(10개)보다 줄어듦", point: 1 },
                        { text: "아동복지예산(🟢)이 상승함", point: 1 },
                        { text: "보유한 아동복지예산(🟢)이 위기아동지수(🔴)보다 많아야 함", point: 3 }
                    ],
                    theme: "border-red-500",
                    accent: "text-red-500"
                },
                {
                    id: 3,
                    name: "제3협의체",
                    password: "9070",
                    title: "세계의 강대국 (Global Powers)",
                    countries: "대한민국, 러시아, 미국, 프랑스",
                    quote: "우리는 이미 우리의 역할을 하고 있습니다.",
                    initialStatus: { red: 2, green: 4, blue: 6 },
                    description: "여러분은 세계에서 가장 부유하고 기술적으로 발전된 국가들입니다. 하지만 경제에 큰 관심을 두고 있어 아동인권에는 관심이 적습니다. 국제사회는 여러분의 투자를 바라고 있습니다. 강대국 지위를 유지하세요.",
                    missions: [
                        { id: "M1", title: "책임 전가", content: "제1협의체에게 '제2협의체의 위기 아동을 더 많이 수용하라'고 강력히 요구하세요." },
                        { id: "M2", title: "철통 보안", content: "제2협의체에게 '금전적 지원'을 약속하는 대신, 우리 나라로 위기 아동을 절대 보내지 않겠다는 확답을 받으세요." }
                    ],
                    winConditions: [
                        { text: "위기아동지수(🔴)를 0~2개 사이로 유지하기", point: 1 },
                        { text: "경제예산(🔵) 6개를 하나도 사용하지 않고 지키기", point: 1 },
                        { text: "아동복지예산(🟢)과 경제예산(🔵)을 합쳐 전체 협의체 중 가장 많이 보유하기", point: 3 }
                    ],
                    theme: "border-emerald-500",
                    accent: "text-emerald-500"
                }
            ];

            const handleCouncilSelect = (council) => {
                setPendingCouncil(council);
                setPasswordInput("");
                setError(false);
            };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === pendingCouncil.password) {
                    setActiveTab(pendingCouncil.id);
                    setPendingCouncil(null);
                    setError(false);
                } else {
                    setError(true);
                    setPasswordInput("");
                }
            };

            const handleBackToMain = () => {
                setActiveTab(null);
                setPendingCouncil(null);
                setPasswordInput("");
                setError(false);
            };

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[80vh] text-center p-6">
                    <div className="bg-slate-800 p-8 md:p-12 rounded-3xl shadow-2xl border border-slate-700 max-w-2xl w-full">
                        <div className="flex justify-center mb-6 animate-pulse"><IconGlobe /></div>
                        <h1 className="text-4xl font-black text-white mb-4 tracking-tight text-center">글로벌 아동 인권 수호 작전</h1>
                        <div className="h-1 w-20 bg-blue-500 mx-auto mb-6 rounded-full"></div>
                        <p className="text-slate-400 mb-10 text-lg leading-relaxed">
                            본 시스템은 각 협의체 외교관에게만 허용된 1급 기밀 정보를 포함하고 있습니다. 소속된 협의체를 선택하고 보안 코드를 입력하십시오.
                        </p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {councils.map((council) => (
                                <button
                                    key={council.id}
                                    onClick={() => handleCouncilSelect(council)}
                                    className="bg-slate-700 hover:bg-slate-600 text-white font-bold py-5 px-6 rounded-2xl transition-all border-b-4 border-slate-900 active:border-b-0 active:translate-y-1 flex flex-col items-center gap-2 group"
                                >
                                    <div className="group-hover:scale-110 transition-transform text-slate-400 group-hover:text-blue-400"><IconShield /></div>
                                    {council.name}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderPasswordScreen = () => (
                <div className="flex flex-col items-center justify-center min-h-[80vh] p-6">
                    <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 max-w-md w-full">
                        <div className="flex justify-center mb-6">
                            <div className="p-4 bg-slate-900 rounded-full border border-slate-700 text-yellow-500">
                                <IconLock />
                            </div>
                        </div>
                        <h2 className="text-2xl font-bold text-white text-center mb-2">{pendingCouncil.name} 보안 접속</h2>
                        <p className="text-slate-400 text-center mb-8">4자리 기밀 보안 코드를 입력하십시오.</p>
                        
                        <form onSubmit={handlePasswordSubmit} className="space-y-6">
                            <div className="relative">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"><IconKey /></div>
                                <input
                                    type="password"
                                    value={passwordInput}
                                    onChange={(e) => setPasswordInput(e.target.value)}
                                    placeholder="PASSWORD"
                                    autoFocus
                                    className={`w-full bg-slate-950 border-2 ${error ? 'border-red-500' : 'border-slate-700'} rounded-xl py-4 pl-12 pr-4 text-white text-center text-2xl tracking-[1em] focus:outline-none focus:border-blue-500 transition-colors`}
                                />
                            </div>
                            
                            {error && (
                                <div className="flex items-center gap-2 text-red-500 text-sm justify-center animate-bounce">
                                    <IconAlertCircle />
                                    <span>보안 코드가 일치하지 않습니다.</span>
                                </div>
                            )}
                            
                            <div className="grid grid-cols-2 gap-4">
                                <button type="button" onClick={() => setPendingCouncil(null)} className="py-4 rounded-xl font-bold text-slate-400 hover:bg-slate-700 transition-colors">취소</button>
                                <button type="submit" className="py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">접속 승인</button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            const renderCouncilPage = (council) => (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    <button onClick={handleBackToMain} className="mb-6 text-slate-400 hover:text-white flex items-center transition-colors font-medium">← 메인 보안 터미널로 돌아가기</button>
                    <div className={`bg-slate-900 border-t-8 ${council.theme} rounded-3xl shadow-2xl overflow-hidden`}>
                        <div className="bg-slate-800 p-8 border-b border-slate-700">
                            <div className="flex items-center justify-between mb-4">
                                <span className="bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded tracking-[0.2em] uppercase flex items-center gap-1"><IconLock /> Top Secret</span>
                                <span className="text-slate-500 text-xs font-mono">ENCRYPTED_ID: {council.name.slice(-1)}X-2024-MUN</span>
                            </div>
                            <h2 className="text-4xl font-black text-white mb-3 tracking-tight text-left">{council.title}</h2>
                            <div className="flex items-center gap-2">
                                <div className={`w-2 h-2 rounded-full animate-pulse ${council.id === 1 ? 'bg-blue-500' : council.id === 2 ? 'bg-red-500' : 'bg-emerald-500'}`}></div>
                                <p className={`${council.accent} font-bold text-lg uppercase tracking-wider`}>{council.name} 지시서</p>
                            </div>
                            <p className="text-slate-400 mt-2 text-sm text-left">{council.countries}</p>
                        </div>

                        <div className="p-8 bg-slate-800/30 flex flex-wrap gap-8 justify-around border-b border-slate-700 text-left">
                            <div className="text-center">
                                <div className="w-20 h-20 bg-red-600 rounded-2xl flex items-center justify-center text-white text-3xl font-black mx-auto mb-3">{council.initialStatus.red}</div>
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest text-center">위기 아동 지수</p>
                            </div>
                            <div className="text-center">
                                <div className="w-20 h-20 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-3xl font-black mx-auto mb-3">{council.initialStatus.green}</div>
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest text-center">아동 복지 예산</p>
                            </div>
                            {council.initialStatus.blue > 0 && (
                                <div className="text-center">
                                    <div className="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl font-black mx-auto mb-3">{council.initialStatus.blue}</div>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest text-center">경제 예산</p>
                                </div>
                            )}
                        </div>

                        <div className="p-8 space-y-10 text-left">
                            <section>
                                <div className="flex items-center gap-3 mb-5 text-yellow-500"><IconEyeOff /> <h3 className="text-2xl font-bold text-white">현황 및 상황 분석</h3></div>
                                <div className="bg-slate-800 p-6 rounded-2xl border-l-4 border-yellow-500 italic text-slate-300 text-lg leading-relaxed shadow-inner">"{council.quote}"</div>
                                <p className="mt-6 text-slate-400 leading-relaxed text-base">{council.description}</p>
                            </section>

                            <section>
                                <div className="flex items-center gap-3 mb-5 text-blue-500"><IconShield /> <h3 className="text-2xl font-bold text-white">비밀 개별 미션</h3></div>
                                <div className="grid gap-5">
                                    {council.missions.map((m) => (
                                        <div key={m.id} className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-sm">
                                            <div className="flex items-center gap-2 mb-2">
                                                <span className="text-blue-500 font-black text-xs uppercase tracking-widest px-2 py-0.5 bg-blue-500/10 rounded">{m.id}</span>
                                                <span className="text-white font-bold text-lg">{m.title}</span>
                                            </div>
                                            <p className="text-slate-300 leading-relaxed">{m.content}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <section>
                                <div className="flex items-center gap-3 mb-5 text-emerald-500"><IconTrendingDown /> <h3 className="text-2xl font-bold text-white">최종 승리 조건 (Victory)</h3></div>
                                <div className="grid gap-3">
                                    {council.winConditions.map((cond, idx) => (
                                        <div key={idx} className="flex items-center justify-between bg-slate-800/20 p-5 rounded-2xl border border-slate-800">
                                            <span className="text-slate-300 font-medium text-left">{cond.text}</span>
                                            <span className="bg-emerald-600/20 text-emerald-400 px-4 py-1.5 rounded-full text-sm font-black border border-emerald-600/30">+{cond.point}</span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                        <div className="p-6 bg-slate-950 text-slate-600 text-[10px] font-mono text-center uppercase tracking-[0.3em] border-t border-slate-800">AUTHORIZED PERSONNEL ONLY • ACCESS LOGGED</div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {!activeTab && !pendingCouncil && renderHome()}
                    {pendingCouncil && renderPasswordScreen()}
                    {activeTab && renderCouncilPage(councils.find(c => c.id === activeTab))}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
