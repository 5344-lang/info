            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        };

                    { country: "미얀마",       role: "협상가 B", job: "제 3 협의체에 지원을 요청하고 협상합니다." },
                    { country: "예멘",         role: "재정 담당", job: "우리 팀 토큰 현황을 파악하고 어떻게 교환할지 팀에 알려줍니다." },

            },
            {
                id: 3, key: 'c3', name: "제 3 협의체", pwKey: "c3",
                countries: ["대한민국", "러시아", "미국", "프랑스"],
                theme: "border-emerald-500", accent: "text-emerald-600",
                title: "세계의 강대국",
                quote: "우리는 이미 우리의 역할을 하고 있습니다.",
                description: "가장 부유하고 강력한 나라들입니다. 🔵 경제발전기금 토큰을 지키면서 외교를 통해 이익을 극대화하세요. 🔴 위기아동 토큰을 너무 많이 받으면 점수가 깎입니다. 스마트하게 협상하는 것이 핵심입니다.",
                roles: [
                    { country: "대한민국", role: "수석 협상가", job: "다른 협의체에 우리 팀의 조건과 제안을 전달합니다." },
                    { country: "러시아",   role: "재정 담당",   job: "🔵 경제발전기금 토큰이 6개 아래로 내려가지 않도록 지킵니다." },
                    { country: "미국",     role: "대변인",       job: "들어온 제안이 우리에게 유리한지 판단하고 팀에 알립니다." },
                    { country: "프랑스",   role: "전략가",       job: "어떤 요청을 수락하고 거절할지 전략을 세웁니다." }
                ],
                missions: [
                    { id: "M1", title: "전략적 중재",   steps: ["다른 팀으로부터 '🔴 위기아동 토큰을 보내지 않겠다'는 약속을 받아내세요."] },
                    { id: "M2", title: "경제 예산 사수", steps: ["🔵 경제발전기금 토큰을 8개 이상 유지하세요. 6개 아래로 내려가면 개수당 -1점이 됩니다."] },
                    { id: "M3", title: "전략적 기여",   steps: ["🟢 복지기금 토큰을 다른 협의체에 최소 1회 이상 지원하세요. 강대국도 국제 아동인권 논의에 참여합니다."] }
                ],
                winConditions: [
                    { text: "🔴 위기아동 토큰을 0~2개로 유지", point: 1 },
                    { text: "🔵 경제발전기금 토큰 1개 잃을 때마다 -1점 (초기 6개 기준)", point: -1 },
                    { text: "🟢 복지기금을 다른 협의체에 1회 이상 지원", point: 1 },
                    { text: "🔵 경제발전기금 토큰 8개 이상 유지", point: 3 }
                ]
            }
        ];

        const tokenLabel = (type) =>
            type === 'red' ? '🔴 위기아동' : type === 'green' ? '🟢 복지기금' : '🔵 경제발전기금';

        // ── App ───────────────────────────────────────────────────────
        const App = () => {
            // 모든 useState는 조건문 밖 최상단에 선언 (React Hooks 규칙)
            const [user, setUser]                       = useState(() => { try { const s = sessionStorage.getItem('mun_user'); return s ? JSON.parse(s) : null; } catch { return null; } });
            const [activeTab, setActiveTab]             = useState(() => { try { const v = sessionStorage.getItem('mun_activeTab'); if (!v) return null; const n = parseInt(v); return !isNaN(n) ? n : v; } catch { return null; } });
            const [pendingCouncil, setPendingCouncil]   = useState(null);
            const [selectedCountry, setSelectedCountry] = useState("");
            const [passwordInput, setPasswordInput]     = useState("");
            const [globeClicks, setGlobeClicks]         = useState(0);
            const [timerSeconds, setTimerSeconds]       = useState(300);
            const [timerRunning, setTimerRunning]       = useState(false);
            const [timerStarted, setTimerStarted]       = useState(false);
            const [scores, setScores]                   = useState({});
            const [logs, setLogs]                       = useState([]);
            const [showScoreModal, setShowScoreModal]   = useState(false);
            const [incomingRequest, setIncomingRequest] = useState(null);
            const [sentRequest, setSentRequest]         = useState(null);
            const [popupTimer, setPopupTimer]           = useState(20);
            const [confirmMsg, setConfirmMsg]           = useState(null);
            const [tfCouncil, setTfCouncil] = useState("");
            const [tfCountry, setTfCountry] = useState("");
            const [tfType, setTfType]       = useState("red");
            const [tfAmt, setTfAmt]         = useState(0);
            // 관리자 수동 제어 (if 블록 안에 두면 Hooks 오류 → 최상단 선언)
            const [af, setAf]         = useState("c1");
            const [afCountry, setAfCountry] = useState("");
            const [at, setAt]         = useState("c2");
            const [atCountry, setAtCountry] = useState("");
            const [aty, setAty]       = useState("red");
            const [aa, setAa]         = useState(1);
            const [c3WelfareGiven, setC3WelfareGiven] = useState(false);
            const [sessionActive, setSessionActive]   = useState(null); // null = 로딩 중
            const [pwHashes, setPwHashes]             = useState(null); // null = 로딩 중

            // ── 함수 ──────────────────────────────────────────────────

            const handlePasswordSubmit = async (e) => {
                e.preventDefault();
                if (!pwHashes) return;
                const h = await hashPw(passwordInput);
                if (h === pwHashes.public) { setActiveTab('public'); setPasswordInput(""); setPendingCouncil(null); return; }
                if (h === pwHashes.admin)  { setActiveTab('admin');  setPasswordInput(""); setPendingCouncil(null); return; }
                if (pendingCouncil && h === pwHashes.demo) {
                    setUser({ councilKey: pendingCouncil.key, councilId: pendingCouncil.id, country: selectedCountry, demo: true });
                    setActiveTab(pendingCouncil.id);
                    setPendingCouncil(null); setPasswordInput("");
                } else if (pendingCouncil && h === pwHashes[pendingCouncil.pwKey]) {
                    setUser({ councilKey: pendingCouncil.key, councilId: pendingCouncil.id, country: selectedCountry });
                    setActiveTab(pendingCouncil.id);
                    setPendingCouncil(null); setPasswordInput("");
                } else {
                    alert("보안 코드가 틀렸습니다. 선생님께 확인해 주세요.");
                    setPasswordInput("");
                }
            };

            const requestTransfer = () => {
                if (user?.demo) return alert("📋 샘플 모드입니다.\n실제 전송은 팀 보안 코드로 접속하세요.");
                if (!tfCouncil || !tfCountry) return alert("받는 협의체와 국가를 모두 선택해 주세요.");
                if (tfAmt <= 0) return alert("수량은 1개 이상이어야 합니다.");
                if (user.councilKey === tfCouncil) return alert("자신의 협의체에는 보낼 수 없습니다.");
                const have = scores[user.councilKey]?.[tfType] ?? 0;
                if (have < tfAmt) return alert(`토큰이 부족합니다. 현재 보유: ${have}개`);
                const toName = `${tfCountry} (${councils.find(c => c.key === tfCouncil).name})`;
                const newRef = db.ref(`game/requests/${tfCouncil}`).push();
                newRef.set({ fromKey: user.councilKey, fromCountry: user.country, type: tfType, amt: tfAmt, toCountry: tfCountry });
                setSentRequest({ id: newRef.key, toKey: tfCouncil, toName, fromCountry: user.country, toCountry: tfCountry, type: tfType, amt: tfAmt });
                newRef.on('value', snap => {
                    if (!snap.exists()) { setSentRequest(null); newRef.off(); }
                    else if (snap.val()?.result) {
                        const r = snap.val().result;
                        setSentRequest(null);
                        setConfirmMsg(r === 'accepted' ? '보냈습니다! ✅' : '거절되었습니다. ❌');
                        newRef.off();
                    }
                });
            };

            const handleAction = (isAccept) => {
                if (!incomingRequest) return;
                const { id, fromKey, fromCountry, type, amt, toCountry } = incomingRequest;
                const reqRef = db.ref(`game/requests/${user.councilKey}/${id}`);
                if (isAccept) {
                    const updates = {};
                    updates[`game/scores/${fromKey}/${type}`]         = Math.max(0, (scores[fromKey]?.[type] || 0) - parseInt(amt));
                    updates[`game/scores/${user.councilKey}/${type}`] = (scores[user.councilKey]?.[type] || 0) + parseInt(amt);
                    db.ref().update(updates);
                    db.ref('game/logs').push({ from: fromCountry, to: toCountry, type, amt, time: new Date().toLocaleTimeString() });
                    if (fromKey === 'c3' && type === 'green') db.ref('game/c3_welfare_given').set(true);
                }
                // result 기록 후 2초 뒤 삭제 (송신자가 result를 읽을 시간 확보)
                reqRef.update({ result: isAccept ? 'accepted' : 'rejected' })
                    .then(() => setTimeout(() => reqRef.remove(), 2000));
                setIncomingRequest(null);
                setConfirmMsg(isAccept ? '받았습니다! ✅' : '거절하였습니다. ❌');
            };

            const resetGame = () => {
                if (!window.confirm("수업을 종료하고 모든 데이터를 초기화합니다.\n점수, 로그, 요청이 모두 삭제됩니다. 계속할까요?")) return;
                db.ref('game').set({
                    scores: { c1:{red:3,green:10,blue:4}, c2:{red:12,green:1,blue:0}, c3:{red:1,green:2,blue:10} },
                    logs: null,
                    requests: null,
                    c3_welfare_given: false,
                    session_active: false
                });
                setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false);
                setUser(null); setActiveTab(null); setPendingCouncil(null);
            };

            const adminManual = (f, fC, t, tC, type, amt) => {
                if (f === t) return alert("보내는 팀과 받는 팀이 같습니다.");
                if (!fC) return alert("보내는 국가를 선택해 주세요.");
                if (!tC) return alert("받는 국가를 선택해 주세요.");
                const amount = parseInt(amt);
                const updates = {};
                updates[`game/scores/${f}/${type}`] = Math.max(0, (scores[f]?.[type] || 0) - amount);
                updates[`game/scores/${t}/${type}`] = (scores[t]?.[type] || 0) + amount;
                db.ref().update(updates);
                db.ref('game/logs').push({ from: fC, to: tC, type, amt: amount, time: new Date().toLocaleTimeString() });
                if (f === 'c3' && type === 'green') db.ref('game/c3_welfare_given').set(true);
                alert("수동 전송 완료");
            };

            // ── Session Persistence ───────────────────────────────────
            useEffect(() => {
                if (user) sessionStorage.setItem('mun_user', JSON.stringify(user));
                else sessionStorage.removeItem('mun_user');
            }, [user]);
            useEffect(() => {
                if (activeTab) sessionStorage.setItem('mun_activeTab', activeTab);
                else sessionStorage.removeItem('mun_activeTab');
            }, [activeTab]);

            // ── Effects ───────────────────────────────────────────────

            useEffect(() => {
                db.ref('game/scores').on('value', snap => {
                    if (snap.val()) setScores(snap.val());
                    else db.ref('game/scores').set({ c1:{red:3,green:10,blue:4}, c2:{red:12,green:1,blue:0}, c3:{red:1,green:2,blue:10} });
                });
                db.ref('game/logs').on('value', snap => snap.val() && setLogs(Object.values(snap.val()).reverse().slice(0,5)));
                db.ref('game/c3_welfare_given').on('value', snap => setC3WelfareGiven(!!snap.val()));
                db.ref('game/session_active').on('value', snap => setSessionActive(!!snap.val()));
                // 비번 해시 로드 (없으면 기본값으로 초기화)
                db.ref('game/config').once('value', async snap => {
                    if (snap.val()?.pw) {
                        setPwHashes(snap.val().pw);
                        db.ref('game/config/pw').on('value', s => s.val() && setPwHashes(s.val()));
                    } else {
                        const defaults = { c1:'0912', c2:'1101', c3:'9070', public:'9997', admin:'9998', demo:'9999' };
                        const hashed = {};

                                if (sentRequest) { db.ref(`game/requests/${sentRequest.toKey}/${sentRequest.id}`).remove(); setSentRequest(null); }
                                return 0;
