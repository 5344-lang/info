                updates[`game/scores/${toKey}/${type}`] = scores[toKey][type] + amt;
                db.ref().update(updates);
                db.ref('game/logs').push({
                    from: councils.find(c => c.key === fromKey).name,
                    to: councils.find(c => c.key === toKey).name,
                    type, amt, time: new Date().toLocaleTimeString()
                });
                alert("전송 성공!");
            };

            const updateManual = (key, type, val) => {
                db.ref(`game/scores/${key}/${type}`).set(Math.max(0, val));
            };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                
                if (passwordInput === "9997") { setActiveTab('public'); setPendingCouncil(null); setError(false); return; }
                if (passwordInput === "9999") { setActiveTab(6); setPendingCouncil(null); setError(false); return; }
                if (pendingCouncil && passwordInput === pendingCouncil.password) {
                    setActiveTab(pendingCouncil.id); setPendingCouncil(null); setError(false);
                } else { setError(true); setPasswordInput(""); }
            };

            const resetSession = () => {
                if (window.confirm("수업을 종료하고 모든 데이터를 리셋하시겠습니까?\n(토큰 개수와 로그가 초기화됩니다.)")) {
                    db.ref('game').set({
                        scores: initialScores,
                        logs: null
                    });
                    setTimerSeconds(300);
                    setTimerRunning(false);
                    setTimerStarted(false);
                    alert("리셋되었습니다.");
                }
            };

            const c1EffectiveGreen = scores.c1.green + scores.c1.blue;
            const c2EffectiveGreen = scores.c2.green + scores.c2.blue;
            const isFacilityBuilt = c2EffectiveGreen >= 10;

            const calculateResults = () => {
                const results = { c1: 0, c2: 0, c3: 0 };
                if (scores.c1.red < scores.c2.red) results.c1 += 1;
                if (c1EffectiveGreen > scores.c1.red) results.c1 += 1;
                if (isFacilityBuilt) results.c1 += 3;
                if (scores.c2.red < 10) results.c2 += 1;
                if (c2EffectiveGreen > 1) results.c2 += 1;
                if (c2EffectiveGreen > scores.c2.red) results.c2 += 3;
                if (scores.c3.red >= 0 && scores.c3.red <= 2) results.c3 += 1;
                results.c3 -= Math.max(0, 6 - scores.c3.blue);
                const t1 = scores.c1.green + scores.c1.blue, t2 = scores.c2.green + scores.c2.blue, t3 = scores.c3.green + scores.c3.blue;
                if (t3 > t1 && t3 > t2) results.c3 += 3;
                return results;
            };

            const finalResults = calculateResults();

            const CoinControl = ({ councilKey, color, bgColor, label }) => (
                <div className="flex flex-col items-center bg-white p-3 rounded-2xl shadow-sm border border-gray-100 min-w-[100px]">
                    <span className="text-[10px] font-bold text-gray-400 mb-2">{label}</span>
                    <div className={`w-10 h-10 ${bgColor} rounded-xl flex items-center justify-center text-white text-lg font-black shadow-inner`}>{scores[councilKey][color]}</div>
                </div>
            );

            const TransferPanel = ({councilKey}) => {
                const [to, setTo] = useState("");
                const [type, setType] = useState("red");
                const [amt, setAmt] = useState(1);
                return (
                    <div className="mt-8 p-6 bg-slate-900 text-white rounded-3xl shadow-xl">
                        <h3 className="text-lg font-black mb-4 flex items-center gap-2">🚀 토큰 전송 (외교 활동)</h3>
                        <div className="space-y-4 text-sm">
                            <select value={to} onChange={(e)=>setTo(e.target.value)} className="w-full p-3 bg-slate-800 border-none rounded-xl font-bold outline-none">
                                <option value="">받는 협의체 선택</option>
                                {councils.filter(c => c.key !== councilKey && c.id !== 6).map(c => <option key={c.key} value={c.key}>{c.name}</option>)}
                            </select>
                            <div className="grid grid-cols-2 gap-2">
                                <select value={type} onChange={(e)=>setType(e.target.value)} className="p-3 bg-slate-800 border-none rounded-xl font-bold outline-none">
                                    <option value="red">🔴 위기 아동</option>
                                    <option value="green">🟢 복지 예산</option>
                                    <option value="blue">🔵 경제 예산</option>
                                </select>
                                <div className="flex items-center bg-slate-800 rounded-xl overflow-hidden"><button onClick={()=>setAmt(a=>Math.max(1,a-1))} className="px-4 py-3 font-black hover:bg-slate-700 text-xl leading-none">-</button><span className="flex-1 text-center font-bold text-lg">{amt}</span><button onClick={()=>setAmt(a=>a+1)} className="px-4 py-3 font-black hover:bg-slate-700 text-xl leading-none">+</button></div>
                            </div>
                            <button onClick={() => to ? transferToken(councilKey, to, type, amt) : alert("협의체를 선택하세요!")} className="w-full py-4 bg-blue-500 hover:bg-blue-600 rounded-xl font-black transition-all">전송 승인</button>
                        </div>
                    </div>
                );
            };

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] text-center p-6">
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-gray-200 max-w-2xl w-full">
                        <div className="flex justify-center mb-6 text-blue-500 animate-pulse"><Globe /></div>
                        <h1 className="text-4xl font-black text-gray-900 mb-4 tracking-tight">글로벌 아동 인권 수호 작전</h1>
                        <div className="h-1 w-20 bg-blue-500 mx-auto mb-6 rounded-full"></div>
                        <p className="text-gray-500 mb-10 text-lg leading-relaxed">이 시스템은 각 협의체 외교관만 접근할 수 있는 비밀 정보를 담고 있습니다.<br/>소속된 협의체를 선택하고 보안 코드를 입력하십시오.</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {councils.filter(c => c.id !== 6).map((council) => (
                                <button key={council.id} onClick={() => { setPendingCouncil(council); setPasswordInput(""); setError(false); }} className="bg-gray-100 hover:bg-blue-50 text-gray-800 font-bold py-6 px-6 rounded-2xl transition-all border-b-4 border-gray-300 hover:border-blue-400 active:border-b-0 active:translate-y-1 flex flex-col items-center gap-2 group">
                                    <div className="group-hover:scale-110 transition-transform text-gray-400 group-hover:text-blue-500"><Shield size={28} /></div>
                                    <span className="text-base">{council.name}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderPasswordScreen = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] p-6">
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-200 max-w-md w-full">
                        <div className="flex justify-center mb-6"><div className="p-4 bg-yellow-50 rounded-full border border-yellow-200 text-yellow-500"><Lock size={32} /></div></div>
                        <h2 className="text-2xl font-bold text-gray-900 text-center mb-2">보안 터미널 접속</h2>
                        <p className="text-gray-500 text-center mb-8 text-base">4자리 기밀 보안 코드를 입력하십시오.</p>
                        <form onSubmit={handlePasswordSubmit} className="space-y-6">
                            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="••••" autoFocus className={`w-full bg-gray-50 border-2 ${error ? 'border-red-400' : 'border-gray-200'} rounded-xl py-4 text-center text-2xl tracking-[0.5em] focus:outline-none focus:border-blue-400 transition-colors`} />
                            <div className="grid grid-cols-2 gap-4">
                                <button type="button" onClick={() => setPendingCouncil(null)} className="py-4 rounded-xl font-bold text-gray-500 hover:bg-gray-100 transition-colors text-base">취소</button>
                                <button type="submit" className="py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold transition-all text-base">접속 승인</button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            const renderPublicBoard = () => {
                const timeUp = timerStarted && timerSeconds === 0;
                return (
                    <div className="max-w-6xl mx-auto p-4 md:p-8 pb-20">
                        <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 hover:text-gray-800 flex items-center transition-colors font-medium text-base">← 메인 화면</button>
                        <div className="bg-white rounded-3xl shadow-xl border border-gray-200 p-8 mb-8 text-center">
                            <h2 className="text-2xl font-bold text-gray-700 mb-6">⏱ 협상 타이머</h2>
                            {!timerStarted ? (
                                <button onClick={() => { setTimerSeconds(300); setTimerRunning(true); setTimerStarted(true); }} className="bg-blue-500 hover:bg-blue-600 text-white font-black text-2xl px-12 py-6 rounded-2xl shadow-lg">🚀 협상 종료 (5분)</button>
                            ) : (
                                <div>
                                    <div className={`text-8xl md:text-9xl font-black mb-4 tabular-nums leading-none ${timerSeconds <= 60 ? 'text-red-600' : 'text-blue-600'}`}>{timeUp ? '⏰' : formatTime(timerSeconds)}</div>
                                    <div className="flex gap-4 justify-center">
                                        {!timeUp && <button onClick={() => setTimerRunning(r => !r)} className={`${timerRunning ? 'bg-yellow-400 text-yellow-900' : 'bg-green-500 text-white'} font-bold px-8 py-4 rounded-xl transition-all`}>{timerRunning ? '⏸ 일시정지' : '▶ 재개'}</button>}
                                        <button onClick={() => { setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false); }} className="bg-gray-100 px-8 py-4 rounded-xl transition-all">🔄 초기화</button>
                                    </div>
                                </div>
                            )}
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-4">📊 협의체 현황판 (실시간 수정 가능)</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                            {councils.filter(c => c.id !== 6).map(council => (
                                <div key={council.id} className={`bg-white rounded-3xl shadow-lg border-t-8 ${council.theme} p-6`}>
                                    <h3 className={`text-xl font-black ${council.accent} mb-1`}>{council.name}</h3>
                                    <p className="text-gray-400 text-xs mb-4">{council.countries}</p>
                                    <div className="space-y-3">
                                        <CoinControl councilKey={council.key} color="red" bgColor="bg-red-500" label="위기 아동" />
                                        <CoinControl councilKey={council.key} color="green" bgColor="bg-emerald-500" label="복지 예산" />
                                        <CoinControl councilKey={council.key} color="blue" bgColor="bg-blue-500" label="경제 예산" />
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="flex flex-col items-center border-t pt-10">
                        <div className="flex gap-4 flex-wrap justify-center mb-4">
                            <button
                                onClick={() => { if (window.confirm("협의를 종료하겠습니까?")) setShowScoreModal(true); }}
                                className="bg-blue-500 hover:bg-blue-600 text-white font-black py-5 px-12 rounded-2xl shadow-xl transition-all active:scale-95"
                            >
                                [점수확인]
                            </button>
                            <button
                                onClick={resetSession}
                                className="bg-red-500 hover:bg-red-600 text-white font-black py-5 px-12 rounded-2xl shadow-xl transition-all active:scale-95"
                            >
                                [수업종료] 데이터 전체 리셋
                            </button>
                        </div>
                        <p className="text-gray-400 text-sm mt-4 italic">※ [수업종료]를 누르면 모든 협의체의 코인 개수와 전송 로그가 초기화됩니다.</p>
                    </div>
                    </div>
                
                        {showScoreModal && (
                            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-lg w-full">
                                    <h2 className="text-2xl font-black text-gray-900 mb-6 text-center">🏆 최종 점수 집계</h2>
                                    <div className="space-y-4 mb-8">
                                        {['c1','c2','c3'].map((key, i) => (
                                            <div key={key} className="flex items-center justify-between bg-gray-50 p-4 rounded-2xl">
                                                <span className="font-bold text-gray-700">제 {i+1} 협의체</span>
                                                <div className="flex items-center gap-3 text-sm">
                                                    <span className="text-red-500 font-bold">🔴 {scores[key].red}</span>
                                                    <span className="text-emerald-600 font-bold">🟢 {scores[key].green}</span>
                                                    <span className="text-blue-500 font-bold">🔵 {scores[key].blue}</span>
                                                    <span className="font-black text-2xl ml-2">{finalResults[key]} <span className="text-xs text-gray-400">PT</span></span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => setShowScoreModal(false)} className="w-full py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-2xl transition-all">닫기</button>
                                </div>
                            </div>
                        )}
);
            };

            const renderScoreCalculator = () => (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 hover:text-gray-800 flex items-center font-medium text-base">← 메인 화면</button>
                    <div className="bg-white border-t-8 border-yellow-500 rounded-3xl shadow-xl overflow-hidden mb-8">
                        <div className="bg-yellow-50 p-8 border-b border-gray-200">
                            <span className="bg-yellow-500 text-white text-sm font-black px-3 py-1 rounded-lg">관리자 전용</span>
                            <h2 className="text-3xl font-black text-gray-900 mt-4 mb-2 flex items-center gap-3"><Calculator className="text-yellow-500" size={32} /> 최종 점수 집계</h2>
                            <p className="text-gray-500 text-base">현황판에서 수정한 수치가 실시간으로 반영됩니다.</p>
                        </div>
                        <div className="p-6 overflow-x-auto text-sm">
                            <table className="w-full text-left border-collapse">
                                <thead><tr className="border-b border-gray-200"><th className="py-4 px-4 text-gray-400 font-bold">협의체</th><th className="py-4 px-4 text-red-500 font-bold">🔴</th><th className="py-4 px-4 text-emerald-600 font-bold">🟢</th><th className="py-4 px-4 text-blue-500 font-bold">🔵</th><th className="py-4 px-4 text-yellow-600 font-bold">최종 점수</th></tr></thead>
                                <tbody className="divide-y divide-gray-100">
                                    {['c1', 'c2', 'c3'].map((key, i) => (
                                        <tr key={key}>
                                            <td className="py-6 px-4 font-black text-base">제 {i+1} 협의체</td>
                                            <td className="py-6 px-4 font-bold">{scores[key].red}</td>
                                            <td className="py-6 px-4 font-bold">{scores[key].green}</td>
                                            <td className="py-6 px-4 font-bold">{scores[key].blue}</td>
                                            <td className="py-6 px-4 font-black text-2xl">{finalResults[key]} <span className="text-xs text-gray-400 uppercase">PT</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            
            const renderNegotiationCard = (council) => {
                const cards = {
                    1: {
                        offer: ["초록 토큰 (아동복지예산)", "아동 보호 시스템 노하우 공유"],
                        want: ["빨간 토큰 최소 1개 필수! (미션 M2)", "제 2 협의체 위기 아동 숫자 감소"],
                        nonneg: ["빨간 토큰을 무한정 받을 수 없어요"],
                        dialogue: "안녕하세요, 저는 제 1 협의체 [나라 이름]입니다. 저희도 아동 인권을 지키고 싶습니다. 초록 토큰 ○개를 드릴게요. 대신 위기 아동(빨간 토큰) ○개를 받아주실 수 있나요?"
                    },
                    2: {
                        offer: ["빨간 토큰 (위기 아동 — 가져가도 됩니다)", "협력 약속 / 감사 표시"],
                        want: ["초록 토큰을 최대한 많이! (합계 10개 목표)", "빨간 토큰 줄이기"],
                        nonneg: ["현재 초록 토큰이 거의 없어요 — 도움을 구해야 해요"],
                        dialogue: "안녕하세요, 저는 제 2 협의체 [나라 이름]입니다. 저희 아이들이 위험합니다. 초록 토큰 ○개만 도와주시면 정말 감사하겠습니다. 함께 아동 인권을 지켜주세요!"
                    },
                    3: {
                        offer: ["초록 토큰 (조건부로만 제공)"],
                        want: ["빨간 토큰을 받지 않겠다는 약속", "파란 토큰 6개 유지"],
                        nonneg: ["파란 토큰은 절대 못 드려요 — 강대국 지위 상징이에요"],
                        dialogue: "안녕하세요, 저는 제 3 협의체 [나라 이름]입니다. 초록 토큰 ○개를 드리겠습니다. 대신 저희에게 위기 아동(빨간 토큰)을 보내지 않겠다고 약속해 주시겠어요?"
                    }
                };
                const card = cards[council.id];
                if (!card) return null;
                return (
                    <section>
                        <div className="flex items-center gap-3 mb-5">
                            <span className="text-2xl">🤝</span>
                            <h3 className="text-2xl font-bold text-gray-900">협상 준비 카드</h3>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                            <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4">
                                <p className="text-[10px] font-black text-emerald-700 mb-3 uppercase tracking-wider">✅ 줄 수 있는 것</p>
                                <ul className="space-y-2">{card.offer.map((o,i) => <li key={i} className="text-sm text-gray-700 leading-snug">• {o}</li>)}</ul>
                            </div>
                            <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4">
                                <p className="text-[10px] font-black text-blue-700 mb-3 uppercase tracking-wider">🎯 받아야 하는 것</p>
                                <ul className="space-y-2">{card.want.map((w,i) => <li key={i} className="text-sm text-gray-700 leading-snug">• {w}</li>)}</ul>
                            </div>
                            <div className="bg-red-50 border border-red-200 rounded-2xl p-4">
                                <p className="text-[10px] font-black text-red-700 mb-3 uppercase tracking-wider">❌ 절대 안 되는 것</p>
                                <ul className="space-y-2">{card.nonneg.map((n,i) => <li key={i} className="text-sm text-gray-700 leading-snug">• {n}</li>)}</ul>
                            </div>
                        </div>
                        <div className="bg-yellow-50 border border-yellow-200 border-l-4 border-l-yellow-400 rounded-2xl p-5">
                            <p className="text-[10px] font-black text-yellow-700 mb-2 uppercase tracking-wider">💬 협상 시작 예시문</p>
                            <p className="text-sm text-gray-700 leading-relaxed italic">"{card.dialogue}"</p>
                            <p className="text-[10px] text-gray-400 mt-2">※ ○ 자리에 숫자를 넣어서 직접 말해보세요!</p>
                        </div>
                    </section>
                );
            };

            const renderCouncilPage = (council) => (
                <div className="max-w-4xl mx-auto p-4 md:p-8 pb-32">
                    <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 hover:text-gray-800 flex items-center font-medium text-base">← 메인 화면</button>
                    <div className={`bg-white border-t-8 ${council.theme} rounded-3xl shadow-xl overflow-hidden`}>
                        <div className="bg-gray-50 p-8 border-b border-gray-200">
                            <div className="flex items-center justify-between mb-4"><span className="bg-red-500 text-white text-sm font-black px-3 py-1 rounded-lg flex items-center gap-1"><Lock size={12} /> 비밀 자료</span><span className="text-gray-400 text-sm font-mono">{council.name}</span></div>
                            <h2 className="text-3xl md:text-4xl font-black text-gray-900 mb-3">{council.title}</h2>
                            <div className="flex items-center gap-2 mb-2"><div className={`w-2 h-2 rounded-full animate-pulse ${council.theme.replace('border-', 'bg-')}`}></div><p className={`${council.accent} font-bold text-lg`}>{council.name} 공식 지시서</p></div>
                            <p className="text-gray-500 text-base">{council.countries}</p>
                        </div>
                        <div className="p-8 bg-white grid grid-cols-3 gap-2 text-center border-b">
                            <div className="p-4 bg-red-50 rounded-2xl"><div className="text-3xl font-black text-red-500">{scores[council.key].red}</div><p className="text-[10px] text-gray-400 font-bold">위기 아동</p></div>
                            <div className="p-4 bg-emerald-50 rounded-2xl"><div className="text-3xl font-black text-emerald-500">{scores[council.key].green}</div><p className="text-[10px] text-gray-400 font-bold">복지 예산</p></div>
                            <div className="p-4 bg-blue-50 rounded-2xl"><div className="text-3xl font-black text-blue-500">{scores[council.key].blue}</div><p className="text-[10px] text-gray-400 font-bold">경제 예산</p></div>
                        </div>
                        <div className="p-8">
                            <TransferPanel councilKey={council.key} />
                        </div>
                        <div className="p-8 space-y-12">
                            <section><div className="flex items-center gap-3 mb-5"><span className="text-yellow-500"><EyeOff size={24} /></span><h3 className="text-2xl font-bold text-gray-900">우리 팀 상황</h3></div><div className="bg-yellow-50 p-6 rounded-2xl border-l-4 border-yellow-400 italic text-gray-700 text-lg mb-6">"{council.quote}"</div><p className="text-gray-600 text-base">{council.description}</p></section>
                            <section><div className="flex items-center gap-3 mb-5"><span className="text-purple-500"><Users size={24} /></span><h3 className="text-2xl font-bold text-gray-900">팀원 역할 분담</h3></div><div className="grid gap-3">{council.roles.map((r, i) => (<div key={i} className="bg-purple-50 border border-purple-200 rounded-2xl p-4"><div className="flex items-center gap-2 mb-1"><span className="font-bold text-gray-800">{r.country}</span><span className="text-xs bg-purple-200 text-purple-800 px-2 py-0.5 rounded-full font-bold">{r.role}</span></div><p className="text-sm text-gray-600">{r.job}</p></div>))}</div></section>
                            <section><div className="flex items-center gap-3 mb-5"><span className="text-blue-500"><Shield size={24} /></span><h3 className="text-2xl font-bold text-gray-900">우리 팀 미션</h3></div><div className="grid gap-5">{council.missions.map((m) => (
                                <div key={m.id} className="bg-blue-50 border border-blue-200 rounded-2xl p-6">
                                    <div className="flex items-center gap-3 mb-4"><span className="text-blue-600 font-black text-sm px-2 py-1 bg-blue-200 rounded-lg">{m.id}</span><span className="text-gray-900 font-bold text-lg">{m.title}</span></div>
                                    <ol className="space-y-3">{m.steps.map((step, idx) => (<li key={idx} className="flex items-start gap-3 text-gray-700 text-base"><span className="flex-shrink-0 w-6 h-6 bg-blue-500 text-white rounded-full flex items-center justify-center text-xs font-black">{idx + 1}</span><span className="leading-relaxed">{step}</span></li>))}</ol>
                                </div>
                            ))}</div></section>
                            {renderNegotiationCard(council)}
                        <section><div className="flex items-center gap-3 mb-5"><span className="text-emerald-500"><TrendingUp size={24} /></span><h3 className="text-2xl font-bold text-gray-900">이기는 방법</h3></div><div className="grid gap-3">{council.winConditions.map((cond, idx) => (<div key={idx} className="flex items-center justify-between bg-gray-50 p-5 rounded-2xl border border-gray-200"><div className="flex items-center gap-3"><ChevronRight size={16} className="text-emerald-500 flex-shrink-0" /><span className="text-gray-700 font-medium text-sm">{cond.text}</span></div><span className={`ml-4 flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-black border ${cond.point < 0 ? 'bg-red-100 text-red-600 border-red-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200'}`}>{cond.point < 0 ? cond.point : `+${cond.point}`}</span></div>))}</div></section>
                        </div>
                    </div>
                    <div className="mt-8"><h4 className="text-xs font-bold text-gray-400 mb-3 tracking-widest uppercase">실시간 활동 로그</h4><div className="space-y-2">{logs.map((log, i) => (<div key={i} className="bg-white p-3 rounded-xl text-[11px] shadow-sm border border-gray-100 flex justify-between"><span>{log.from} → {log.to} ({log.type==='red'?'🔴':log.type==='green'?'🟢':'🔵'} {log.amt}개)</span><span className="text-gray-300">{log.time}</span></div>))}</div></div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-gray-800 font-sans">
                    {!activeTab && !pendingCouncil && renderHome()}
                    {pendingCouncil && renderPasswordScreen()}
                    
                    {activeTab === 'public' && renderPublicBoard()}
                    {activeTab === 'admin' && renderPublicBoard()}
                    {activeTab === 6 && renderCouncilPage(councils.find(c => c.id === activeTab))}
                    {typeof activeTab === 'number' && activeTab !== 6 && renderCouncilPage(councils.find(c => c.id === activeTab))}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
