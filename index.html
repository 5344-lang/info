                    <div className="flex items-center gap-2">
                        <button 
                            onClick={() => adjustScore(councilKey, color, -1)}
                            className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold hover:bg-gray-200"
                        >-</button>
                        <div className={`w-12 h-12 ${bgColor} rounded-xl flex items-center justify-center text-white text-xl font-black shadow-inner`}>
                            {scores[councilKey][color]}
                        </div>
                        <button 
                            onClick={() => adjustScore(councilKey, color, 1)}
                            className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold hover:bg-gray-200"
                        >+</button>
                    </div>
                </div>
            );

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] text-center p-6">
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-gray-200 max-w-2xl w-full">
                        <div className="flex justify-center mb-6 text-blue-500 animate-pulse"><Globe /></div>
                        <h1 className="text-4xl font-black text-gray-900 mb-4 tracking-tight">글로벌 아동 인권 수호 작전</h1>
                        <div className="h-1 w-20 bg-blue-500 mx-auto mb-6 rounded-full"></div>
                        <p className="text-gray-500 mb-10 text-lg leading-relaxed">
                            이 시스템은 각 협의체 외교관만 접근할 수 있는 비밀 정보를 담고 있습니다.<br/>소속된 협의체를 선택하고 보안 코드를 입력하십시오.
                        </p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {councils.map((council) => (
                                <button
                                    key={council.id}
                                    onClick={() => { setPendingCouncil(council); setPasswordInput(""); setError(false); }}
                                    className="bg-gray-100 hover:bg-blue-50 text-gray-800 font-bold py-6 px-6 rounded-2xl transition-all border-b-4 border-gray-300 hover:border-blue-400 active:border-b-0 active:translate-y-1 flex flex-col items-center gap-2 group"
                                >
                                    <div className="group-hover:scale-110 transition-transform text-gray-400 group-hover:text-blue-500"><Shield size={28} /></div>
                                    <span className="text-base">{council.name}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderPasswordScreen = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] p-6">
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-200 max-w-md w-full">
                        <div className="flex justify-center mb-6">
                            <div className="p-4 bg-yellow-50 rounded-full border border-yellow-200 text-yellow-500">
                                <Lock size={32} />
                            </div>
                        </div>
                        <h2 className="text-2xl font-bold text-gray-900 text-center mb-2">보안 터미널 접속</h2>
                        <p className="text-gray-500 text-center mb-8 text-base">4자리 기밀 보안 코드를 입력하십시오.</p>
                        <form onSubmit={handlePasswordSubmit} className="space-y-6">
                            <div className="relative">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Key size={20} /></div>
                                <input
                                    type="password"
                                    value={passwordInput}
                                    onChange={(e) => setPasswordInput(e.target.value)}
                                    placeholder="••••"
                                    autoFocus
                                    className={`w-full bg-gray-50 border-2 ${error ? 'border-red-400' : 'border-gray-200'} rounded-xl py-4 pl-12 pr-4 text-gray-900 text-center text-2xl tracking-[0.5em] focus:outline-none focus:border-blue-400 transition-colors`}
                                />
                            </div>
                            {error && (
                                <div className="flex items-center gap-2 text-red-500 text-base justify-center animate-bounce">
                                    <AlertCircle size={18} />
                                    <span>접속 권한이 없습니다.</span>
                                </div>
                            )}
                            <div className="grid grid-cols-2 gap-4">
                                <button type="button" onClick={() => setPendingCouncil(null)} className="py-4 rounded-xl font-bold text-gray-500 hover:bg-gray-100 transition-colors text-base">취소</button>
                                <button type="submit" className="py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold transition-all text-base">접속 승인</button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            const renderPublicBoard = () => {
                const timeUp = timerStarted && timerSeconds === 0;
                const timerColor = timerSeconds <= 60 ? 'text-red-600' : timerSeconds <= 120 ? 'text-orange-500' : 'text-blue-600';
                return (
                    <div className="max-w-6xl mx-auto p-4 md:p-8">
                        <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 hover:text-gray-800 flex items-center transition-colors font-medium text-base">← 메인 화면</button>

                        <div className="bg-white rounded-3xl shadow-xl border border-gray-200 p-8 mb-8 text-center">
                            <h2 className="text-2xl font-bold text-gray-700 mb-6">⏱ 협상 타이머</h2>
                            {!timerStarted ? (
                                <button
                                    onClick={() => { setTimerSeconds(300); setTimerRunning(true); setTimerStarted(true); }}
                                    className="bg-blue-500 hover:bg-blue-600 text-white font-black text-2xl px-12 py-6 rounded-2xl transition-all shadow-lg"
                                >
                                    🚀 협상 종료 (5분)
                                </button>
                            ) : (
                                <div>
                                    <div className={`text-8xl md:text-9xl font-black mb-4 tabular-nums leading-none ${timerColor}`}>
                                        {timeUp ? '⏰' : formatTime(timerSeconds)}
                                    </div>
                                    {timeUp
                                        ? <p className="text-3xl font-black text-red-600 mb-6">시간 종료! 협상을 마무리하세요!</p>
                                        : <p className="text-lg text-gray-400 mb-6">협상 진행 중...</p>
                                    }
                                    <div className="flex gap-4 justify-center flex-wrap">
                                        {!timeUp && (
                                            <button
                                                onClick={() => setTimerRunning(r => !r)}
                                                className={`${timerRunning ? 'bg-yellow-400 hover:bg-yellow-500 text-yellow-900' : 'bg-green-500 hover:bg-green-600 text-white'} font-bold px-8 py-4 rounded-xl text-base transition-all`}
                                            >
                                                {timerRunning ? '⏸ 일시정지' : '▶ 재개'}
                                            </button>
                                        )}
                                        <button
                                            onClick={() => { setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false); }}
                                            className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-8 py-4 rounded-xl text-base transition-all"
                                        >
                                            🔄 초기화
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold text-gray-800">📊 실시간 협의체 현황 (수정 가능)</h2>
                            <span className="text-xs text-gray-400 font-bold bg-gray-100 px-3 py-1 rounded-full underline decoration-dotted">숫자 옆 + - 버튼으로 조절하세요</span>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {councils.map(council => (
                                <div key={council.id} className={`bg-white rounded-3xl shadow-lg border-t-8 ${council.theme} p-6`}>
                                    <h3 className={`text-xl font-black ${council.accent} mb-1`}>{council.name}</h3>
                                    <p className="text-gray-400 text-sm mb-6">{council.countries}</p>
                                    
                                    <div className="space-y-4">
                                        <CoinControl 
                                            councilKey={council.key} 
                                            color="red" 
                                            bgColor="bg-red-500" 
                                            label="위기 아동" 
                                        />
                                        <CoinControl 
                                            councilKey={council.key} 
                                            color="green" 
                                            bgColor="bg-emerald-500" 
                                            label="복지 예산" 
                                        />
                                        {(council.key === 'c3' || scores[council.key].blue > 0) && (
                                            <CoinControl 
                                                councilKey={council.key} 
                                                color="blue" 
                                                bgColor="bg-blue-500" 
                                                label="경제 예산" 
                                            />
                                        )}
                                    </div>
                                    
                                    {/* 특수 상태 표시 */}
                                    <div className="mt-6 pt-4 border-t border-gray-50 space-y-2">
                                        {council.key === 'c2' && (
                                            <div className={`text-xs font-bold text-center py-2 rounded-lg ${isFacilityBuilt ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-400'}`}>
                                                시설 건설 진행: {c2EffectiveGreen}/10
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderScoreCalculator = () => (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 hover:text-gray-800 flex items-center transition-colors font-medium text-base">← 메인 화면</button>
                    <div className="bg-white border-t-8 border-yellow-500 rounded-3xl shadow-xl overflow-hidden mb-8">
                        <div className="bg-yellow-50 p-8 border-b border-gray-200">
                            <span className="bg-yellow-500 text-white text-sm font-black px-3 py-1 rounded-lg">관리자 전용</span>
                            <h2 className="text-3xl font-black text-gray-900 mt-4 mb-2 flex items-center gap-3">
                                <Calculator className="text-yellow-500" size={32} /> 최종 점수 집계
                            </h2>
                            <p className="text-gray-500 leading-relaxed text-base">현황판에서 입력한 수치가 자동으로 반영됩니다.</p>
                        </div>
                        <div className="p-6 overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="border-b border-gray-200">
                                        <th className="py-4 px-4 text-gray-400 font-bold text-sm">협의체</th>
                                        <th className="py-4 px-4 text-red-500 font-bold text-sm">위기 아동(🔴)</th>
                                        <th className="py-4 px-4 text-emerald-600 font-bold text-sm">복지 예산(🟢)</th>
                                        <th className="py-4 px-4 text-blue-500 font-bold text-sm">경제 예산(🔵)</th>
                                        <th className="py-4 px-4 text-yellow-600 font-bold text-sm">최종 점수</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {councils.map((council) => (
                                        <tr key={council.key}>
                                            <td className="py-6 px-4">
                                                <div className="font-black text-gray-900 text-base">{council.name}</div>
                                                {council.key === 'c1' && (
                                                    <div className={`mt-2 flex items-center gap-2 text-xs font-bold ${isFacilityBuilt ? 'text-emerald-600' : 'text-gray-400'}`}>
                                                        <Construction size={12} /> {isFacilityBuilt ? '시설 건설 성공 ✓' : '시설 건설 대기 중'}
                                                    </div>
                                                )}
                                            </td>
                                            <td className="py-6 px-4"><input type="number" value={scores[council.key].red} onChange={(e) => handleScoreChange(council.key, 'red', e.target.value)} className="w-20 bg-gray-50 border border-gray-200 rounded-lg p-3 text-center text-gray-900 text-base focus:border-red-400 outline-none" /></td>
                                            <td className="py-6 px-4"><input type="number" value={scores[council.key].green} onChange={(e) => handleScoreChange(council.key, 'green', e.target.value)} className="w-20 bg-gray-50 border border-gray-200 rounded-lg p-3 text-center text-gray-900 text-base focus:border-emerald-400 outline-none" /></td>
                                            <td className="py-6 px-4"><input type="number" value={scores[council.key].blue} onChange={(e) => handleScoreChange(council.key, 'blue', e.target.value)} className="w-20 bg-gray-50 border border-gray-200 rounded-lg p-3 text-center text-gray-900 text-base focus:border-blue-400 outline-none" /></td>
                                            <td className="py-6 px-4"><div className="text-3xl font-black text-gray-900">{finalResults[council.key]} <span className="text-sm text-gray-400">PT</span></div></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            const renderCouncilPage = (council) => (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 hover:text-gray-800 flex items-center transition-colors font-medium text-base">← 메인 화면</button>
                    <div className={`bg-white border-t-8 ${council.theme} rounded-3xl shadow-xl overflow-hidden`}>

                        <div className="bg-gray-50 p-8 border-b border-gray-200">
                            <div className="flex items-center justify-between mb-4">
                                <span className="bg-red-500 text-white text-sm font-black px-3 py-1 rounded-lg flex items-center gap-1"><Lock size={12} /> 비밀 자료</span>
                                <span className="text-gray-400 text-sm font-mono">{council.name}</span>
                            </div>
                            <h2 className="text-3xl md:text-4xl font-black text-gray-900 mb-3">{council.title}</h2>
                            <div className="flex items-center gap-2 mb-2">
                                <div className={`w-2 h-2 rounded-full animate-pulse ${council.theme.replace('border-', 'bg-')}`}></div>
                                <p className={`${council.accent} font-bold text-lg`}>{council.name} 공식 지시서</p>
                            </div>
                            <p className="text-gray-500 text-base">{council.countries}</p>
                        </div>

                        <div className="p-8 bg-white flex flex-wrap gap-8 justify-around border-b border-gray-100">
                            <div className="text-center">
                                <div className="w-20 h-20 bg-red-500 rounded-2xl flex items-center justify-center text-white text-3xl font-black mx-auto mb-3 shadow-lg shadow-red-200">{scores[council.key].red}</div>
                                <p className="text-sm text-gray-500 font-bold">위기 아동 지수</p>
                            </div>
                            <div className="text-center">
                                <div className="w-20 h-20 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-3xl font-black mx-auto mb-3 shadow-lg shadow-emerald-200">{scores[council.key].green}</div>
                                <p className="text-sm text-gray-500 font-bold">아동 복지 예산</p>
                            </div>
                            { (council.key === 'c3' || scores[council.key].blue > 0) && (
                                <div className="text-center">
                                    <div className="w-20 h-20 bg-blue-500 rounded-2xl flex items-center justify-center text-white text-3xl font-black mx-auto mb-3 shadow-lg shadow-blue-200">{scores[council.key].blue}</div>
                                    <p className="text-sm text-gray-500 font-bold">경제 예산</p>
                                </div>
                            )}
                        </div>

                        <div className="p-8 space-y-12">
                            <section>
                                <div className="flex items-center gap-3 mb-5">
                                    <span className="text-yellow-500"><EyeOff size={24} /></span>
                                    <h3 className="text-2xl font-bold text-gray-900">우리 팀 상황</h3>
                                </div>
                                <div className="bg-yellow-50 p-6 rounded-2xl border-l-4 border-yellow-400 italic text-gray-700 text-lg leading-relaxed mb-6">"{council.quote}"</div>
                                <p className="text-gray-600 leading-relaxed text-base">{council.description}</p>
                            </section>

                            <section>
                                <div className="flex items-center gap-3 mb-5">
                                    <span className="text-purple-500"><Users size={24} /></span>
                                    <h3 className="text-2xl font-bold text-gray-900">팀원 역할 분담</h3>
                                </div>
                                <div className="grid gap-3">
                                    {council.roles.map((r, i) => (
                                        <div key={i} className="bg-purple-50 border border-purple-200 rounded-2xl p-4">
                                            <div className="flex items-center gap-2 mb-1 flex-wrap">
                                                <span className="font-bold text-gray-800 text-base">{r.country}</span>
                                                <span className="text-sm bg-purple-200 text-purple-800 px-2 py-0.5 rounded-full font-bold">{r.role}</span>
                                            </div>
                                            <p className="text-base text-gray-600">{r.job}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <section>
                                <div className="flex items-center gap-3 mb-5">
                                    <span className="text-blue-500"><Shield size={24} /></span>
                                    <h3 className="text-2xl font-bold text-gray-900">우리 팀 미션</h3>
                                </div>
                                <div className="grid gap-5">
                                    {council.missions.map((m) => (
                                        <div key={m.id} className="bg-blue-50 border border-blue-200 rounded-2xl p-6">
                                            <div className="flex items-center gap-3 mb-4">
                                                <span className="text-blue-600 font-black text-sm px-2 py-1 bg-blue-200 rounded-lg">{m.id}</span>
                                                <span className="text-gray-900 font-bold text-lg">{m.title}</span>
                                            </div>
                                            <ol className="space-y-3">
                                                {m.steps.map((step, idx) => (
                                                    <li key={idx} className="flex items-start gap-3 text-gray-700 text-base">
                                                        <span className="flex-shrink-0 w-7 h-7 bg-blue-500 text-white rounded-full flex items-center justify-center text-sm font-black">{idx + 1}</span>
                                                        <span className="leading-relaxed pt-0.5">{step}</span>
                                                    </li>
                                                ))}
                                            </ol>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <section>
                                <div className="flex items-center gap-3 mb-5">
                                    <span className="text-emerald-500"><TrendingUp size={24} /></span>
                                    <h3 className="text-2xl font-bold text-gray-900">이기는 방법</h3>
                                </div>
                                <div className="grid gap-3">
                                    {council.winConditions.map((cond, idx) => {
                                        const isNegative = cond.point < 0;
                                        return (
                                            <div key={idx} className="flex items-center justify-between bg-gray-50 p-5 rounded-2xl border border-gray-200">
                                                <div className="flex items-center gap-3">
                                                    <ChevronRight size={16} className="text-emerald-500 flex-shrink-0" />
                                                    <span className="text-gray-700 font-medium text-base">{cond.text}</span>
                                                </div>
                                                <span className={`ml-4 flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-black border ${isNegative ? 'bg-red-100 text-red-600 border-red-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200'}`}>
                                                    {isNegative ? cond.point : `+${cond.point}`}
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-gray-800 font-sans">
                    {!activeTab && !pendingCouncil && renderHome()}
                    {pendingCouncil && renderPasswordScreen()}
                    {activeTab === 'score' && renderScoreCalculator()}
                    {activeTab === 'public' && renderPublicBoard()}
                    {typeof activeTab === 'number' && renderCouncilPage(councils.find(c => c.id === activeTab))}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
