    // [추가] 같은 협의체 체크
    if (fromKey === toKey) {
        return alert("같은 협의체끼리는 토큰을 주고받을 수 없습니다!");
    }

    const amt = parseInt(amount);
    if (scores[fromKey][type] < amt) return alert("토큰이 부족합니다!");
                
                const toName = councils.find(c => c.key === toKey).name;
                const newReqRef = db.ref(`game/requests/${toKey}`).push();
                const reqData = { fromKey, fromCountry: user.country, type, amt, timestamp: Date.now() };
                
                newReqRef.set(reqData);
                setSentRequest({ id: newReqRef.key, toKey, toName });

                // 상대방이 처리하면 내 대기창 닫기
                newReqRef.on('value', snap => {
                    if (!snap.exists()) { setSentRequest(null); newReqRef.off(); }
                });
            };

            const handleRequestAction = (isAccept) => {
                if (!incomingRequest) return;
                const { id, fromKey, fromCountry, type, amt } = incomingRequest;
                const myKey = user.councilKey;

                if (isAccept) {
                    const updates = {};
                    updates[`game/scores/${fromKey}/${type}`] = scores[fromKey][type] - amt;
                    updates[`game/scores/${myKey}/${type}`] = scores[myKey][type] + amt;
                    db.ref().update(updates);
                    db.ref('game/logs').push({
                        from: fromCountry,
                        to: councils.find(c => c.key === myKey).name,
                        type, amt, time: new Date().toLocaleTimeString()
                    });
                }
                db.ref(`game/requests/${myKey}/${id}`).remove();
                setIncomingRequest(null);
            };

            const adminForceTransfer = (from, to, type, amt) => {
    // [추가] 같은 협의체 체크
    if (from === to) {
        return alert("같은 협의체 국가 간에는 전송이 불가합니다");
    }

    const amount = parseInt(amt);
                const updates = {};
                updates[`game/scores/${from}/${type}`] = Math.max(0, scores[from][type] - amount);
                updates[`game/scores/${to}/${type}`] = scores[to][type] + amount;
                db.ref().update(updates);
                db.ref('game/logs').push({
                    from: `[운영진]${councils.find(c=>c.key===from).name}`,
                    to: councils.find(c=>c.key===to).name,
                    type, amt: amount, time: new Date().toLocaleTimeString()
                });
                alert("강제 전송 완료");
            };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === "9997") { setActiveTab('public'); setPendingCouncil(null); setError(false); return; }
                if (passwordInput === "9998") { setActiveTab('admin_manual'); setPendingCouncil(null); setError(false); return; }
                
                if (pendingCouncil && passwordInput === pendingCouncil.password) {
                    setUser({ councilKey: pendingCouncil.key, councilId: pendingCouncil.id, country: selectedCountry });
                    setActiveTab(pendingCouncil.id);
                    setPendingCouncil(null);
                    setError(false);
                } else { setError(true); setPasswordInput(""); }
            };

            const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

            // --- 렌더링 섹션 ---
            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] text-center p-6">
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-gray-200 max-w-2xl w-full">
                        <div className="flex justify-center mb-6 text-blue-500 animate-pulse"><Globe /></div>
                        <h1 className="text-4xl font-black text-gray-900 mb-4 tracking-tight">글로벌 아동 인권 수호 작전</h1>
                        <p className="text-gray-500 mb-10 text-lg leading-relaxed">소속된 협의체를 선택하고 보안 코드를 입력하십시오.</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {councils.filter(c => c.id !== 6).map((council) => (
                                <button key={council.id} onClick={() => { setPendingCouncil(council); setSelectedCountry(council.countries); setPasswordInput(""); setError(false); }} className="bg-gray-100 hover:bg-blue-50 text-gray-800 font-bold py-6 px-6 rounded-2xl transition-all border-b-4 border-gray-300 hover:border-blue-400 flex flex-col items-center gap-2 group">
                                    <Shield size={28} />
                                    <span>{council.name}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderPasswordScreen = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] p-6">
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-200 max-w-md w-full text-center">
                        <Lock size={48} className="mx-auto mb-6 text-yellow-500" />
                        <h2 className="text-2xl font-bold mb-8">보안 터미널 접속</h2>
                        <form onSubmit={handlePasswordSubmit} className="space-y-6">
                            <select value={selectedCountry} onChange={e=>setSelectedCountry(e.target.value)} className="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl font-bold">
                                {pendingCouncil.countries.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="••••" autoFocus className={`w-full bg-gray-50 border-2 ${error ? 'border-red-400' : 'border-gray-200'} rounded-xl py-4 text-center text-2xl tracking-[0.5em] focus:outline-none focus:border-blue-400`} />
                            <div className="grid grid-cols-2 gap-4">
                                <button type="button" onClick={() => setPendingCouncil(null)} className="py-4 font-bold text-gray-400">취소</button>
                                <button type="submit" className="py-4 bg-blue-500 text-white rounded-xl font-bold">접속 승인</button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            const renderAdminManual = () => {
                const [from, setFrom] = useState("c1");
                const [to, setTo] = useState("c2");
                const [type, setType] = useState("red");
                const [amt, setAmt] = useState(1);
                return (
                    <div className="max-w-2xl mx-auto p-6">
                        <button onClick={()=>setActiveTab(null)} className="mb-6 text-gray-400 font-bold">← 메인</button>
                        <div className="bg-white p-8 rounded-3xl shadow-xl space-y-6">
                            <h2 className="text-2xl font-black flex items-center gap-2"><Calculator /> 관리자 수동 제어</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={from} onChange={e=>setFrom(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold">{councils.filter(c=>c.id!==6).map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                                <select value={to} onChange={e=>setTo(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold">{councils.filter(c=>c.id!==6).map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={type} onChange={e=>setType(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold"><option value="red">🔴 위기</option><option value="green">🟢 복지</option><option value="blue">🔵 경제</option></select>
                                <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} className="p-4 bg-gray-50 rounded-xl font-bold text-center" />
                            </div>
                            <button onClick={() => adminForceTransfer(from, to, type, amt)} className="w-full py-5 bg-yellow-500 text-white rounded-2xl font-black text-lg">전송 실행</button>
                        </div>
                    </div>
                );
            };

            const renderPublicBoard = () => {
                const timeUp = timerStarted && timerSeconds === 0;
                return (
                    <div className="max-w-6xl mx-auto p-4 md:p-8 pb-20">
                        <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 hover:text-gray-800 flex items-center font-medium text-base">← 메인 화면</button>
                        <div className="bg-white rounded-3xl shadow-xl border border-gray-200 p-8 mb-8 text-center">
                            <h2 className="text-2xl font-bold text-gray-700 mb-6">⏱ 협상 타이머</h2>
                            {!timerStarted ? (
                                <button onClick={() => { setTimerSeconds(300); setTimerRunning(true); setTimerStarted(true); }} className="bg-blue-500 hover:bg-blue-600 text-white font-black text-2xl px-12 py-6 rounded-2xl shadow-lg">🚀 협상 시작 (5분)</button>
                            ) : (
                                <div>
                                    <div className={`text-8xl md:text-9xl font-black mb-4 tabular-nums leading-none ${timerSeconds <= 60 ? 'text-red-600' : 'text-blue-600'}`}>{timeUp ? '⏰' : formatTime(timerSeconds)}</div>
                                    <div className="flex gap-4 justify-center">
                                        {!timeUp && <button onClick={() => setTimerRunning(r => !r)} className={`${timerRunning ? 'bg-yellow-400' : 'bg-green-500'} text-white font-bold px-8 py-4 rounded-xl`}>{timerRunning ? '⏸ 일시정지' : '▶ 재개'}</button>}
                                        <button onClick={() => { setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false); }} className="bg-gray-100 px-8 py-4 rounded-xl font-bold">🔄 초기화</button>
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                            {councils.filter(c => c.id !== 6).map(council => (
                                <div key={council.id} className={`bg-white rounded-3xl shadow-lg border-t-8 ${council.theme} p-6`}>
                                    <h3 className={`text-xl font-black ${council.accent} mb-4`}>{council.name}</h3>
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center bg-red-50 p-3 rounded-xl"><span className="text-red-500 font-black">🔴 위기</span><span className="text-xl font-black">{scores[council.key]?.red}</span></div>
                                        <div className="flex justify-between items-center bg-emerald-50 p-3 rounded-xl"><span className="text-emerald-500 font-black">🟢 복지</span><span className="text-xl font-black">{scores[council.key]?.green}</span></div>
                                        <div className="flex justify-between items-center bg-blue-50 p-3 rounded-xl"><span className="text-blue-500 font-black">🔵 경제</span><span className="text-xl font-black">{scores[council.key]?.blue}</span></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderCouncilPage = (council) => {
                const [to, setTo] = useState("");
                const [type, setType] = useState("red");
                const [amt, setAmt] = useState(1);

                return (
                    <div className="max-w-4xl mx-auto p-4 md:p-8 pb-32">
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={() => {setUser(null); setActiveTab(null);}} className="text-gray-400 font-bold">← 로그아웃</button>
                            <span className="bg-blue-100 text-blue-700 px-4 py-1 rounded-full font-black text-sm">{user.country} 대표</span>
                        </div>
                        <div className={`bg-white border-t-8 ${council.theme} rounded-3xl shadow-xl overflow-hidden`}>
                            <div className="bg-gray-50 p-8 border-b">
                                <h2 className="text-3xl font-black text-gray-900 mb-2">{council.title}</h2>
                                <p className="text-gray-500">{council.name} 공식 지시서</p>
                            </div>
                            <div className="p-8 grid grid-cols-3 gap-2 text-center border-b">
                                <div className="p-4 bg-red-50 rounded-2xl"><div className="text-3xl font-black text-red-500">{scores[council.key].red}</div><p className="text-xs text-gray-400 font-bold">위기 아동</p></div>
                                <div className="p-4 bg-emerald-50 rounded-2xl"><div className="text-3xl font-black text-emerald-500">{scores[council.key].green}</div><p className="text-xs text-gray-400 font-bold">복지 예산</p></div>
                                <div className="p-4 bg-blue-50 rounded-2xl"><div className="text-3xl font-black text-blue-500">{scores[council.key].blue}</div><p className="text-xs text-gray-400 font-bold">경제 예산</p></div>
                            </div>
                            <div className="p-8">
                                <section className="bg-slate-900 text-white rounded-3xl p-6">
                                    <h3 className="text-lg font-black mb-4">🚀 토큰 전송 (승인 필요)</h3>
                                    <div className="space-y-4">
                                        <select value={to} onChange={(e)=>setTo(e.target.value)} className="w-full p-4 bg-slate-800 rounded-xl font-bold">
                                            <option value="">받는 협의체 선택</option>
                                            {councils.filter(c => c.key !== council.key && c.id !== 6).map(c => <option key={c.key} value={c.key}>{c.name}</option>)}
                                        </select>
                                        <div className="grid grid-cols-2 gap-2">
                                            <select value={type} onChange={(e)=>setType(e.target.value)} className="p-4 bg-slate-800 rounded-xl font-bold">
                                                <option value="red">🔴 위기 아동</option><option value="green">🟢 복지 예산</option><option value="blue">🔵 경제 예산</option>
                                            </select>
                                            <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} className="p-4 bg-slate-800 rounded-xl font-bold text-center" />
                                        </div>
                                        <button onClick={() => to ? requestTransfer(council.key, to, type, amt) : alert("협의체 선택!")} className="w-full py-4 bg-blue-500 rounded-xl font-black">전송 승인 요청</button>
                                    </div>
                                </section>
                            </div>
                            <div className="p-8 space-y-12">
                                <section><div className="flex items-center gap-3 mb-5"><EyeOff /><h3 className="text-2xl font-bold">우리 팀 상황</h3></div><div className="bg-yellow-50 p-6 rounded-2xl border-l-4 border-yellow-400 italic mb-6">"{council.quote}"</div><p className="text-gray-600">{council.description}</p></section>
                                <section><div className="flex items-center gap-3 mb-5"><Users /><h3 className="text-2xl font-bold">팀원 역할</h3></div><div className="grid gap-3">{council.roles.map((r, i) => (<div key={i} className="bg-purple-50 p-4 rounded-2xl border border-purple-200"><span className="font-bold">{r.country}</span> | <span className="text-purple-800 text-sm">{r.role}</span><p className="text-sm text-gray-600 mt-1">{r.job}</p></div>))}</div></section>
                                <section><div className="flex items-center gap-3 mb-5"><Shield /><h3 className="text-2xl font-bold">우리 팀 미션</h3></div><div className="grid gap-5">{council.missions.map((m) => (<div key={m.id} className="bg-blue-50 p-6 rounded-2xl border border-blue-200"><div className="font-bold text-lg mb-4">{m.id}. {m.title}</div><ol className="space-y-2">{m.steps.map((step, idx) => (<li key={idx} className="text-gray-700 text-sm"> {idx + 1}. {step}</li>))}</ol></div>))}</div></section>
                            </div>
                        </div>
                        <div className="mt-8"><h4 className="text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest">실시간 활동 로그</h4><div className="space-y-2">{logs.map((log, i) => (<div key={i} className="bg-white p-3 rounded-xl text-[11px] shadow-sm flex justify-between"><span>{log.from} → {log.to} ({log.type==='red'?'🔴':log.type==='green'?'🟢':'🔵'} {log.amt}개)</span><span className="text-gray-300">{log.time}</span></div>))}</div></div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 text-gray-800 font-sans">
                    {!user && !activeTab && !pendingCouncil && renderHome()}
                    {pendingCouncil && renderPasswordScreen()}
                    {activeTab === 'public' && renderPublicBoard()}
                    {activeTab === 'admin_manual' && renderAdminManual()}
                    {user && typeof activeTab === 'number' && renderCouncilPage(councils.find(c => c.id === activeTab))}

                    {/* 수신 팝업 */}
                    {incomingRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6">
                            <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center">
                                <h2 className="text-xl font-black mb-4">외교 요청 도착!</h2>
                                <p className="mb-6 leading-relaxed"><span className="font-bold text-blue-600">{incomingRequest.fromCountry}</span>에서 <br/><span className="font-bold">{incomingRequest.amt}개</span>를 보내려 합니다. 받으시겠습니까?</p>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={()=>handleRequestAction(false)} className="py-4 bg-gray-100 rounded-2xl font-bold text-gray-400">거절</button>
                                    <button onClick={()=>handleRequestAction(true)} className="py-4 bg-blue-500 text-white rounded-2xl font-bold shadow-lg">수락</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 송신 대기 팝업 */}
                    {sentRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6 text-center">
                            <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full">
                                <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                                <h2 className="text-xl font-black mb-4">응답 대기 중</h2>
                                <div className="bg-blue-50 p-5 rounded-2xl mb-6 text-sm text-blue-800 leading-relaxed">
                                    <p><strong>({sentRequest.toName})</strong>가 응답이 없나요?</p>
                                    <p className="mt-2 text-xs opacity-80 font-bold underline">({sentRequest.toName}) 대표와 함께 선생님께 와서 토큰을 교환하세요.</p>
                                </div>
                                <button onClick={()=>{db.ref(`game/requests/${sentRequest.toKey}/${sentRequest.id}`).remove(); setSentRequest(null);}} className="text-gray-300 font-bold">요청 취소</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
