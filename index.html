            const [incomingRequest, setIncomingRequest] = useState(null);
            const [sentRequest, setSentRequest] = useState(null);
            const [popupTimer, setPopupTimer] = useState(20);

                db.ref('game/scores').on('value', snap => {
                    if (snap.val()) setScores(snap.val());

                db.ref('game/logs').on('value', snap => snap.val() && setLogs(Object.values(snap.val()).reverse().slice(0, 5)));
                return () => { db.ref('game/scores').off(); db.ref('game/logs').off(); };
            }, []);

            // 20초 팝업 자동 소멸 로직
            useEffect(() => {
                let interval;
                if (incomingRequest || sentRequest) {
                    setPopupTimer(20);
                    interval = setInterval(() => {
                        setPopupTimer(prev => {
                            if (prev <= 1) {
                                if (incomingRequest) db.ref(`game/requests/${user.councilKey}/${incomingRequest.id}`).remove();
                                if (sentRequest) { db.ref(`game/requests/${sentRequest.toKey}/${sentRequest.id}`).remove(); setSentRequest(null); }
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [incomingRequest, sentRequest]);

            useEffect(() => {
                if (!user) return;
                const reqRef = db.ref(`game/requests/${user.councilKey}`);
                reqRef.on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const key = Object.keys(data);
                        setIncomingRequest({ id: key, ...data[key] });
                    } else setIncomingRequest(null);
                });
                return () => reqRef.off();
            }, [user]);

            useEffect(() => {
                if (!timerRunning || timerSeconds <= 0) return;
                const id = setInterval(() => setTimerSeconds(s => s - 1), 1000);
                return () => clearInterval(id);
            }, [timerRunning]);

            useEffect(() => {
                if (timerStarted && timerSeconds === 0) {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const play = (t, f) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.type = 'square'; o.frequency.setValueAtTime(f, t);
                        g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                        o.connect(g); g.connect(audioCtx.destination);
                        o.start(t); o.stop(t + 0.2);
                    };
                    [0, 0.3, 0.6].forEach(t => play(audioCtx.currentTime + t, 880));
                    setTimerRunning(false);
                }
            }, [timerSeconds, timerStarted]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === "9997") { setActiveTab('public'); setPasswordInput(""); return; }
                if (passwordInput === "9998") { setActiveTab('admin'); setPasswordInput(""); return; }

                if (pendingCouncil && (passwordInput === pendingCouncil.password || passwordInput === "9999")) {
                    setUser({ councilKey: pendingCouncil.key, councilId: pendingCouncil.id, country: selectedCountry });
                    setActiveTab(pendingCouncil.id); setPendingCouncil(null); setPasswordInput("");
                } else { alert("보안 코드가 틀렸습니다."); setPasswordInput(""); }
            };

            const requestTransfer = () => {
                if (!tfCouncil || !tfCountry) return alert("전송 대상을 선택하세요.");
                if (user.councilKey === tfCouncil) return alert("같은 협의체로는 전송할 수 없습니다.");
                if (scores[user.councilKey][tfType] < tfAmt) return alert("토큰이 부족합니다.");

                const toName = `${tfCountry} (${councils.find(c=>c.key===tfCouncil).name})`;
                const newRef = db.ref(`game/requests/${tfCouncil}`).push();
                newRef.set({ fromKey: user.councilKey, fromCountry: user.country, type: tfType, amt: tfAmt, toCountry: tfCountry });
                
                setSentRequest({ id: newRef.key, toKey: tfCouncil, toName });
                newRef.on('value', snap => { if (!snap.exists()) { setSentRequest(null); newRef.off(); } });
            };

            const handleAction = (isAccept) => {
                if (!incomingRequest) return;
                const { id, fromKey, fromCountry, type, amt, toCountry } = incomingRequest;
                if (isAccept) {
                    const updates = {};
                    updates[`game/scores/${fromKey}/${type}`] = (scores[fromKey][type] || 0) - amt;
                    updates[`game/scores/${user.councilKey}/${type}`] = (scores[user.councilKey][type] || 0) + parseInt(amt);
                    db.ref().update(updates);
                    db.ref('game/logs').push({ from: fromCountry, to: toCountry, type, amt, time: new Date().toLocaleTimeString() });
                }
                db.ref(`game/requests/${user.councilKey}/${id}`).remove();
            };

            const adminManual = (f, t, type, amt) => {
                const updates = {};
                updates[`game/scores/${f}/${type}`] = Math.max(0, (scores[f][type] || 0) - amt);
                updates[`game/scores/${t}/${type}`] = (scores[t][type] || 0) + parseInt(amt);
                db.ref().update(updates);

                alert("수동 전송 완료");
            };

            const calculateFinal = () => {
                const results = { c1:0, c2:0, c3:0 };
                if (!scores.c1 || !scores.c2 || !scores.c3) return results;
                const c1T = scores.c1.green + scores.c1.blue, c2T = scores.c2.green + scores.c2.blue, c3T = scores.c3.green + scores.c3.blue;
                if (scores.c1.red < scores.c2.red) results.c1 += 1;
                if (c1T > scores.c1.red) results.c1 += 1;
                if (c2T >= 10) results.c1 += 3;
                if (scores.c2.red < 10) results.c2 += 1;
                if (scores.c2.green > 1) results.c2 += 1;
                if (scores.c2.green > scores.c2.red) results.c2 += 3;
                if (scores.c3.red <= 2) results.c3 += 1;
                results.c3 -= Math.max(0, 6 - scores.c3.blue);
                if (c3T > c1T && c3T > c2T) results.c3 += 3;
                return results;
            };

            const finalResults = calculateFinal();

            // --- 렌더링 ---
            if (!user && !activeTab && !pendingCouncil) return (
                <div className="flex flex-col items-center justify-center min-h-screen text-center p-6 bg-slate-50">
                    <div className="bg-white p-12 rounded-3xl shadow-xl border border-gray-200 max-w-2xl w-full">
                        <div className="flex justify-center mb-6 text-blue-500 animate-pulse"><Globe /></div>
                        <h1 className="text-4xl font-black text-gray-900 mb-4 tracking-tight">글로벌 아동 인권 수호 작전</h1>
                        <div className="h-1 w-20 bg-blue-500 mx-auto mb-6 rounded-full"></div>
                        <p className="text-gray-500 mb-10 text-lg">소속된 협의체를 선택하고 보안 코드를 입력하십시오.</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {councils.map(c => (
                                <button key={c.id} onClick={() => {setPendingCouncil(c); setSelectedCountry(c.countries);}} className="p-6 bg-gray-50 rounded-2xl border-b-4 border-gray-200 hover:border-blue-500 font-bold transition-all text-lg flex flex-col items-center gap-2">
                                    <Shield size={24} className="text-gray-400" />
                                    {c.name}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (pendingCouncil) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-100">
                    <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center">
                        <Lock size={48} className="mx-auto text-yellow-500 mb-6" />
                        <h2 className="text-2xl font-bold mb-6">{pendingCouncil.name} 접속</h2>
                        <form onSubmit={handlePasswordSubmit} className="space-y-4 text-left">
                            <label className="text-xs font-bold text-gray-400 ml-1">국가 선택</label>
                            <select value={selectedCountry} onChange={e=>setSelectedCountry(e.target.value)} className="w-full p-4 bg-gray-50 rounded-xl font-bold border-2 border-gray-100 mb-2">
                                {pendingCouncil.countries.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <label className="text-xs font-bold text-gray-400 ml-1">보안 코드 입력</label>
                            <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder="••••" className="w-full p-4 bg-gray-50 rounded-xl text-center text-xl border-2 border-gray-100" autoFocus />
                            <div className="grid grid-cols-2 gap-2 pt-4">
                                <button type="button" onClick={()=>setPendingCouncil(null)} className="p-4 font-bold text-gray-400 hover:bg-gray-50 rounded-xl transition-all">취소</button>
                                <button type="submit" className="p-4 bg-blue-500 text-white rounded-xl font-bold shadow-lg shadow-blue-100">접속 승인</button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            if (activeTab === 'public') return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <button onClick={()=>setActiveTab(null)} className="mb-6 text-gray-400 font-bold">← 메인 화면</button>
                    <div className="bg-white rounded-3xl shadow-xl p-12 text-center mb-8 border-b-8 border-blue-500">
                        <h2 className="text-2xl font-bold text-gray-400 mb-6 uppercase tracking-widest">Global Negotiation Timer</h2>
                        {!timerStarted ? (
                            <button onClick={()=>{setTimerSeconds(300); setTimerRunning(true); setTimerStarted(true);}} className="px-16 py-8 bg-blue-500 text-white font-black text-3xl rounded-3xl shadow-2xl hover:scale-105 transition-all">협상 시작 (5분)</button>
                        ) : (
                            <div>
                                <div className={`text-[120px] font-black leading-none mb-6 tabular-nums ${timerSeconds <= 60 ? 'text-red-500 animate-pulse' : 'text-blue-600'}`}>
                                    {timerSeconds === 0 ? '⏰' : (Math.floor(timerSeconds/60)+":"+(timerSeconds%60).toString().padStart(2,'0'))}
                                </div>
                                <div className="flex gap-4 justify-center">
                                    <button onClick={()=>setTimerRunning(!timerRunning)} className={`px-10 py-4 rounded-2xl font-black text-white ${timerRunning ? 'bg-yellow-500' : 'bg-green-500'}`}>{timerRunning ? '⏸ PAUSE' : '▶ RESUME'}</button>
                                    <button onClick={()=>{setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false);}} className="px-10 py-4 bg-slate-200 rounded-2xl font-black text-slate-500">🔄 RESET</button>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {councils.map(c => (
                            <div key={c.id} className={`bg-white rounded-3xl p-6 border-t-8 ${c.theme} shadow-lg`}>
                                <h3 className={`font-black text-xl mb-4 ${c.accent}`}>{c.name}</h3>
                                <div className="space-y-3 font-black text-lg">
                                    <div className="flex justify-between p-4 bg-red-50 rounded-2xl text-red-600"><span>🔴 위기</span><span>{scores[c.key]?.red}</span></div>
                                    <div className="flex justify-between p-4 bg-emerald-50 rounded-2xl text-emerald-600"><span>🟢 복지</span><span>{scores[c.key]?.green}</span></div>
                                    <div className="flex justify-between p-4 bg-blue-50 rounded-2xl text-blue-600"><span>🔵 경제</span><span>{scores[c.key]?.blue}</span></div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="mt-12 text-center flex flex-col items-center gap-4">
                        <button onClick={() => setShowScoreModal(true)} className="px-12 py-5 bg-slate-900 text-white rounded-2xl font-black text-xl shadow-2xl hover:bg-black transition-all">🏆 최종 결과 집계</button>
                        <button onClick={() => {if(window.confirm("모든 데이터가 초기화됩니다.")) { db.ref('game').set(null); window.location.reload(); }}} className="text-red-400 font-bold text-sm">시스템 완전 초기화</button>
                    </div>
                    {showScoreModal && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6">
                            <div className="bg-white rounded-3xl shadow-2xl p-10 max-w-lg w-full popup-in">
                                <h2 className="text-3xl font-black mb-8 text-center">Final Score</h2>
                                <div className="space-y-4 mb-8">
                                    {['c1','c2','c3'].map((k,i)=>(
                                        <div key={k} className="flex justify-between items-center p-6 bg-slate-50 rounded-2xl border-2 border-slate-100">
                                            <span className="font-black text-xl text-slate-700">제 {i+1} 협의체</span>
                                            <span className="text-4xl font-black text-blue-600">{finalResults[k]} <small className="text-sm text-slate-400 uppercase">PT</small></span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>setShowScoreModal(false)} className="w-full py-5 bg-slate-100 rounded-2xl font-black text-slate-500 hover:bg-slate-200 transition-all">창 닫기</button>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (activeTab === 'admin') {
                const [af, setAf] = useState("c1"); const [at, setAt] = useState("c2"); const [aty, setAty] = useState("red"); const [aa, setAa] = useState(1);
                return (
                    <div className="max-w-2xl mx-auto p-6 bg-slate-50 min-h-screen">
                        <button onClick={()=>setActiveTab(null)} className="mb-6 text-gray-400 font-bold">← 메인 화면</button>
                        <div className="bg-white p-8 rounded-3xl shadow-xl space-y-6">
                            <h2 className="text-2xl font-black flex items-center gap-2 text-yellow-600"><Calculator /> 교사용 수동 제어</h2>
                            <p className="text-slate-400 text-sm">학생들이 기기가 없거나 응답이 없을 때 여기서 직접 토큰을 옮겨주세요.</p>
                            <div className="grid grid-cols-2 gap-4">
                                <label className="flex flex-col gap-1 font-bold text-xs text-slate-500 uppercase">From (보내는 협의체)
                                    <select value={af} onChange={e=>setAf(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold border-2 border-slate-100">{councils.map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                                </label>
                                <label className="flex flex-col gap-1 font-bold text-xs text-slate-500 uppercase">To (받는 협의체)
                                    <select value={at} onChange={e=>setAt(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold border-2 border-slate-100">{councils.map(c=><option key={c.key} value={c.key}>{c.name}</option>)}</select>
                                </label>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <label className="flex flex-col gap-1 font-bold text-xs text-slate-500 uppercase">Token Type
                                    <select value={aty} onChange={e=>setAty(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold border-2 border-slate-100"><option value="red">🔴 위기</option><option value="green">🟢 복지</option><option value="blue">🔵 경제</option></select>
                                </label>
                                <label className="flex flex-col gap-1 font-bold text-xs text-slate-500 uppercase">Amount
                                    <input type="number" value={aa} onChange={e=>setAa(e.target.value)} className="p-4 bg-slate-50 rounded-xl font-bold text-center border-2 border-slate-100" />
                                </label>
                            </div>
                            <button onClick={() => adminManual(af, at, aty, aa)} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg hover:bg-black transition-all">강제 전송 실행</button>
                        </div>
                    </div>
                );
            }

            // 협의체 개별 페이지
            const cur = councils.find(c => c.id === activeTab);
            const targetCouncilData = councils.find(c => c.key === tfCouncil);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 pb-32 bg-slate-50 min-h-screen">
                    <header className="flex justify-between items-center mb-6">
                        <button onClick={()=>{setUser(null); setActiveTab(null);}} className="text-gray-400 font-bold bg-white px-4 py-2 rounded-xl shadow-sm">← 로그아웃</button>
                        <div className="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-sm shadow-xl flex items-center gap-2">
                            <span className="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                            {user.country} 대표
                        </div>
                    </header>

                    <div className={`bg-white border-t-8 ${cur.theme} rounded-3xl shadow-xl overflow-hidden mb-8`}>
                        <div className="p-8 bg-gray-50 border-b border-gray-100">
                            <div className="flex items-center justify-between mb-4"><span className="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded flex items-center gap-1"><Lock size={10} /> SECRET DOCUMENT</span><span className="text-slate-300 font-mono text-xs">ID: {cur.key}-{user.country}</span></div>
                            <h2 className="text-3xl font-black text-gray-900 mb-2">{cur.title}</h2>
                            <p className="text-gray-400 font-bold flex items-center gap-2">{cur.name} 공식 지시서</p>
                        </div>
                        
                        <div className="grid grid-cols-3 p-8 gap-3 text-center border-b font-black border-gray-100">
                            <div className="bg-red-50 p-4 rounded-2xl text-red-500 shadow-inner"><div className="text-3xl">{scores[cur.key]?.red}</div><div className="text-[10px] uppercase opacity-60">Crisis Index</div></div>
                            <div className="bg-emerald-50 p-4 rounded-2xl text-emerald-500 shadow-inner"><div className="text-3xl">{scores[cur.key]?.green}</div><div className="text-[10px] uppercase opacity-60">Welfare Fund</div></div>
                            <div className="bg-blue-50 p-4 rounded-2xl text-blue-500 shadow-inner"><div className="text-3xl">{scores[cur.key]?.blue}</div><div className="text-[10px] uppercase opacity-60">Economic Power</div></div>
                        </div>

                        <div className="p-8">
                            <section className="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl">
                                <h3 className="font-black mb-6 flex items-center gap-2">🚀 실시간 외교 토큰 전송</h3>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] font-bold text-slate-500 ml-1">수신 협의체</label>
                                            <select value={tfCouncil} onChange={e=>{setTfCouncil(e.target.value); setTfCountry("");}} className="w-full p-4 bg-slate-800 rounded-xl font-bold border-none focus:ring-2 focus:ring-blue-500">
                                                <option value="">협의체 선택</option>
                                                {councils.filter(c=>c.key!==cur.key).map(c=><option key={c.key} value={c.key}>{c.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] font-bold text-slate-500 ml-1">수신 국가</label>
                                            <select value={tfCountry} onChange={e=>setTfCountry(e.target.value)} className="w-full p-4 bg-slate-800 rounded-xl font-bold border-none focus:ring-2 focus:ring-blue-500" disabled={!tfCouncil}>
                                                <option value="">국가 선택</option>
                                                {targetCouncilData?.countries.map(ct=><option key={ct} value={ct}>{ct}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] font-bold text-slate-500 ml-1">토큰 색깔</label>
                                            <select value={tfType} onChange={e=>setTfType(e.target.value)} className="w-full p-4 bg-slate-800 rounded-xl font-bold border-none">
                                                <option value="red">🔴 위기 아동</option><option value="green">🟢 복지 예산</option><option value="blue">🔵 경제 예산</option>
                                            </select>
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] font-bold text-slate-500 ml-1">전송 수량</label>
                                            <div className="flex bg-slate-800 rounded-xl overflow-hidden h-[56px] border-none">
                                                <button onClick={()=>setTfAmt(Math.max(1, tfAmt-1))} className="px-5 bg-slate-700 hover:bg-slate-600 transition-colors font-black text-xl">-</button>
                                                <div className="flex-1 flex items-center justify-center text-lg font-black">{tfAmt}</div>
                                                <button onClick={()=>setTfAmt(tfAmt+1)} className="px-5 bg-slate-700 hover:bg-slate-600 transition-colors font-black text-xl">+</button>
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={requestTransfer} className="w-full py-5 bg-blue-500 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all mt-2 uppercase tracking-tight">Send Approval Request</button>
                                </div>
                            </section>
                        </div>

                        <div className="p-8 space-y-14">
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-yellow-500 font-black text-2xl"><EyeOff /> <h3>우리 팀 상황</h3></div>
                                <div className="bg-yellow-50 p-6 rounded-2xl border-l-4 border-yellow-400 italic text-lg leading-relaxed text-gray-700 mb-6 font-medium">"{cur.quote}"</div>
                                <p className="text-gray-600 leading-relaxed text-base">{cur.description}</p>
                            </section>
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-purple-500 font-black text-2xl"><Users /> <h3>팀원 역할 분담</h3></div>
                                <div className="grid gap-3">
                                    {cur.roles.map((r, i) => (
                                        <div key={i} className="bg-purple-50 p-4 rounded-2xl border border-purple-100 flex flex-col">
                                            <div className="flex items-center gap-2 mb-1 font-black">
                                                <span className="text-gray-900">{r.country}</span>
                                                <span className="bg-purple-200 text-purple-800 text-[9px] px-2 py-0.5 rounded-full uppercase">{r.role}</span>
                                            </div>
                                            <p className="text-sm text-gray-500 leading-snug">{r.job}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-blue-500 font-black text-2xl"><Shield /> <h3>팀 미션(Missions)</h3></div>
                                <div className="grid gap-4">
                                    {cur.missions.map(m => (
                                        <div key={m.id} className="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                                            <div className="flex items-center gap-3 mb-4"><span className="bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded">{m.id}</span><span className="font-black text-lg">{m.title}</span></div>
                                            <ul className="space-y-3">
                                                {m.steps.map((s, idx) => (
                                                    <li key={idx} className="flex gap-3 text-sm text-gray-600 leading-relaxed">
                                                        <span className="bg-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black border border-blue-200 shrink-0 shadow-sm">{idx+1}</span>
                                                        {s}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </section>
                            {/* 승리 조건 복구 */}
                            <section>
                                <div className="flex items-center gap-3 mb-6 text-emerald-500 font-black text-2xl"><TrendingUp /> <h3>이기는 방법 (Win Conditions)</h3></div>
                                <div className="grid gap-3">
                                    {cur.winConditions.map((cond, idx) => (
                                        <div key={idx} className="flex items-center justify-between bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                            <div className="flex items-center gap-3"><ChevronRight size={16} className="text-emerald-500 shrink-0" /><span className="text-gray-700 font-bold text-sm">{cond.text}</span></div>
                                            <span className={`px-4 py-1.5 rounded-full text-xs font-black border ${cond.point < 0 ? 'bg-red-100 text-red-600 border-red-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200'}`}>
                                                {cond.point < 0 ? cond.point : `+${cond.point}`}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>
                    <div className="mt-8">
                        <h4 className="text-xs font-black text-gray-400 mb-4 uppercase tracking-widest text-center">Live Activity Feed</h4>
                        <div className="space-y-2">{logs.map((log, i) => (<div key={i} className="bg-white p-4 rounded-2xl text-[11px] shadow-sm border border-slate-100 flex justify-between items-center"><span className="font-bold"><b className="text-blue-600">{log.from}</b> → <b className="text-emerald-600">{log.to}</b> ({log.type==='red'?'🔴':log.type==='green'?'🟢':'🔵'} {log.amt}개)</span><span className="text-slate-300 font-mono">{log.time}</span></div>))}</div>
                    </div>

                    {/* 수신 팝업 (20초 타이머 반영) */}
                    {incomingRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6 text-center">
                            <div className="bg-white rounded-[40px] shadow-2xl p-10 max-w-sm w-full popup-in">
                                <div className="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl font-black shadow-inner border border-blue-100">
                                    {popupTimer}
                                </div>
                                <h2 className="text-2xl font-black mb-2 tracking-tight">외교 요청 도착!</h2>
                                <p className="mb-8 text-slate-500 leading-relaxed">
                                    <span className="text-blue-600 font-black">{incomingRequest.fromCountry}</span>에서 <br/>
                                    당신(<span className="font-bold text-slate-800">{incomingRequest.toCountry}</span>)에게 <br/>
                                    <b className="text-slate-900 text-lg">{incomingRequest.type==='red'?'🔴 위기아동':incomingRequest.type==='green'?'🟢 복지예산':'🔵 경제예산'} {incomingRequest.amt}개</b>를 보냅니다. <br/>수락하시겠습니까?
                                </p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>handleAction(false)} className="py-5 bg-slate-100 rounded-3xl font-black text-slate-400 hover:bg-slate-200 transition-all">거절</button>
                                    <button onClick={()=>handleAction(true)} className="py-5 bg-blue-600 text-white rounded-3xl font-black text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all">수락</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 송신 대기 팝업 (20초 타이머 반영) */}
                    {sentRequest && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z- p-6 text-center">
                            <div className="bg-white rounded-[40px] shadow-2xl p-10 max-w-sm w-full popup-in">
                                <div className="w-20 h-20 border-8 border-blue-500 border-t-slate-100 rounded-full animate-spin mx-auto mb-6 flex items-center justify-center">
                                    <span className="animate-none font-black text-xl text-blue-500" style={{animation:'none'}}>{popupTimer}</span>
                                </div>
                                <h2 className="text-2xl font-black mb-4">상대방 응답 대기 중</h2>
                                <div className="bg-slate-50 p-6 rounded-3xl text-sm text-slate-500 leading-relaxed mb-8 border border-slate-100">
                                    <p className="font-black text-slate-800 mb-2">💡 확인 요청</p>
                                    <p><b>{sentRequest.toName}</b>의 응답이 없나요?</p>
                                    <p className="mt-2 font-bold underline text-blue-600 decoration-blue-200 underline-offset-4 tracking-tighter italic">상대방 국가 대표와 함께 선생님께 가서 직접 교환을 완료하세요.</p>
                                </div>
                                <button onClick={()=>{db.ref(`game/requests/${sentRequest.toKey}/${sentRequest.id}`).remove(); setSentRequest(null);}} className="text-slate-300 font-bold hover:text-red-400 transition-all">전송 요청 취소</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
