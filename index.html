<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아동 인권 수호 작전 v2.3 (실시간)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase 설정 ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5OUkS9Q-qnYhdKQIcq7mRfMceZnFNedo",
            authDomain: "un-project-26f66.firebaseapp.com",
            databaseURL: "https://un-project-26f66-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "un-project-26f66",
            storageBucket: "un-project-26f66.firebasestorage.app",
            messagingSenderId: "1047109156483",
            appId: "1:1047109156483:web:50e32a74c276a4a6dde5b6",
            measurementId: "G-Y1TFDRNGK8"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // --- 아이콘 컴포넌트 ---
        const Globe = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>;
        const Lock = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const Shield = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const EyeOff = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>;
        const TrendingUp = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Calculator = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>;
        const ChevronRight = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
        const Users = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState(null);
            const [pendingCouncil, setPendingCouncil] = useState(null);
            const [passwordInput, setPasswordInput] = useState("");
            const [error, setError] = useState(false);
            const [timerSeconds, setTimerSeconds] = useState(300);
            const [timerRunning, setTimerRunning] = useState(false);
            const [timerStarted, setTimerStarted] = useState(false);
            const [logs, setLogs] = useState([]);

            const initialScores = {
                c1: { red: 4, green: 9, blue: 0 },
                c2: { red: 10, green: 1, blue: 0 },
                c3: { red: 2, green: 4, blue: 6 },
                c6: { red: 5, green: 5, blue: 0 }
            };

            const [scores, setScores] = useState(initialScores);

            useEffect(() => {
                const scoresRef = db.ref('game/scores');
                scoresRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setScores(data);
                    else scoresRef.set(scores);
                });

                const logsRef = db.ref('game/logs');
                logsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setLogs(Object.values(data).reverse().slice(0, 5));
                    else setLogs([]);
                });

                return () => { scoresRef.off(); logsRef.off(); };
            }, []);

            useEffect(() => {
                if (!timerRunning || timerSeconds <= 0) return;
                const id = setInterval(() => setTimerSeconds(s => s - 1), 1000);
                return () => clearInterval(id);
            }, [timerRunning, timerSeconds]);

            const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

            const councils = [
                { id: 1, key: 'c1', name: "제 1 협의체", password: "0912", theme: "border-blue-500", accent: "text-blue-600", countries: "캐나다, 독일, 네덜란드, 스웨덴, 뉴질랜드", quote: "세상 모든 아이를 구하고 싶지만, 우리 아이들을 보살필 힘도 부족해지고 있습니다.", description: "여러분은 세계에서 아동을 가장 잘 보호하는 나라들이에요. 위기 아동들을 돕느라 복지 예산이 점점 줄어들고 있답니다.", roles: [], missions: [], winConditions: [] },
                { id: 2, key: 'c2', name: "제 2 협의체", password: "1101", theme: "border-red-500", accent: "text-red-600", countries: "팔레스타인, 미얀마, 예멘, 우크라이나, 시리아, 아프가니스탄", quote: "생존을 위해서 나라를 떠나야만 합니다.", description: "여러분의 나라는 전쟁과 경제 위기로 인해 아동을 보호할 예산도, 시스템도 없어요.", roles: [], missions: [], winConditions: [] },
                { id: 3, key: 'c3', name: "제 3 협의체", password: "9070", theme: "border-emerald-500", accent: "text-emerald-600", countries: "대한민국, 러시아, 미국, 프랑스", quote: "우리는 이미 우리의 역할을 하고 있습니다.", description: "여러분은 세계에서 가장 부유하고 강력한 나라들이에요. 스마트하게 거래하세요!", roles: [], missions: [], winConditions: [] },
                { id: 6, key: 'c6', name: "제 6 협의체 (샘플)", password: "9999", theme: "border-purple-500", accent: "text-purple-600", countries: "국가 A, 국가 B, 국가 C", quote: "이것은 시스템 테스트를 위한 샘플 페이지입니다.", description: "테스트 그룹입니다.", roles: [], missions: [], winConditions: [] }
            ];

            const transferToken = (fromKey, toKey, type, amount) => {
                const amt = parseInt(amount);
                if (scores[fromKey][type] < amt) return alert("토큰이 부족합니다!");
                const updates = {};
                updates[`game/scores/${fromKey}/${type}`] = scores[fromKey][type] - amt;
                updates[`game/scores/${toKey}/${type}`] = scores[toKey][type] + amt;
                db.ref().update(updates);
                db.ref('game/logs').push({
                    from: councils.find(c => c.key === fromKey).name,
                    to: councils.find(c => c.key === toKey).name,
                    type, amt, time: new Date().toLocaleTimeString()
                });
                alert("전송 성공!");
            };

            const updateManual = (key, type, val) => {
                db.ref(`game/scores/${key}/${type}`).set(Math.max(0, val));
            };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === "9998") { setActiveTab('score'); setPendingCouncil(null); setError(false); return; }
                if (passwordInput === "9997") { setActiveTab('public'); setPendingCouncil(null); setError(false); return; }
                if (passwordInput === "9999") { setActiveTab(6); setPendingCouncil(null); setError(false); return; }
                if (pendingCouncil && passwordInput === pendingCouncil.password) {
                    setActiveTab(pendingCouncil.id); setPendingCouncil(null); setError(false);
                } else { setError(true); setPasswordInput(""); }
            };

            const resetSession = () => {
                if (window.confirm("수업을 종료하고 모든 데이터를 리셋하시겠습니까?")) {
                    db.ref('game').set({ scores: initialScores, logs: null });
                    setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false);
                    alert("리셋되었습니다.");
                }
            };

            const finalResults = (() => {
                const results = { c1: 0, c2: 0, c3: 0 };
                if (scores.c1.red < scores.c2.red) results.c1 += 1;
                if ((scores.c1.green + scores.c1.blue) > scores.c1.red) results.c1 += 1;
                if ((scores.c2.green + scores.c2.blue) >= 10) results.c1 += 3;
                if (scores.c2.red < 10) results.c2 += 1;
                if ((scores.c2.green + scores.c2.blue) > 1) results.c2 += 1;
                if ((scores.c2.green + scores.c2.blue) > scores.c2.red) results.c2 += 3;
                if (scores.c3.red >= 0 && scores.c3.red <= 2) results.c3 += 1;
                results.c3 -= Math.max(0, 6 - scores.c3.blue);
                return results;
            })();

            // 수정: readOnly 프롭을 받아 버튼 노출 여부 결정
            const CoinControl = ({ councilKey, color, bgColor, label, readOnly = false }) => (
                <div className="flex flex-col items-center bg-white p-3 rounded-2xl shadow-sm border border-gray-100 min-w-[100px]">
                    <span className="text-[10px] font-bold text-gray-400 mb-2">{label}</span>
                    <div className="flex items-center gap-2">
                        {!readOnly && (
                            <button onClick={() => updateManual(councilKey, color, scores[councilKey][color] - 1)} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold hover:bg-gray-200">-</button>
                        )}
                        <div className={`w-10 h-10 ${bgColor} rounded-xl flex items-center justify-center text-white text-lg font-black shadow-inner`}>{scores[councilKey][color]}</div>
                        {!readOnly && (
                            <button onClick={() => updateManual(councilKey, color, scores[councilKey][color] + 1)} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold hover:bg-gray-200">+</button>
                        )}
                    </div>
                </div>
            );

            const TransferPanel = ({councilKey}) => {
                const [to, setTo] = useState("");
                const [type, setType] = useState("red");
                const [amt, setAmt] = useState(1);
                return (
                    <div className="mt-8 p-6 bg-slate-900 text-white rounded-3xl shadow-xl">
                        <h3 className="text-lg font-black mb-4 flex items-center gap-2">🚀 토큰 전송 (외교 활동)</h3>
                        <div className="space-y-4 text-sm">
                            <select value={to} onChange={(e)=>setTo(e.target.value)} className="w-full p-3 bg-slate-800 border-none rounded-xl font-bold outline-none">
                                <option value="">받는 협의체 선택</option>
                                {councils.filter(c => c.key !== councilKey && c.id !== 6).map(c => <option key={c.key} value={c.key}>{c.name}</option>)}
                            </select>
                            <div className="grid grid-cols-2 gap-2">
                                <select value={type} onChange={(e)=>setType(e.target.value)} className="p-3 bg-slate-800 border-none rounded-xl font-bold outline-none">
                                    <option value="red">🔴 위기 아동</option>
                                    <option value="green">🟢 복지 예산</option>
                                    <option value="blue">🔵 경제 예산</option>
                                </select>
                                <input type="number" value={amt} onChange={(e)=>setAmt(e.target.value)} min="1" className="p-3 bg-slate-800 border-none rounded-xl text-center font-bold outline-none" />
                            </div>
                            <button onClick={() => to ? transferToken(councilKey, to, type, amt) : alert("협의체를 선택하세요!")} className="w-full py-4 bg-blue-500 hover:bg-blue-600 rounded-xl font-black transition-all">전송 승인</button>
                        </div>
                    </div>
                );
            };

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] text-center p-6">
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-gray-200 max-w-2xl w-full">
                        <div className="flex justify-center mb-6 text-blue-500 animate-pulse"><Globe /></div>
                        <h1 className="text-4xl font-black text-gray-900 mb-4 tracking-tight">글로벌 아동 인권 수호 작전</h1>
                        <div className="h-1 w-20 bg-blue-500 mx-auto mb-6 rounded-full"></div>
                        <p className="text-gray-500 mb-10 text-lg leading-relaxed">이 시스템은 각 협의체 외교관만 접근할 수 있는 비밀 정보를 담고 있습니다.<br/>보안 코드를 입력하십시오.</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {councils.filter(c => c.id !== 6).map((council) => (
                                <button key={council.id} onClick={() => { setPendingCouncil(council); setPasswordInput(""); setError(false); }} className="bg-gray-100 hover:bg-blue-50 text-gray-800 font-bold py-6 px-6 rounded-2xl transition-all border-b-4 border-gray-300 hover:border-blue-400 active:border-b-0 active:translate-y-1 flex flex-col items-center gap-2 group">
                                    <div className="group-hover:scale-110 transition-transform text-gray-400 group-hover:text-blue-500"><Shield size={28} /></div>
                                    <span className="text-base">{council.name}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderPasswordScreen = () => (
                <div className="flex flex-col items-center justify-center min-h-[90vh] p-6">
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-200 max-w-md w-full">
                        <div className="flex justify-center mb-6"><div className="p-4 bg-yellow-50 rounded-full border border-yellow-200 text-yellow-500"><Lock size={32} /></div></div>
                        <h2 className="text-2xl font-bold text-gray-900 text-center mb-2">보안 터미널 접속</h2>
                        <p className="text-gray-500 text-center mb-8 text-base">4자리 기밀 보안 코드를 입력하십시오.</p>
                        <form onSubmit={handlePasswordSubmit} className="space-y-6">
                            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="••••" autoFocus className={`w-full bg-gray-50 border-2 ${error ? 'border-red-400' : 'border-gray-200'} rounded-xl py-4 text-center text-2xl tracking-[0.5em] focus:outline-none focus:border-blue-400 transition-colors`} />
                            <div className="grid grid-cols-2 gap-4">
                                <button type="button" onClick={() => setPendingCouncil(null)} className="py-4 rounded-xl font-bold text-gray-500 hover:bg-gray-100 transition-colors text-base">취소</button>
                                <button type="submit" className="py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold transition-all text-base">접속 승인</button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            // 수정: readOnly 모드일 때 버튼 및 리셋 기능 숨김
            const renderPublicBoard = (readOnly = false) => {
                const timeUp = timerStarted && timerSeconds === 0;
                return (
                    <div className="max-w-6xl mx-auto p-4 md:p-8 pb-20">
                        <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 hover:text-gray-800 flex items-center transition-colors font-medium text-base">← 메인 화면</button>
                        <div className="bg-white rounded-3xl shadow-xl border border-gray-200 p-8 mb-8 text-center">
                            <h2 className="text-2xl font-bold text-gray-700 mb-6">⏱ 협상 타이머</h2>
                            {!timerStarted ? (
                                !readOnly && <button onClick={() => { setTimerSeconds(300); setTimerRunning(true); setTimerStarted(true); }} className="bg-blue-500 hover:bg-blue-600 text-white font-black text-2xl px-12 py-6 rounded-2xl shadow-lg">🚀 협상 시작 (5분)</button>
                            ) : (
                                <div>
                                    <div className={`text-8xl md:text-9xl font-black mb-4 tabular-nums leading-none ${timerSeconds <= 60 ? 'text-red-600' : 'text-blue-600'}`}>{timeUp ? '⏰' : formatTime(timerSeconds)}</div>
                                    {!readOnly && (
                                        <div className="flex gap-4 justify-center">
                                            {!timeUp && <button onClick={() => setTimerRunning(r => !r)} className={`${timerRunning ? 'bg-yellow-400 text-yellow-900' : 'bg-green-500 text-white'} font-bold px-8 py-4 rounded-xl transition-all`}>{timerRunning ? '⏸ 일시정지' : '▶ 재개'}</button>}
                                            <button onClick={() => { setTimerSeconds(300); setTimerRunning(false); setTimerStarted(false); }} className="bg-gray-100 px-8 py-4 rounded-xl transition-all">🔄 초기화</button>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-4">📊 협의체 현황판</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                            {councils.filter(c => c.id !== 6).map(council => (
                                <div key={council.id} className={`bg-white rounded-3xl shadow-lg border-t-8 ${council.theme} p-6`}>
                                    <h3 className={`text-xl font-black ${council.accent} mb-1`}>{council.name}</h3>
                                    <p className="text-gray-400 text-xs mb-4">{council.countries}</p>
                                    <div className="space-y-3">
                                        <CoinControl councilKey={council.key} color="red" bgColor="bg-red-500" label="위기 아동" readOnly={readOnly} />
                                        <CoinControl councilKey={council.key} color="green" bgColor="bg-emerald-500" label="복지 예산" readOnly={readOnly} />
                                        <CoinControl councilKey={council.key} color="blue" bgColor="bg-blue-500" label="경제 예산" readOnly={readOnly} />
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        {!readOnly && (
                            <div className="flex flex-col items-center border-t pt-10">
                                <button onClick={resetSession} className="bg-red-500 hover:bg-red-600 text-white font-black py-5 px-12 rounded-2xl shadow-xl transition-all active:scale-95">[수업종료] 데이터 전체 리셋</button>
                            </div>
                        )}
                    </div>
                );
            };

            const renderScoreCalculator = () => (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 hover:text-gray-800 flex items-center font-medium text-base">← 메인 화면</button>
                    <div className="bg-white border-t-8 border-yellow-500 rounded-3xl shadow-xl overflow-hidden mb-8">
                        <div className="bg-yellow-50 p-8 border-b border-gray-200">
                            <span className="bg-yellow-500 text-white text-sm font-black px-3 py-1 rounded-lg">관리자 전용</span>
                            <h2 className="text-3xl font-black text-gray-900 mt-4 mb-2 flex items-center gap-3"><Calculator className="text-yellow-500" size={32} /> 최종 점수 집계</h2>
                        </div>
                        <div className="p-6 overflow-x-auto text-sm">
                            <table className="w-full text-left border-collapse">
                                <thead><tr className="border-b border-gray-200"><th className="py-4 px-4 text-gray-400 font-bold">협의체</th><th className="py-4 px-4 text-red-500 font-bold">🔴</th><th className="py-4 px-4 text-emerald-600 font-bold">🟢</th><th className="py-4 px-4 text-blue-500 font-bold">🔵</th><th className="py-4 px-4 text-yellow-600 font-bold">최종 점수</th></tr></thead>
                                <tbody className="divide-y divide-gray-100">
                                    {['c1', 'c2', 'c3'].map((key, i) => (
                                        <tr key={key}>
                                            <td className="py-6 px-4 font-black text-base">제 {i+1} 협의체</td>
                                            <td className="py-6 px-4 font-bold">{scores[key].red}</td>
                                            <td className="py-6 px-4 font-bold">{scores[key].green}</td>
                                            <td className="py-6 px-4 font-bold">{scores[key].blue}</td>
                                            <td className="py-6 px-4 font-black text-2xl">{finalResults[key]} <span className="text-xs text-gray-400 uppercase">PT</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            const renderCouncilPage = (council) => (
                <div className="max-w-4xl mx-auto p-4 md:p-8 pb-32">
                    <button onClick={() => setActiveTab(null)} className="mb-6 text-gray-400 hover:text-gray-800 flex items-center font-medium text-base">← 메인 화면</button>
                    <div className={`bg-white border-t-8 ${council.theme} rounded-3xl shadow-xl overflow-hidden`}>
                        <div className="bg-gray-50 p-8 border-b border-gray-200">
                            <div className="flex items-center justify-between mb-4"><span className="bg-red-500 text-white text-sm font-black px-3 py-1 rounded-lg flex items-center gap-1"><Lock size={12} /> 비밀 자료</span></div>
                            <h2 className="text-3xl font-black text-gray-900 mb-3">{council.name} 작전 지시서</h2>
                            <p className="text-gray-500 text-base">{council.countries}</p>
                        </div>
                        <div className="p-8 bg-white grid grid-cols-3 gap-2 text-center border-b">
                            <div className="p-4 bg-red-50 rounded-2xl"><div className="text-3xl font-black text-red-500">{scores[council.key].red}</div><p className="text-[10px] text-gray-400 font-bold">위기 아동</p></div>
                            <div className="p-4 bg-emerald-50 rounded-2xl"><div className="text-3xl font-black text-emerald-500">{scores[council.key].green}</div><p className="text-[10px] text-gray-400 font-bold">복지 예산</p></div>
                            <div className="p-4 bg-blue-50 rounded-2xl"><div className="text-3xl font-black text-blue-500">{scores[council.key].blue}</div><p className="text-[10px] text-gray-400 font-bold">경제 예산</p></div>
                        </div>
                        <div className="p-8"><TransferPanel councilKey={council.key} /></div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-gray-800 font-sans">
                    {!activeTab && !pendingCouncil && renderHome()}
                    {pendingCouncil && renderPasswordScreen()}
                    {activeTab === 'score' && renderScoreCalculator()}
                    {activeTab === 'public' && renderPublicBoard(true)} 
                    {activeTab === 'admin' && renderPublicBoard(false)}
                    {typeof activeTab === 'number' && renderCouncilPage(councils.find(c => c.id === activeTab))}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
